<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0f1f" />
  <title>NEON MESSENGER | чаты + стена</title>
  <style>
    :root { --vh: 1vh; }
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      min-height: 100vh; min-height: calc(var(--vh, 1vh) * 100);
      background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
      color: #d8f8ff;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .glass {
      background: rgba(15, 25, 45, 0.7);
      backdrop-filter: blur(16px) saturate(180%);
      border-radius: 32px;
      border: 1px solid rgba(0, 255, 255, 0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 18px rgba(0,255,255,0.2);
      transition: all 0.3s;
    }
    @supports not (backdrop-filter: blur(16px)) {
      .glass { background: rgba(15, 25, 45, 0.9); }
    }
    .glass:hover { border-color: #0ff; box-shadow: 0 0 28px rgba(0,255,255,0.5); }
    .neon-input {
      background: rgba(10,20,40,0.7); border: 1px solid #0ff;
      border-radius: 60px; padding: 14px 20px; color: #0ff; font-size: 16px; outline: none; width: 100%;
    }
    .neon-input:focus { box-shadow: 0 0 14px #0ff; }
    .neon-btn {
      background: linear-gradient(135deg, rgba(0,255,255,0.08), rgba(255,0,255,0.08));
      border: 1px solid #0ff; border-radius: 60px; padding: 12px 24px;
      font-weight: bold; color: #0ff; cursor: pointer; transition: 0.2s; text-transform: uppercase;
    }
    .neon-btn:hover:not(:disabled) { background: #0ff; color: black; box-shadow: 0 0 20px #0ff; }
    .neon-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .bottom-nav {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 32px); max-width: 480px;
      background: rgba(5,10,25,0.85); backdrop-filter: blur(20px);
      border-radius: 60px; display: flex; justify-content: space-around;
      padding: 8px 12px; border: 1px solid #0ff;
      box-shadow: 0 0 15px rgba(0,255,255,0.3); z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 11px; color: #88aaff; background: none; border: none;
      padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 600;
    }
    .nav-item.active { background: rgba(0,255,255,0.2); color: #0ff; text-shadow: 0 0 5px #0ff; box-shadow: 0 0 8px #0ff; }
    .nav-icon { font-size: 26px; }
    .page { display: none; animation: fade 0.25s; }
    .page.active-page { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chat-item {
      display: flex; align-items: center; gap: 14px; padding: 14px;
      border-radius: 28px; cursor: pointer; border-bottom: 1px solid rgba(0,255,255,0.2); transition: 0.2s;
    }
    .chat-item:active { background: rgba(0,255,255,0.2); }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, #0ff, #f0f);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; box-shadow: 0 0 8px cyan; flex-shrink: 0;
    }
    .badge { background: #f0f; color: black; border-radius: 40px; padding: 2px 10px; font-size: 11px; margin-left: 8px; }
    .message {
      max-width: 75%; padding: 10px 18px; border-radius: 24px; margin-bottom: 8px; word-break: break-word;
    }
    .message.out { align-self: flex-end; background: #0a2a3a; border: 1px solid #0ff; color: #0ff; }
    .message.in { align-self: flex-start; background: #1a1a2e; border: 1px solid #88f; color: #ccd; }
    .messages-area {
      height: calc(100vh - 170px); height: calc(var(--vh, 1vh) * 100 - 170px);
      overflow-y: auto; display: flex; flex-direction: column; padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .wall-post {
      background: rgba(10,15,30,0.6); backdrop-filter: blur(12px);
      border-radius: 28px; padding: 18px; margin-bottom: 18px; border: 1px solid #0ff;
    }
    .loading { text-align: center; color: #0ff; padding: 20px; }
    #recaptcha-container {
      display: block !important; visibility: visible !important;
      min-height: 78px; width: 100%; margin: 16px 0 0 0; position: relative; z-index: 10000;
    }
    textarea { resize: vertical; outline: none; }
    button { outline: none; touch-action: manipulation; }
    @media (max-width: 480px) {
      .messages-area { height: calc(100vh - 200px); height: calc(var(--vh, 1vh) * 100 - 200px); }
      .glass { padding: 12px !important; }
      .bottom-nav { padding: 4px 8px; }
      .nav-item { padding: 4px 8px; font-size: 10px; }
      .nav-icon { font-size: 22px; }
      .avatar { width: 44px; height: 44px; font-size: 24px; }
      .message { max-width: 85%; }
    }
  </style>
</head>
<body>
<div id="root"><div class="loading">✨ Загрузка...</div></div>

<script type="module">
  // ========== ИМПОРТЫ ==========
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { initializeFirestore, enableIndexedDbPersistence, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

  // ========== КОНФИГ ==========
  const firebaseConfig = {
    apiKey: "AIzaSyA9gA_Nvei89csa7_YrmbnbnxFngb0UKoM",
    authDomain: "neon-messenger-83ed4.firebaseapp.com",
    projectId: "neon-messenger-83ed4",
    storageBucket: "neon-messenger-83ed4.firebasestorage.app",
    messagingSenderId: "954172505610",
    appId: "1:954172505610:web:03f56a8a5b89f2d402a9f3"
  };

  // ========== ИНИЦИАЛИЗАЦИЯ ==========
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = initializeFirestore(app, { experimentalForceLongPolling: true, useFetchStreams: false }, 'neonmess');
  enableIndexedDbPersistence(db).catch(e => console.warn("Persistence:", e.code));

  // Messaging может быть недоступен – обернём
  let messaging = null;
  try { messaging = getMessaging(app); } catch (e) { console.warn("Messaging not supported"); }
  auth.languageCode = "ru";

  // ========== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ==========
  const state = {
    user: null, profile: null, page: "chats", chats: [], wallPosts: [],
    activeChat: null, chatUnsub: null, captcha: null, fcmToken: null,
    globalChatsUnsub: null, wallUnsub: null, pollingInterval: null,
    isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent),
    isAndroid: /Android/.test(navigator.userAgent)
  };
  const root = document.getElementById("root");

  // ========== УТИЛИТЫ ==========
  const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
  const directChatId = (uid1, uid2) => [uid1, uid2].sort().join("__");

  // ========== ВЫСОТА ДЛЯ iOS ==========
  function setViewportHeight() {
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
  }
  window.addEventListener('resize', setViewportHeight);
  window.addEventListener('orientationchange', setViewportHeight);
  setViewportHeight();

  // ========== CAPTCHA ==========
  function resetCaptcha() {
    try { if (state.captcha) state.captcha.clear(); } catch {}
    state.captcha = null;
    const c = document.getElementById("recaptcha-container");
    if (c) c.innerHTML = "";
  }
  async function createCaptcha(containerId) {
    resetCaptcha();
    state.captcha = new RecaptchaVerifier(auth, containerId, {
      size: "normal", callback: () => console.log("reCAPTCHA solved"), "expired-callback": () => resetCaptcha()
    });
    await state.captcha.render();
    return state.captcha;
  }

  // ========== АУТЕНТИФИКАЦИЯ ==========
  async function loginWithPhone(phone, containerId) {
    const verifier = await createCaptcha(containerId);
    const confirmation = await signInWithPhoneNumber(auth, phone, verifier);
    const code = prompt("Введите код из SMS:");
    if (!code) throw new Error("Код не введён");
    const result = await confirmation.confirm(code);
    resetCaptcha();
    return result.user;
  }
  async function ensureProfile(user, username, avatar) {
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);
    const baseData = {
      phone: user.phoneNumber || "",
      username: username || snap.data()?.username || "Без имени",
      avatar: avatar || snap.data()?.avatar || "👤",
      updatedAt: serverTimestamp()
    };
    if (!snap.exists()) {
      await setDoc(ref, { ...baseData, createdAt: serverTimestamp(), fcmTokens: [] });
    } else {
      await updateDoc(ref, baseData);
    }
    const fresh = await getDoc(ref);
    const d = fresh.data() || {};
    return { uid: user.uid, phoneNumber: user.phoneNumber || d.phone || "", displayName: d.username || "Без имени", photoURL: d.avatar || "👤" };
  }
  async function loadProfile(uid) {
    const snap = await getDoc(doc(db, "users", uid));
    if (!snap.exists()) return null;
    const d = snap.data();
    return { uid, phoneNumber: d.phone || "", displayName: d.username || "Без имени", photoURL: d.avatar || "👤" };
  }

  function showLogin() {
    root.innerHTML = `
      <div class="glass" style="max-width:520px; margin:56px auto; padding:30px;">
        <h2 style="color:#0ff; text-align:center;">🔮 NEON LOGIN</h2>
        <input id="phone" class="neon-input" placeholder="Номер телефона (+79991234567)" style="margin-top:16px;">
        <input id="name" class="neon-input" placeholder="Ваше имя" style="margin-top:10px;">
        <input id="avatar" class="neon-input" placeholder="Аватар-эмодзи (например 👾)" style="margin-top:10px;">
        <div id="recaptcha-container"></div>
        <button id="loginBtn" class="neon-btn" style="width:100%; margin-top:10px;">Войти / Регистрация</button>
        <div style="margin-top:12px; font-size:12px; color:#88aaff;">Для Phone Auth должен быть включён номерной вход.</div>
      </div>`;
    document.getElementById("loginBtn").onclick = async () => {
      const btn = document.getElementById("loginBtn");
      const phone = document.getElementById("phone").value.trim();
      const name = document.getElementById("name").value.trim();
      const avatar = document.getElementById("avatar").value.trim();
      if (!phone || !name) { alert("Введите номер и имя"); return; }
      btn.disabled = true; btn.textContent = "...";
      try {
        const user = await loginWithPhone(phone, "recaptcha-container");
        const profile = await ensureProfile(user, name, avatar || "👤");
        state.user = { uid: profile.uid, phoneNumber: profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL };
        state.profile = profile;
        renderApp();
        // На iOS не вызываем автоматический запрос уведомлений
        if (!state.isIOS) {
          const token = await requestNotificationPermissionAndGetToken();
          if (token) await saveFCMTokenToFirestore(state.user.uid, token);
        }
      } catch (err) {
        alert("Ошибка входа: " + (err?.message || "неизвестная ошибка"));
        showLogin();
      } finally {
        const cur = document.getElementById("loginBtn");
        if (cur) { cur.disabled = false; cur.textContent = "Войти / Регистрация"; }
      }
    };
  }

  // ========== ЗАГРУЗКА ДАННЫХ ==========
  async function loadChats() {
    if (!state.user) return [];
    const snap = await getDocs(query(collection(db, "chats"), where("members", "array-contains", state.user.uid)));
    const chats = await Promise.all(snap.docs.map(async d => {
      const data = d.data();
      let title = data.title || "Чат", av = "👤";
      if (data.type === "direct") {
        const other = (data.members || []).find(m => m !== state.user.uid);
        if (other) {
          const p = await loadProfile(other);
          if (p) { title = p.displayName; av = p.photoURL; }
        }
      }
      return { id: d.id, ...data, title, avatar: av };
    }));
    chats.sort((a,b) => (b.updatedAt?.toMillis()||0) - (a.updatedAt?.toMillis()||0));
    return chats;
  }
  async function loadWallPosts() {
    const snap = await getDocs(query(collection(db, "wall"), orderBy("createdAt", "desc")));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }
  async function refreshChats() { state.chats = await loadChats(); renderChatsList(); }

  // ========== СЛУШАТЕЛИ (real-time) ==========
  function setupWallListener() {
    if (!state.user || state.wallUnsub) return;
    const q = query(collection(db, "wall"), orderBy("createdAt", "desc"));
    state.wallUnsub = onSnapshot(q, snap => {
      state.wallPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (state.page === 'wall') renderWallPostsList();
    });
  }
  async function loadAndRenderWall() {
    const container = document.getElementById("wallPostsContainer");
    if (!container) return;
    container.innerHTML = `<div class="loading">📡 Загрузка постов...</div>`;
    state.wallPosts = await loadWallPosts();
    renderWallPostsList();
    setupWallListener();
  }
  function renderWallPostsList() {
    const c = document.getElementById("wallPostsContainer");
    if (!c) return;
    if (!state.wallPosts.length) { c.innerHTML = `<div class="loading">📡 Ещё нет постов. Напиши первый!</div>`; return; }
    c.innerHTML = state.wallPosts.map(post => {
      const comments = post.comments || [];
      return `
        <div class="wall-post" data-post-id="${post.id}">
          <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
            <div class="avatar" style="width:44px; height:44px; font-size:24px;">${escapeHtml(post.avatar||"👤")}</div>
            <strong style="color:#fff;">${escapeHtml(post.author||"Аноним")}</strong>
          </div>
          <div style="white-space:pre-wrap;">${escapeHtml(post.content||"")}</div>
          <div style="display:flex; gap:16px; margin-top:12px;">
            <button class="like-btn neon-btn" data-post-id="${post.id}" style="padding:8px 14px;">❤️ ${post.likesCount||0}</button>
            <button class="comment-btn neon-btn" data-post-id="${post.id}" style="padding:8px 14px;">💬 ${comments.length}</button>
          </div>
          <div class="comments" style="margin-top:12px;">
            ${comments.map(c => `<div style="background:rgba(0,255,255,0.1); border-radius:20px; padding:6px 12px; margin-top:6px;">💬 ${escapeHtml(c)}</div>`).join("")}
          </div>
        </div>`;
    }).join("");
    c.querySelectorAll(".like-btn").forEach(btn => {
      btn.onclick = async () => { await updateDoc(doc(db, "wall", btn.dataset.postId), { likesCount: increment(1) }); };
    });
    c.querySelectorAll(".comment-btn").forEach(btn => {
      btn.onclick = async () => {
        const comment = prompt("Ваш комментарий:"); if (!comment?.trim()) return;
        await updateDoc(doc(db, "wall", btn.dataset.postId), { comments: arrayUnion(comment.trim()) });
      };
    });
  }
  async function publishPost() {
    const input = document.getElementById("postContent"); if (!input) return;
    const content = input.value.trim(); if (!content) return;
    await addDoc(collection(db, "wall"), {
      author: state.profile?.displayName || state.user?.displayName || "Без имени",
      avatar: state.profile?.photoURL || state.user?.photoURL || "👤",
      content, likesCount: 0, comments: [], createdAt: serverTimestamp(), userId: state.user.uid
    });
    input.value = "";
  }

  // ========== РЕНДЕРИНГ ==========
  function renderNav(active) {
    return `<div class="bottom-nav">
      <button class="nav-item ${active==='chats'?'active':''}" data-page="chats"><span class="nav-icon">💬</span><span>ЧАТЫ</span></button>
      <button class="nav-item ${active==='wall'?'active':''}" data-page="wall"><span class="nav-icon">📡</span><span>СТЕНА</span></button>
      <button class="nav-item ${active==='profile'?'active':''}" data-page="profile"><span class="nav-icon">👾</span><span>ПРОФИЛЬ</span></button>
    </div>`;
  }
  function renderChatsList() {
    const list = document.getElementById("chatsList"); if (!list) return;
    if (!state.chats.length) { list.innerHTML = `<div class="loading">✨ Нет чатов. Нажмите + чтобы создать новый.</div>`; return; }
    list.innerHTML = state.chats.map(chat => `
      <div class="chat-item" data-chat-id="${chat.id}">
        <div class="avatar">${escapeHtml(chat.avatar||"👤")}</div>
        <div style="min-width:0; flex:1;">
          <div style="font-weight:700; color:#fff;">${escapeHtml(chat.title||"Чат")}</div>
          <div style="font-size:13px; color:#9db7d3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(chat.lastMessage||"Нет сообщений")}</div>
        </div>
      </div>`).join("");
    list.querySelectorAll(".chat-item").forEach(el => {
      el.onclick = () => { const chat = state.chats.find(c => c.id === el.dataset.chatId); if (chat) openChat(chat); };
    });
  }
  function renderChatsPage() {
    root.innerHTML = `
      <div style="max-width:1300px; margin:0 auto; padding:16px; padding-bottom:90px;">
        <div id="chatsPage" class="page active-page">
          <div class="glass" style="padding:18px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
              <h2 style="text-shadow:0 0 5px #0ff; color:#fff;">💬 NEON CHATS</h2>
              <button id="newChatBtn" style="background:none; color:cyan; font-size:28px; border:1px solid cyan; border-radius:40px; padding:4px 16px; cursor:pointer;">+</button>
            </div>
            <div id="chatsList"><div class="loading">Загрузка чатов...</div></div>
          </div>
        </div>
      </div>${renderNav("chats")}`;
    document.getElementById("newChatBtn").onclick = createNewChat;
    document.querySelectorAll(".nav-item").forEach(btn => {
      btn.onclick = () => switchPage(btn.dataset.page);
    });
    renderChatsList();
  }
  function renderWallPage() {
    root.innerHTML = `
      <div style="max-width:1300px; margin:0 auto; padding:16px; padding-bottom:90px;">
        <div id="wallPage" class="page active-page">
          <div class="glass" style="padding:18px;">
            <h2 style="text-shadow:0 0 5px #0ff; color:#fff; margin-bottom:20px;">📡 КИБЕР-СТЕНА</h2>
            <textarea id="postContent" rows="2" placeholder="Опубликовать пост..." style="width:100%; border-radius:28px; background:#0a0f1f; border:1px solid cyan; color:cyan; padding:12px;"></textarea>
            <div style="display:flex; justify-content:flex-end; margin-top:10px;"><button id="publishPostBtn" class="neon-btn">⚡ ЗАПУСТИТЬ</button></div>
            <div id="wallPostsContainer" style="margin-top:18px;"><div class="loading">Загрузка постов...</div></div>
          </div>
        </div>
      </div>${renderNav("wall")}`;
    document.getElementById("publishPostBtn").onclick = publishPost;
    document.querySelectorAll(".nav-item").forEach(btn => {
      btn.onclick = () => switchPage(btn.dataset.page);
    });
    loadAndRenderWall();
  }
  function renderProfilePage() {
    const profile = state.profile || state.user || { displayName: "Без имени", phoneNumber: "", photoURL: "👤" };
    const notifStatus = Notification.permission;
    root.innerHTML = `
      <div style="max-width:1300px; margin:0 auto; padding:16px; padding-bottom:90px;">
        <div id="profilePage" class="page active-page">
          <div class="glass" style="padding:28px; text-align:center;">
            <div style="width:100px; height:100px; border-radius:50%; margin:0 auto 20px; background:linear-gradient(135deg, cyan, magenta); display:flex; align-items:center; justify-content:center; font-size:48px;">${escapeHtml(profile.photoURL||"👤")}</div>
            <h3 style="font-size:26px; color:#fff;">${escapeHtml(profile.displayName||"Без имени")}</h3>
            <p style="color:#99f;">${escapeHtml(profile.phoneNumber||"")}</p>
            <hr style="margin:24px 0; border-color:cyan;">
            <div style="background: rgba(0,0,0,0.3); border-radius:20px; padding:15px; margin-bottom:15px;">
              ${state.isIOS ? `
                <div style="color:#ff0; font-size:14px; margin-bottom:10px;">⚠️ iOS: уведомления работают только если сайт добавлен на домашний экран (PWA).</div>
                <p style="color:#88aaff; font-size:12px;">Нажмите «Поделиться» → «На экран Домой», затем откройте приложение с иконки.</p>
              ` : `
                <div style="color:${notifStatus==='granted'?'#0f0':'#ff0'}; font-size:14px; margin-bottom:10px;">${notifStatus==='granted'?'✅ Уведомления включены':'⚠️ Уведомления не настроены'}</div>
                <button id="enableNotificationsBtn" class="neon-btn" style="width:100%;">🔔 ${notifStatus==='granted'?'ОБНОВИТЬ':'ВКЛЮЧИТЬ УВЕДОМЛЕНИЯ'}</button>
                ${state.isAndroid ? `<p style="color:#88aaff; font-size:11px; margin-top:8px;">Если не приходят: проверьте настройки браузера и системы.</p>` : ''}
              `}
            </div>
            <button id="editProfileBtn" class="neon-btn" style="margin-top:10px; width:100%;">✏️ Изменить профиль</button>
            <button id="logoutBtn" style="background:none; border:1px solid magenta; color:magenta; margin-top:20px; width:100%; padding:10px; border-radius:40px;">ВЫЙТИ</button>
          </div>
        </div>
      </div>${renderNav("profile")}`;

    if (!state.isIOS) {
      document.getElementById("enableNotificationsBtn").onclick = async () => {
        const token = await requestNotificationPermissionAndGetToken();
        if (token) { await saveFCMTokenToFirestore(state.user.uid, token); alert('✅ Уведомления включены!'); renderProfilePage(); }
        else alert('❌ Не удалось включить. Проверьте разрешения браузера.');
      };
    }
    document.getElementById("editProfileBtn").onclick = async () => {
      const newName = prompt("Новое имя:", profile.displayName||"");
      if (newName === null) return;
      const newAvatar = prompt("Новый аватар-эмодзи:", profile.photoURL||"👤");
      if (newAvatar === null) return;
      await updateDoc(doc(db, "users", state.user.uid), {
        username: newName.trim() || "Без имени",
        avatar: newAvatar.trim() || "👤",
        updatedAt: serverTimestamp()
      });
      state.profile = { ...profile, displayName: newName.trim(), photoURL: newAvatar.trim() };
      state.user.displayName = state.profile.displayName;
      state.user.photoURL = state.profile.photoURL;
      renderProfilePage();
    };
    document.getElementById("logoutBtn").onclick = async () => {
      await signOut(auth);
      stopPolling();
      state.user = null; state.profile = null; state.chats = []; state.wallPosts = [];
      if (state.chatUnsub) state.chatUnsub();
      if (state.globalChatsUnsub) state.globalChatsUnsub();
      if (state.wallUnsub) state.wallUnsub();
      showLogin();
    };
    document.querySelectorAll(".nav-item").forEach(btn => {
      btn.onclick = () => switchPage(btn.dataset.page);
    });
  }

  function switchPage(page) {
    if (state.page === page) return;
    if (state.page === 'wall' && state.wallUnsub) { state.wallUnsub(); state.wallUnsub = null; }
    if (state.page === 'chats' && state.globalChatsUnsub) { state.globalChatsUnsub(); state.globalChatsUnsub = null; }
    state.page = page;
    if (page === 'chats') renderApp();
    else if (page === 'wall') renderWallPage();
    else if (page === 'profile') renderProfilePage();
  }

  function renderApp() {
    if (state.page === 'wall') return renderWallPage();
    if (state.page === 'profile') return renderProfilePage();
    renderChatsPage();
    refreshChats();
    setupGlobalMessageListener();
  }

  // ========== ЧАТ ==========
  async function openChat(chat) {
    if (state.chatUnsub) { state.chatUnsub(); state.chatUnsub = null; }
    state.activeChat = chat;
    const title = chat.type === "direct" ? chat.title : (chat.title || "Чат");
    const av = chat.avatar || "👤";
    root.innerHTML = `
      <div style="max-width:1300px; margin:0 auto; padding:16px; padding-bottom:90px;">
        <div class="glass" style="padding:12px; height:calc(100vh - 120px); height:calc(var(--vh, 1vh) * 100 - 120px); display:flex; flex-direction:column;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:12px;">
            <button id="backToChatsBtn" style="background:none; font-size:28px; color:cyan; border:none; cursor:pointer;">←</button>
            <div style="display:flex; align-items:center; gap:10px; flex:1; justify-content:center;">
              <div class="avatar" style="width:40px; height:40px; font-size:22px;">${escapeHtml(av)}</div>
              <h3 style="color:#fff;">${escapeHtml(title)}</h3>
            </div>
            <div style="width:28px;"></div>
          </div>
          <div id="chatMessagesArea" class="messages-area" style="flex:1;"></div>
          <div style="display:flex; gap:8px; margin-top:12px;">
            <input type="text" id="messageInput" class="neon-input" style="flex:1;" placeholder="Сообщение...">
            <button id="sendMsgBtn" class="neon-btn">➤</button>
          </div>
        </div>
      </div>`;
    const messagesContainer = document.getElementById("chatMessagesArea");
    const messagesRef = collection(db, "chats", chat.id, "messages");
    const messagesQuery = query(messagesRef, orderBy("createdAt", "asc"));
    state.chatUnsub = onSnapshot(messagesQuery, snap => {
      messagesContainer.innerHTML = "";
      snap.forEach(msgDoc => {
        const msg = msgDoc.data();
        const isOut = msg.userId === state.user.uid;
        const time = msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) : "";
        const div = document.createElement("div");
        div.className = `message ${isOut ? "out" : "in"}`;
        div.innerHTML = `<div>${escapeHtml(msg.text||"")}</div><div style="font-size:10px; opacity:0.7; margin-top:4px;">${time}</div>`;
        messagesContainer.appendChild(div);
      });
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }, err => {
      console.error("Chat listener error:", err);
      setTimeout(() => { if (state.activeChat?.id === chat.id) openChat(chat); }, 1000);
    });
    document.getElementById("backToChatsBtn").onclick = () => {
      if (state.chatUnsub) { state.chatUnsub(); state.chatUnsub = null; }
      state.activeChat = null; state.page = "chats"; renderApp();
    };
    const sendMsg = async () => {
      const input = document.getElementById("messageInput");
      const text = input.value.trim(); if (!text) return;
      await addDoc(messagesRef, { text, userId: state.user.uid, createdAt: serverTimestamp() });
      await updateDoc(doc(db, "chats", chat.id), { lastMessage: text, lastMessageUserId: state.user.uid, updatedAt: serverTimestamp() });
      input.value = "";
    };
    document.getElementById("sendMsgBtn").onclick = sendMsg;
    document.getElementById("messageInput").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); sendMsg(); } });
  }

  async function createNewChat() {
    const usersSnap = await getDocs(collection(db, "users"));
    const users = [];
    usersSnap.forEach(d => { if (d.id !== state.user.uid) { const data = d.data(); users.push({ uid: d.id, username: data.username || "Пользователь", avatar: data.avatar || "👤" }); } });
    if (!users.length) { alert("Нет других пользователей"); return; }
    const choice = prompt("Выберите пользователя:\n" + users.map((u,i)=>`${i+1}. ${u.username} ${u.avatar}`).join("\n") + "\n\nВведите номер:");
    const index = parseInt(choice,10)-1;
    const selected = users[index]; if (!selected) return;
    const chatId = directChatId(state.user.uid, selected.uid);
    const chatRef = doc(db, "chats", chatId);
    if (!(await getDoc(chatRef)).exists()) {
      await setDoc(chatRef, { type:"direct", members:[state.user.uid, selected.uid], createdAt:serverTimestamp(), updatedAt:serverTimestamp(), lastMessage:"" });
    }
    state.chats = await loadChats();
    const chat = state.chats.find(c => c.id === chatId);
    if (chat) openChat(chat);
  }

  function setupGlobalMessageListener() {
    if (!state.user || state.globalChatsUnsub) return;
    const q = query(collection(db, "chats"), where("members", "array-contains", state.user.uid));
    state.globalChatsUnsub = onSnapshot(q, async snap => {
      snap.docChanges().forEach(async change => {
        if (change.type === "modified") {
          const chat = change.doc.data();
          const chatId = change.doc.id;
          if (chat.lastMessageUserId && chat.lastMessageUserId !== state.user.uid && state.activeChat?.id !== chatId) {
            if (Notification.permission === 'granted') {
              const sender = await loadProfile(chat.lastMessageUserId);
              new Notification(`${sender?.displayName || 'NEON'} 💬`, {
                body: chat.lastMessage, icon: '/neon/icon-192x192.png', tag: chatId
              }).onclick = () => { window.focus(); const c = state.chats.find(x => x.id === chatId); if (c) openChat(c); };
            }
            refreshChats();
          }
        }
      });
    }, err => { console.error("Global listener error:", err); setTimeout(() => { if (state.user) { state.globalChatsUnsub = null; setupGlobalMessageListener(); } }, 1000); });
  }

  // ========== УВЕДОМЛЕНИЯ ==========
  async function requestNotificationPermissionAndGetToken() {
    if (!messaging) { alert("Ваш браузер не поддерживает уведомления"); return null; }
    try {
      const swPath = '/neon/firebase-messaging-sw.js';
      const reg = await navigator.serviceWorker.register(swPath);
      await navigator.serviceWorker.ready;
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        const token = await getToken(messaging, {
          vapidKey: 'BDRTV4EZNNWVT9_dRipTDFG_JHwJa53Ne82UgG5g6XdgLWufZumogCNM8EQK_T-Qg9fZDeCEq7_R6DchHcfWXZQ',
          serviceWorkerRegistration: reg
        });
        if (token) { state.fcmToken = token; return token; }
      }
    } catch (error) {
      console.error("Token error:", error);
      alert("Не удалось настроить уведомления. Убедитесь, что сайт открыт по HTTPS.");
    }
    return null;
  }
  async function saveFCMTokenToFirestore(uid, token) {
    if (!uid || !token) return;
    await updateDoc(doc(db, "users", uid), { fcmTokens: arrayUnion(token) }).catch(()=>{});
  }
  if (messaging) {
    onMessage(messaging, payload => {
      if (payload.notification) new Notification(payload.notification.title, { body: payload.notification.body, icon: '/neon/icon-192x192.png' });
    });
  }

  // ========== POLLING FALLBACK ==========
  function startPolling() {
    if (state.pollingInterval) clearInterval(state.pollingInterval);
    state.pollingInterval = setInterval(async () => {
      if (!state.user || document.visibilityState !== 'visible') return;
      if (state.page === 'chats') await refreshChats();
      if (state.page === 'wall') await loadAndRenderWall();
    }, 5000);
  }
  function stopPolling() {
    if (state.pollingInterval) { clearInterval(state.pollingInterval); state.pollingInterval = null; }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && state.user) {
      if (state.page === 'chats') { if (state.globalChatsUnsub) { state.globalChatsUnsub(); state.globalChatsUnsub = null; } setupGlobalMessageListener(); refreshChats(); }
      if (state.page === 'wall') { if (state.wallUnsub) { state.wallUnsub(); state.wallUnsub = null; } setupWallListener(); loadAndRenderWall(); }
      if (state.activeChat) { const c = state.activeChat; if (state.chatUnsub) { state.chatUnsub(); state.chatUnsub = null; } state.activeChat = null; openChat(c); }
    }
  });

  // ========== ЗАПУСК ==========
  function boot() {
    startPolling();
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        stopPolling();
        state.user = null; state.profile = null; state.chats = []; state.wallPosts = [];
        if (state.chatUnsub) state.chatUnsub();
        if (state.globalChatsUnsub) state.globalChatsUnsub();
        if (state.wallUnsub) state.wallUnsub();
        showLogin();
        return;
      }
      let profile = await loadProfile(user.uid);
      if (!profile) profile = await ensureProfile(user, user.displayName || "Без имени", user.photoURL || "👤");
      state.user = { uid: user.uid, phoneNumber: user.phoneNumber || profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL };
      state.profile = profile;
      if (state.page === 'profile') renderProfilePage(); else { state.page = 'chats'; renderApp(); }
      // Автоматически запрашиваем уведомления только на Android/ПК, но не на iOS
      if (!state.isIOS) {
        const token = await requestNotificationPermissionAndGetToken();
        if (token) await saveFCMTokenToFirestore(state.user.uid, token);
      }
    });
  }
  boot();
</script>
</body>
</html>
