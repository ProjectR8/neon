<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a12" />
  <title>NEON MESSENGER | чаты + стена</title>
  <style>
    :root {
      --vh: 1vh;
      --bg-deep: #0a0a12;
      --bg-card: rgba(18,  18, 30, 0.75);
      --bg-card-solid: #12121e;
      --gold: #c9a86c;
      --gold-light: #d4b87a;
      --gold-soft: #b8945a;
      --gold-glow: rgba(201, 168, 108, 0.25);
      --gold-border: rgba(201, 168, 108, 0.2);
      --gold-border-strong: rgba(201, 168, 108, 0.45);
      --text-primary: #e8e6f0;
      --text-secondary: #9898a8;
      --text-tertiary: #6e6e7c;
      --text-heading: #f0ede8;
      --online: #4caf84;
      --online-glow: rgba(76, 175, 132, 0.5);
      --danger: #e05555;
      --danger-bg: rgba(224, 85, 85, 0.1);
      --msg-out-bg: #1e1c26;
      --msg-out-border: rgba(201, 168, 108, 0.35);
      --msg-out-text: #e8e6f0;
      --msg-in-bg: #15141d;
      --msg-in-border: rgba(255, 255, 255, 0.08);
      --msg-in-text: #d0ced8;
      --input-bg: rgba(22, 22, 34, 0.8);
      --input-border: rgba(201, 168, 108, 0.3);
      --input-focus-glow: rgba(201, 168, 108, 0.4);
      --btn-primary-bg: #c9a86c;
      --btn-primary-text: #0a0a12;
      --btn-ghost-border: rgba(255, 255, 255, 0.12);
      --btn-ghost-text: #c9a86c;
      --nav-bg: rgba(10, 10, 18, 0.9);
      --nav-border: rgba(255, 255, 255, 0.06);
      --avatar-glow: 0 0 18px rgba(201, 168, 108, 0.35);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
      --shadow-elevated: 0 8px 40px rgba(0, 0, 0, 0.5);
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --radius-xl: 28px;
      --radius-full: 50%;
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --transition-smooth: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-spring: 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
      --blur-glass: 18px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font-sans);
    }

    body {
      min-height: 100vh;
      min-height: calc(var(--vh, 1vh) * 100);
      background: var(--bg-deep);
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    body.no-scroll {
      overflow: hidden;
    }

    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(var(--blur-glass)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--blur-glass)) saturate(140%);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gold-border);
      box-shadow: var(--shadow-card);
      transition: var(--transition-smooth);
    }

    @supports not (backdrop-filter: blur(16px)) {
      .glass-card {
        background: var(--bg-card-solid);
      }
    }

    .input-premium {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 60px;
      padding: 13px 18px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      width: 100%;
      transition: var(--transition-smooth);
      letter-spacing: 0.01em;
    }

    .input-premium:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--input-focus-glow);
    }

    .btn-primary {
      background: var(--btn-primary-bg);
      color: var(--btn-primary-text);
      border: none;
      border-radius: 60px;
      padding: 12px 22px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition-smooth);
      letter-spacing: 0.02em;
      text-transform: none;
    }

    .btn-primary:active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--btn-ghost-border);
      color: var(--btn-ghost-text);
      border-radius: 60px;
      padding: 10px 20px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .btn-ghost:active {
      background: rgba(201, 168, 108, 0.1);
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      background: var(--nav-bg);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0 12px;
      border-top: 1px solid var(--nav-border);
      z-index: 100;
      height: 82px;
      border-radius: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-tertiary);
      background: none;
      border: none;
      padding: 4px 14px;
      border-radius: 18px;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.15s, color 0.15s;
      min-width: 64px;
      letter-spacing: 0.01em;
      position: relative;
    }

    .nav-item.active {
      color: var(--gold-light);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      top: -2px;
      width: 20px;
      height: 2px;
      background: var(--gold);
      border-radius: 0 0 2px 2px;
      box-shadow: 0 0 6px var(--gold-glow);
    }

    .nav-item:active {
      transform: scale(0.88);
    }

    .nav-icon {
      font-size: 24px;
      line-height: 1;
    }

    .nav-item span:not(.nav-icon) {
      font-size: 11px;
      line-height: 1;
      font-weight: 500;
    }

    .page {
      display: none;
      animation: fadePage 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .page.active-page {
      display: block;
    }

    @keyframes fadePage {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 13px 15px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      transition: var(--transition-smooth);
      border-radius: var(--radius-md);
      margin: 2px 8px;
    }

    .chat-item:active { background: rgba(201, 168, 108, 0.06); }

    .chat-item.animate-in {
      animation: fadeInUp 0.35s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, #2a2520, #1a1815);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 0 0 1px var(--gold-border);
      overflow: hidden;
    }

    .avatar.large {
      width: 90px;
      height: 90px;
      font-size: 44px;
      box-shadow: var(--avatar-glow), 0 0 0 2px var(--gold-border-strong);
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--online);
      border: 2px solid #0a0a12;
      box-shadow: 0 0 8px var(--online-glow);
    }

    .online-dot.small {
      width: 10px;
      height: 10px;
      bottom: 1px;
      right: 1px;
      border-width: 1.5px;
    }

    .online-text {
      color: var(--gold-light);
      font-weight: 500;
      text-shadow: 0 0 8px var(--gold-glow);
    }

    .message {
      max-width: 78%;
      padding: 10px 16px;
      border-radius: 20px;
      margin-bottom: 6px;
      word-break: break-word;
      animation: messageIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
      font-size: 14px;
      line-height: 1.45;
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.out {
      align-self: flex-end;
      background: var(--msg-out-bg);
      border: 1px solid var(--msg-out-border);
      color: var(--msg-out-text);
      border-bottom-right-radius: 6px;
    }

    .message.in {
      align-self: flex-start;
      background: var(--msg-in-bg);
      border: 1px solid var(--msg-in-border);
      color: var(--msg-in-text);
      border-bottom-left-radius: 6px;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 14px;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
      gap: 2px;
    }

    .wall-post {
      background: var(--bg-card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: var(--radius-xl);
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid var(--gold-border);
      transition: var(--transition-smooth);
      box-shadow: var(--shadow-card);
    }

    .loading {
      text-align: center;
      color: var(--text-tertiary);
      padding: 28px;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    #recaptcha-container {
      display: block !important;
      visibility: visible !important;
      min-height: 78px;
      width: 100%;
      margin: 14px 0 0 0;
      position: relative;
      z-index: 10000;
    }

    textarea { resize: vertical; outline: none; }
    button { outline: none; touch-action: manipulation; }

    .send-btn, .voice-btn {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--gold-light);
      font-size: 20px;
      transition: var(--transition-smooth);
      margin-left: 4px;
      flex-shrink: 0;
      position: relative;
    }

    .send-btn:active, .voice-btn:active {
      transform: scale(0.9);
      background: rgba(201, 168, 108, 0.2);
    }

    .voice-btn .voice-recording-waves {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--gold-light);
      opacity: 0;
      transition: all 0.15s ease;
      pointer-events: none;
      width: 44px;
      height: 44px;
      top: -2px;
      left: -2px;
    }

    .voice-btn.recording .voice-recording-waves {
      opacity: 0.6;
      transform: scale(1.05);
    }

    .voice-lock-icon {
      position: absolute;
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: var(--gold-light);
    }

    .voice-btn.locked .voice-lock-icon { display: flex; }

    .chat-input-container {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--bg-card);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 32px;
      margin: 8px 12px 12px;
    }

    .voice-message audio {
      width: 180px;
      max-width: 100%;
      height: 32px;
      margin-top: 2px;
      border-radius: 20px;
    }

    .voice-message .duration {
      font-size: 11px;
      opacity: 0.7;
      margin-left: 6px;
    }

    .theme-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 14px 0;
    }

    .theme-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition-smooth);
      position: relative;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .theme-dot:active {
      transform: scale(1.12);
      border-color: #fff;
    }

    .theme-dot.active-theme {
      border-color: #fff;
      box-shadow: 0 0 18px currentColor, 0 0 32px currentColor;
      transform: scale(1.08);
    }

    .theme-dot.active-theme::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-weight: bold;
      font-size: 13px;
      text-shadow: 0 0 3px #000;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .profile-fullscreen {
      width: 100%;
      height: 100%;
      background: var(--bg-card-solid);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      animation: slideInRight 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: env(safe-area-inset-bottom);
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    .profile-fullscreen.closing {
      animation: slideOutRight 0.25s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }

    @keyframes slideOutRight {
      from { transform: translateX(0); }
      to { transform: translateX(100%); }
    }

    .chat-fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: calc(var(--vh, 1vh) * 100);
      z-index: 150;
      display: flex;
      flex-direction: column;
      background: var(--bg-deep);
    }

    .chat-fullscreen .glass-card {
      height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: 0;
      border: none;
      box-shadow: none;
      background: var(--bg-deep);
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 2;
      border-radius: 16px 16px 0 0;
    }

    .chat-header-tap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      cursor: pointer;
      min-width: 0;
      padding: 4px 8px;
      border-radius: var(--radius-md);
      transition: var(--transition-smooth);
    }

    .chat-header-tap .avatar {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #chatMenuBtn, #chatCallBtn { font-size: 24px; }

    .last-seen-small {
      font-size: 11px;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toggle-switch {
      position: relative;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 26px;
      transition: var(--transition-smooth);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: var(--transition-smooth);
    }

    .toggle-switch input:checked+.toggle-slider {
      background: var(--gold);
    }

    .toggle-switch input:checked+.toggle-slider::before {
      transform: translateX(20px);
    }

    .divider-thin {
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      margin: 4px 16px;
    }

    .badge-count {
      background: rgba(201, 168, 108, 0.2);
      color: var(--gold-light);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-deep);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.5s ease;
    }

    .splash-screen.hidden { opacity: 0; pointer-events: none; }

    .logo-premium {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--gold-light);
      text-shadow: 0 0 30px var(--gold-glow);
      animation: logoPulse 1.8s ease-in-out infinite alternate;
    }

    @keyframes logoPulse {
      0% { opacity: 0.7; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.04); }
    }

    .subtitle {
      color: var(--text-tertiary);
      font-size: 15px;
      margin-top: 8px;
      letter-spacing: 3px;
      font-weight: 400;
    }

    .dots { margin-top: 28px; display: flex; gap: 9px; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      animation: dotBreathe 1.3s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBreathe {
      0%, 100% { transform: scale(0.7); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 10px; }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.2s;
      color: var(--text-primary);
      text-decoration: none;
    }
    .profile-row:active { background: rgba(255, 255, 255, 0.03); }
    .profile-row-icon {
      width: 24px;
      display: flex;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 18px;
    }
    .profile-row-text { flex: 1; min-width: 0; }
    .profile-row-label { font-size: 15px; font-weight: 400; color: var(--text-primary); }
    .profile-row-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
    .profile-row-arrow { color: var(--text-tertiary); font-size: 18px; }
    .danger-row .profile-row-label { color: var(--danger); }

    .profile-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--gold-border-strong);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      transition: var(--transition-smooth);
      min-width: 64px;
    }
    .profile-action-btn:active { background: rgba(201,168,108,0.1); border-color: var(--gold); color: var(--gold-light); }
    .profile-action-btn svg { stroke: var(--text-secondary); }
    .profile-action-btn:active svg { stroke: var(--gold-light); }

    .theme-dot.premium-gold { background: radial-gradient(circle at 30% 30%, #c9a86c, #7a5e3a); color: #c9a86c; }
    .theme-dot.deep-noir { background: radial-gradient(circle at 30% 30%, #aaa, #333); color: #888; }
    .theme-dot.forest { background: radial-gradient(circle at 30% 30%, #6db890, #3a6a4a); color: #5a9e7c; }
    .theme-dot.plum { background: radial-gradient(circle at 30% 30%, #b08cc8, #5a3a6a); color: #9b6db5; }
    .theme-dot.ocean { background: radial-gradient(circle at 30% 30%, #88b8d8, #3a5a7a); color: #6ba4c9; }
    .theme-dot.terracotta { background: radial-gradient(circle at 30% 30%, #e09a84, #6a3a2a); color: #d4856b; }
    .theme-dot.slate { background: radial-gradient(circle at 30% 30%, #94a4b0, #4a5a68); color: #8a9ba8; }
    .theme-dot.rose-gold { background: radial-gradient(circle at 30% 30%, #e0b8b8, #7a4a4a); color: #d4a0a0; }
    .theme-dot.lavender { background: radial-gradient(circle at 30% 30%, #cfbfe8, #6a5a8a); color: #b8a0d8; }
    .theme-dot.coffee { background: radial-gradient(circle at 30% 30%, #d8b898, #6a4a2a); color: #c8a080; }
    .theme-dot.midnight { background: radial-gradient(circle at 30% 30%, #90a8c8, #3a4a68); color: #7090b0; }

  const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
  const directChatId = (uid1, uid2) => [uid1, uid2].sort().join("__");
  const isOnline = (lastSeen) => {
    if (!lastSeen) return false;
    const ms = lastSeen.toMillis ? lastSeen.toMillis() : lastSeen;
    return (Date.now() - ms) < 5 * 60 * 1000;
  };
  const formatLastSeen = (lastSeen) => {
    if (!lastSeen) return 'давно';
    if (isOnline(lastSeen)) return 'в сети';
    const d = lastSeen.toDate ? lastSeen.toDate() : new Date(lastSeen);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return 'только что';
    if (diffMin < 60) return `был(а) ${diffMin} мин назад`;
    const diffH = Math.floor(diffMin / 60);
    if (diffH < 24) return `сегодня в ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    const yesterday = new Date(now);
    yesterday.setDate(now.getDate() - 1);
    if (d.toDateString() === yesterday.toDateString()) return `вчера в ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    return d.toLocaleDateString('ru', { day:'numeric', month:'short' }) + ' в ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  };
  const getDaySeparator = (date) => {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);
    const msgDate = new Date(date);
    const msgDay = new Date(msgDate.getFullYear(), msgDate.getMonth(), msgDate.getDate());
    if (msgDay.getTime() === today.getTime()) return 'Сегодня';
    if (msgDay.getTime() === yesterday.getTime()) return 'Вчера';
    return msgDate.toLocaleDateString('ru', { day:'numeric', month:'long', year:'numeric' });
  };

    const saved = localStorage.getItem('neon-messenger-theme');
    if (saved && THEMES.includes(saved)) uiState.currentTheme = saved;
    else uiState.currentTheme = 'premium-gold';
    applyTheme(uiState.currentTheme);

  function applyTheme(themeName) {
    uiState.currentTheme = themeName;
    document.documentElement.setAttribute('data-theme', themeName);
    localStorage.setItem('neon-messenger-theme', themeName);
    const vars = THEME_CSS_VARS[themeName] || THEME_CSS_VARS['premium-gold'];
    const rootEl = document.documentElement;
    Object.entries(vars).forEach(([key, val]) => rootEl.style.setProperty(key, val));
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) {
      const bgColors = { 'premium-gold':'#0a0a12','deep-noir':'#0a0a0c','forest':'#0a1410','plum':'#100a18','ocean':'#0a141a','terracotta':'#140c0a','slate':'#0e1014','rose-gold':'#120c0e','lavender':'#130f1a','coffee':'#140e0a','midnight':'#080c14','arctic':'#0a141c' };
      metaTheme.setAttribute('content', bgColors[themeName] || '#0a0a12');
    }
    document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active-theme', d.dataset.theme === themeName));
  }

  async function updateLastSeen() {
    if (!authState.user) return;
    try { await updateDoc(doc(db, "users", authState.user.uid), { lastSeen: serverTimestamp() }).catch(() => {}); } catch {}
  }

  async function getUserData(uid) {
    if (cacheState.usersCache.has(uid)) return cacheState.usersCache.get(uid);
    const snap = await getDoc(doc(db, "users", uid));
    if (!snap.exists()) return null;
    const d = snap.data();
    const user = { uid, username: d.username || "Без имени", avatar: d.avatar || "", phone: d.phone || "", lastSeen: d.lastSeen || null, bio: d.bio || "", birthday: d.birthday || "", login: d.login || "" };
    cacheState.usersCache.set(uid, user);
    if (d.lastSeen) cacheState.lastSeenCache.set(uid, d.lastSeen);
    return user;
  }

  async function preloadAllUsers() {
    const snap = await getDocs(collection(db, "users"));
    cacheState.allUsers = [];
    snap.forEach(docSnap => {
      const d = docSnap.data();
      const user = { uid: docSnap.id, username: d.username || "Пользователь", avatar: d.avatar || "", phone: d.phone || "", lastSeen: d.lastSeen || null, bio: d.bio || "", birthday: d.birthday || "", login: d.login || "" };
      cacheState.usersCache.set(user.uid, user);
      if (d.lastSeen) cacheState.lastSeenCache.set(user.uid, d.lastSeen);
      if (user.uid !== authState.user?.uid) cacheState.allUsers.push(user);
    });
  }

  async function ensureProfile(user, username, avatar) {
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);
    const baseData = {
      phone: user.phoneNumber || "",
      username: username || snap.data()?.username || "Без имени",
      avatar: avatar || snap.data()?.avatar || "",
      updatedAt: serverTimestamp(),
      lastSeen: serverTimestamp()
    };
    if (!snap.exists()) await setDoc(ref, { ...baseData, createdAt: serverTimestamp(), fcmTokens: [], login: "", bio: "", birthday: "" });
    else await updateDoc(ref, baseData);
    const fresh = await getDoc(ref);
    const d = fresh.data() || {};
    const profile = { uid: user.uid, phoneNumber: user.phoneNumber || d.phone || "", displayName: d.username || "Без имени", photoURL: d.avatar || "", login: d.login || "", bio: d.bio || "", birthday: d.birthday || "" };
    cacheState.usersCache.set(user.uid, { uid: user.uid, username: profile.displayName, avatar: profile.photoURL, phone: profile.phoneNumber, lastSeen: d.lastSeen || null, login: profile.login, bio: profile.bio, birthday: profile.birthday });
    await updateProfileInChats(user.uid, profile.displayName, profile.photoURL);
    return profile;
  }

  async function updateProfileInChats(uid, username, avatar) {
    try {
      const chatsSnap = await getDocs(query(collection(db, "chats"), where("members", "array-contains", uid)));
      if (chatsSnap.empty) return;
      const batch = writeBatch(db);
      chatsSnap.forEach(docSnap => { batch.update(docSnap.ref, { [`memberUsernames.${uid}`]: username, [`memberAvatars.${uid}`]: avatar }); });
      await batch.commit();
    } catch (e) { console.warn("updateProfileInChats error", e); }
  }

  function resetCaptcha() { try { if (authState.captcha) authState.captcha.clear(); } catch {} authState.captcha = null; const c = document.getElementById("recaptcha-container"); if (c) c.innerHTML = ""; }

  async function createCaptcha(containerId) {
    resetCaptcha();
    authState.captcha = new RecaptchaVerifier(auth, containerId, { size: "normal", callback: () => console.log("reCAPTCHA solved"), "expired-callback": () => resetCaptcha() });
    await authState.captcha.render();
    return authState.captcha;
  }

  async function loginWithPhone(phone, containerId) {
    const verifier = await createCaptcha(containerId);
    const confirmation = await signInWithPhoneNumber(auth, phone, verifier);
    const code = await new Promise((resolve) => {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="glass-card" style="width:320px; padding:24px;">
          <h3 style="color:var(--text-heading); text-align:center; margin-bottom:16px;">Код из SMS</h3>
          <input id="smsCode" class="input-premium" placeholder="Введите код" style="margin-bottom:16px;">
          <button id="confirmCodeBtn" class="btn-primary" style="width:100%;">Подтвердить</button>
        </div>`;
      document.body.appendChild(modal);
      document.getElementById('confirmCodeBtn').onclick = () => {
        const c = document.getElementById('smsCode').value.trim();
        if (c) { modal.remove(); resolve(c); } else alert('Введите код');
      };
    });
    const result = await confirmation.confirm(code);
    resetCaptcha();
    return result.user;
  }

  function renderFullSearch() {
    const existing = document.querySelector('.search-fullscreen');
    if (existing) existing.remove();
    const container = document.createElement('div');
    container.className = 'search-fullscreen';
    container.innerHTML = `
      <div class="search-input-wrap">
        <button class="search-back-btn" id="searchCloseBtn">←</button>

    `;
    document.body.appendChild(container);
    document.body.classList.add('no-scroll');
    const searchInput = container.querySelector('#searchInput');
    const resultsDiv = container.querySelector('#searchResults');
    const closeBtn = container.querySelector('#searchCloseBtn');

    const filterAndRender = () => {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = cacheState.allUsers.filter(u => 
        u.username.toLowerCase().includes(q) || 
        u.phone.includes(q) || 
        (u.login && u.login.toLowerCase().includes(q))

      resultsDiv.querySelectorAll('.chat-item').forEach(el => {
        el.addEventListener('click', () => {
          const uid = el.dataset.uid;
          openUserProfile(uid);
          closeSearch();
        });
      });
    };
    searchInput.addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(filterAndRender, 300); });
    filterAndRender();

    function closeSearch() {
      document.body.removeChild(container);
      document.body.classList.remove('no-scroll');
    }
    closeBtn.addEventListener('click', closeSearch);
    container.addEventListener('click', (e) => { if (e.target === container) closeSearch(); });

    let touchStartX = 0;
    container.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
    container.addEventListener('touchend', (e) => {
      if (e.changedTouches[0].clientX - touchStartX > 80) closeSearch();
    });
  }

  async function startDirectChat(otherUid) {
    const chatId = directChatId(authState.user.uid, otherUid);
    const chatRef = doc(db, "chats", chatId);
    const chatSnap = await getDoc(chatRef);
    let chatData;
    const me = cacheState.usersCache.get(authState.user.uid) || { username: authState.profile?.displayName || "Без имени", avatar: authState.profile?.photoURL || "" };
    const other = cacheState.usersCache.get(otherUid) || await getUserData(otherUid);
    if (!chatSnap.exists()) {
      const newChat = {
        type: "direct", members: [authState.user.uid, otherUid],
        memberUsernames: { [authState.user.uid]: me.username, [otherUid]: other.username },
        memberAvatars: { [authState.user.uid]: me.avatar, [otherUid]: other.avatar },
        createdAt: serverTimestamp(), updatedAt: serverTimestamp(), lastMessage: "", muted: false, pinned: false
      };
      await setDoc(chatRef, newChat);
      chatData = { id: chatId, ...newChat, title: other.username, avatar: other.avatar, lastSeen: other.lastSeen };
    } else {
      const data = chatSnap.data();
      chatData = { id: chatId, ...data, title: other.username, avatar: other.avatar, lastSeen: other.lastSeen };
    }
    openChat(chatData);
    refreshChats();
  }

  async function loadChats() {
    if (!authState.user) return [];
    const q = query(collection(db, "chats"), where("members", "array-contains", authState.user.uid));
    const snap = await getDocs(q);
    const chats = [];
    for (const docSnap of snap.docs) {
      const data = docSnap.data();
      let title = data.title || "Чат";
      let avatar = "";
      let lastSeen = null;
      if (data.type === "direct") {
        const otherUid = (data.members || []).find(m => m !== authState.user.uid);
        if (otherUid) {
          const cached = cacheState.usersCache.get(otherUid);
          if (cached) {
            title = cached.username; avatar = cached.avatar; lastSeen = cached.lastSeen;
          } else if (data.memberUsernames && data.memberAvatars) {
            title = data.memberUsernames[otherUid] || "Пользователь";
            avatar = data.memberAvatars[otherUid] || "";
          } else {
            const user = await getUserData(otherUid);
            if (user) { title = user.username; avatar = user.avatar; lastSeen = user.lastSeen; }
          }
        }
      }
      chats.push({ id: docSnap.id, ...data, title, avatar, lastSeen });
    }
    chats.sort((a, b) => (b.updatedAt?.toMillis() || 0) - (a.updatedAt?.toMillis() || 0));
    return chats;
  }

  async function refreshChats() { chatState.chats = await loadChats(); renderChatsList(chatState.chats, !uiState.chatsAnimated); if (!uiState.chatsAnimated) uiState.chatsAnimated = true; }

      let mismatch = false;
      for (let i = 0; i < renderedSegments.length; i++) {
        if (i >= docs.length || docs[i].id !== renderedSegments[i].docId) { mismatch = true; break; }

      if (mismatch) { renderAllMessages(docs); return; }
      if (docs.length > renderedSegments.length) {

    setTimeout(() => updateLastSeen(), 0);
  }

  async function startVoiceRecording(chatId, voiceBtn) {
    if (!navigator.mediaDevices?.getUserMedia) { alert("Микрофон не доступен"); return; }
    voiceState.cleanup();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      voiceState.mediaStream = stream;
      voiceState.audioChunks = [];
      voiceState.recordingChatId = chatId;

      const audioCtx = new AudioContext();
      const analyser = audioCtx.createAnalyser();
      const source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);
      analyser.fftSize = 64;
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      voiceState.audioCtx = audioCtx;
      voiceState.analyser = analyser;

      const wavesEl = voiceBtn.querySelector('.voice-recording-waves');
      const draw = () => {
        if (!voiceState.mediaRecorder || voiceState.mediaRecorder.state !== 'recording') return;
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
        const scale = Math.min(1 + avg/64, 1.35);
        if (wavesEl) {
          wavesEl.style.transform = `scale(${scale})`;
          wavesEl.style.opacity = 0.4 + avg/256;
        }
      };
      draw();

      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : (MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : ''));
      if (!mimeType) throw new Error('Нет поддержки записи аудио');
      const recorder = new MediaRecorder(stream, { mimeType });
      voiceState.mediaRecorder = recorder;
      recorder.ondataavailable = e => { if (e.data.size > 0) voiceState.audioChunks.push(e.data); };
      recorder.onstop = async () => {
        if (wavesEl) { wavesEl.style.transform = 'scale(1)'; wavesEl.style.opacity = '0'; }
        if (voiceState.audioCtx) { voiceState.audioCtx.close(); voiceState.audioCtx = null; }
        const chunks = [...voiceState.audioChunks];
        voiceState.cleanup();
        voiceBtn.classList.remove('recording', 'locked');
        if (chunks.length === 0) return;
        const blob = new Blob(chunks, { type: mimeType });
        try { await uploadAudioAndSendMessage(chatId, blob); } catch (e) { console.error(e); }
      };
      recorder.start();
      voiceBtn.classList.add('recording');
    } catch (err) { voiceState.cleanup(); voiceBtn.classList.remove('recording', 'locked'); alert("Ошибка микрофона: " + (err.message || '')); }
  }
  window.addEventListener('beforeunload', () => voiceState.cleanup());

  async function uploadAudioAndSendMessage(chatId, blob) {
    const messagesRef = collection(db, "chats", chatId, "messages");
    const newMsgRef = doc(messagesRef);
    const storageRef = ref(storage, `chats/${chatId}/audio/${newMsgRef.id}.webm`);
    try {
      await uploadBytesResumable(storageRef, blob);
      const downloadURL = await getDownloadURL(storageRef);
      const audioEl = document.createElement('audio'); audioEl.src = downloadURL; let duration = 0;
      await new Promise((resolve) => { audioEl.addEventListener('loadedmetadata', () => { duration = audioEl.duration; resolve(); }); audioEl.load(); });
      await setDoc(newMsgRef, { type: 'audio', audioURL: downloadURL, duration, userId: authState.user.uid, createdAt: serverTimestamp() });
      await updateDoc(doc(db, "chats", chatId), { lastMessage: "♫ Голосовое", lastMessageUserId: authState.user.uid, updatedAt: serverTimestamp() });
    } catch (error) { console.error(error); alert("Не удалось отправить голосовое."); }
  }

  function setupGlobalMessageListener() {
    if (!authState.user || chatState.globalChatsUnsub) return;
    const q = query(collection(db, "chats"), where("members", "array-contains", authState.user.uid));
    chatState.globalChatsUnsub = onSnapshot(q, snap => {
      snap.docChanges().forEach(change => {
        if (change.type === "modified") {
          const chat = change.doc.data(); const chatId = change.doc.id;
          if (chat.lastMessageUserId && chat.lastMessageUserId !== authState.user.uid && chatState.activeChat?.id !== chatId) {
            if (Notification.permission === 'granted') { new Notification(`${chat.title||'NEON'} ✉`, { body: chat.lastMessage, icon: '/neon/icon-192x192.png' }).onclick = () => { window.focus(); const c = chatState.chats.find(x => x.id === chatId); if (c) openChat(c); }; }
            refreshChats();
          }
        }
      });
    });
  }

  async function requestNotificationPermissionAndGetToken() {
    if (!messaging) return null;
    try {
      const reg = await navigator.serviceWorker.register('/neon/firebase-messaging-sw.js');
      await navigator.serviceWorker.ready;
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        const token = await getToken(messaging, { vapidKey: 'BDRTV4EZNNWVT9_dRipTDFG_JHwJa53Ne82UgG5g6XdgLWufZumogCNM8EQK_T-Qg9fZDeCEq7_R6DchHcfWXZQ', serviceWorkerRegistration: reg });
        if (token) { authState.fcmToken = token; return token; }
      }
    } catch (e) { console.error(e); }
    return null;
  }

  async function saveFCMTokenToFirestore(uid, token) { if (!uid || !token) return; await updateDoc(doc(db, "users", uid), { fcmTokens: arrayUnion(token) }).catch(() => {}); }

  if (messaging) { onMessage(messaging, payload => { if (payload.notification) new Notification(payload.notification.title, { body: payload.notification.body, icon: '/neon/icon-192x192.png' }); }); }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && authState.user) {
      updateLastSeen();
      if (uiState.page === 'chats') { if (chatState.globalChatsUnsub) { chatState.globalChatsUnsub(); chatState.globalChatsUnsub = null; } setupGlobalMessageListener(); refreshChats(); }
      if (uiState.page === 'wall') { if (chatState.wallUnsub) { chatState.wallUnsub(); chatState.wallUnsub = null; } setupWallListener(); loadAndRenderWall(); }
      if (chatState.activeChat) { const c = chatState.activeChat; if (chatState.chatUnsub) { chatState.chatUnsub(); chatState.chatUnsub = null; } openChat(c); }
    }
  });

  function setupSwipeNavigation() {
    const pagesOrder = ['chats', 'wall', 'profile'];
    let touchStartX = 0, touchStartY = 0;
    const handler = (e) => {
      if (e.target.closest('button') || e.target.closest('input') || e.target.closest('textarea')) return;
      if (e.type === 'touchstart') { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }
      else if (e.type === 'touchend') {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
          const idx = pagesOrder.indexOf(uiState.page);
          if (dx < 0 && idx < pagesOrder.length-1) switchPage(pagesOrder[idx+1]);
          else if (dx > 0 && idx > 0) switchPage(pagesOrder[idx-1]);
        }
      }
    };
    root.addEventListener('touchstart', handler);
    root.addEventListener('touchend', handler);
  }

  function boot() {
    loadTheme();
    setInterval(() => { if (authState.user && document.visibilityState === 'visible') updateLastSeen(); }, 4*60*1000);
    onAuthStateChanged(auth, async (user) => {
      if (!uiState.splashHidden) { setTimeout(hideSplash, 1500); }
      if (!user) { authState.user = null; authState.profile = null; chatState.chats = []; chatState.wallPosts = []; uiState.chatsAnimated = false; cacheState.usersCache.clear(); cacheState.allUsers = null; cacheState.lastSeenCache.clear(); if (chatState.chatUnsub) chatState.chatUnsub(); if (chatState.globalChatsUnsub) chatState.globalChatsUnsub(); if (chatState.wallUnsub) chatState.wallUnsub(); showLogin(); return; }
      let profile = await getUserData(user.uid);
      if (!profile) profile = await ensureProfile(user, user.displayName || "Без имени", user.photoURL || "");
      authState.user = { uid: user.uid, phoneNumber: user.phoneNumber || profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL };
      authState.profile = profile;
      await updateLastSeen();
      await preloadAllUsers();
      if (uiState.page === 'profile') renderProfilePage();
      else switchToChatsPage();
      if (!uiState.isIOS) { const token = await requestNotificationPermissionAndGetToken(); if (token) await saveFCMTokenToFirestore(authState.user.uid, token); }
    });
  }
  boot();
</script>
</body>
