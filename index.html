<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NEON MESSENGER | чаты + стена</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
      min-height: 100vh;
      color: #d8f8ff;
    }

    .glass {
      background: rgba(15, 25, 45, 0.45);
      backdrop-filter: blur(16px) saturate(180%);
      border-radius: 32px;
      border: 1px solid rgba(0, 255, 255, 0.35);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 18px rgba(0, 255, 255, 0.2);
      transition: all 0.3s;
    }

    .glass:hover {
      border-color: #0ff;
      box-shadow: 0 0 28px rgba(0, 255, 255, 0.5);
    }

    .neon-input {
      background: rgba(10, 20, 40, 0.7);
      border: 1px solid #0ff;
      border-radius: 60px;
      padding: 14px 20px;
      color: #0ff;
      font-size: 16px;
      outline: none;
      width: 100%;
    }

    .neon-input:focus {
      box-shadow: 0 0 14px #0ff;
    }

    .neon-btn {
      background: linear-gradient(135deg, rgba(0,255,255,0.08), rgba(255,0,255,0.08));
      border: 1px solid #0ff;
      border-radius: 60px;
      padding: 12px 24px;
      font-weight: bold;
      color: #0ff;
      cursor: pointer;
      transition: 0.2s;
      text-transform: uppercase;
    }

    .neon-btn:hover {
      background: #0ff;
      color: black;
      box-shadow: 0 0 20px #0ff;
    }

    .bottom-nav {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 480px;
      background: rgba(5, 10, 25, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 60px;
      display: flex;
      justify-content: space-around;
      padding: 8px 12px;
      border: 1px solid #0ff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #88aaff;
      background: none;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
    }

    .nav-item.active {
      background: rgba(0, 255, 255, 0.2);
      color: #0ff;
      text-shadow: 0 0 5px #0ff;
      box-shadow: 0 0 8px #0ff;
    }

    .nav-icon { font-size: 26px; }

    .page { display: none; animation: fade 0.3s; }
    .page.active-page { display: block; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 28px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      transition: 0.2s;
    }

    .chat-item:hover {
      background: rgba(0, 255, 255, 0.1);
      transform: translateX(5px);
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0ff, #f0f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 8px cyan;
      flex-shrink: 0;
    }

    .badge {
      background: #f0f;
      color: black;
      border-radius: 40px;
      padding: 2px 10px;
      font-size: 11px;
      margin-left: 8px;
      display: inline-block;
    }

    .message {
      max-width: 75%;
      padding: 10px 18px;
      border-radius: 24px;
      margin-bottom: 8px;
      word-wrap: break-word;
    }

    .message.out {
      align-self: flex-end;
      background: #0a2a3a;
      border: 1px solid #0ff;
      color: #0ff;
    }

    .message.in {
      align-self: flex-start;
      background: #1a1a2e;
      border: 1px solid #88f;
      color: #ccd;
    }

    .messages-area {
      height: calc(100vh - 170px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    .wall-post {
      background: rgba(10, 15, 30, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid #0ff;
    }

    @media (max-width: 768px) {
      .avatar { width: 44px; height: 44px; font-size: 24px; }
      .message { max-width: 85%; }
    }

    .loading {
      text-align: center;
      color: #0ff;
      padding: 20px;
    }

    #recaptcha-container {
      display: block !important;
      visibility: visible !important;
      min-height: 78px;
      width: 100%;
      margin: 16px 0 0 0;
      position: relative;
      z-index: 10000;
      overflow: visible;
    }

    textarea {
      resize: vertical;
      outline: none;
    }

    button {
      outline: none;
    }
  </style>
</head>
<body>
  <div id="root"><div class="loading">✨ Загрузка...</div></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA9gA_Nvei89csa7_YrmbnbnxFngb0UKoM",
      authDomain: "neon-messenger-83ed4.firebaseapp.com",
      projectId: "neon-messenger-83ed4",
      storageBucket: "neon-messenger-83ed4.firebasestorage.app",
      messagingSenderId: "954172505610",
      appId: "1:954172505610:web:03f56a8a5b89f2d402a9f3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    auth.languageCode = 'ru';

    let currentUser = null;
    let activeChatUnsubscribe = null;
    let recaptchaVerifier = null;

    function resetCaptcha() {
      try {
        if (recaptchaVerifier) {
          recaptchaVerifier.clear();
        }
      } catch (e) {
        console.error('Ошибка при очистке капчи:', e);
      }
      recaptchaVerifier = null;
      const container = document.getElementById('recaptcha-container');
      if (container) container.innerHTML = '';
    }

    async function createCaptcha(containerId) {
      resetCaptcha();
      try {
        recaptchaVerifier = new firebase.auth.RecaptchaVerifier(containerId, {
          size: 'normal',
          callback: () => console.log('reCAPTCHA решена'),
          'expired-callback': () => {
            console.log('reCAPTCHA истекла');
            resetCaptcha();
          }
        });
        await recaptchaVerifier.render();
        return recaptchaVerifier;
      } catch (err) {
        console.error('Ошибка при создании капчи:', err);
        alert('Ошибка инициализации reCAPTCHA. Проверьте консоль.');
        throw err;
      }
    }

    async function loginWithPhone(phone, containerId) {
      try {
        const verifier = await createCaptcha(containerId);
        const confirmation = await auth.signInWithPhoneNumber(phone, verifier);
        const code = prompt('Введите код из SMS:');
        if (!code) {
          resetCaptcha();
          throw new Error('Код не введён');
        }
        const userCred = await confirmation.confirm(code);
        resetCaptcha();
        return userCred.user;
      } catch (err) {
        console.error('Ошибка входа:', err);
        resetCaptcha();
        throw err;
      }
    }

    async function updateUserProfile(user, username, avatar) {
      const userRef = db.collection('users').doc(user.uid);
      const snap = await userRef.get();

      if (!snap.exists) {
        await userRef.set({
          phone: user.phoneNumber || '',
          username: username || 'Без имени',
          avatar: avatar || '👤',
          isSubscribed: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } else {
        await userRef.update({
          username: username || snap.data().username || 'Без имени',
          avatar: avatar || snap.data().avatar || '👤'
        });
      }

      const freshSnap = await userRef.get();
      const data = freshSnap.data() || {};

      return {
        uid: user.uid,
        phoneNumber: user.phoneNumber || data.phone || '',
        displayName: data.username || username || 'Без имени',
        photoURL: data.avatar || avatar || '👤'
      };
    }

    async function loadChats() {
      try {
        const snapshot = await db.collection('chats')
          .where('members', 'array-contains', currentUser.uid)
          .get();
        const chats = [];

        for (const docSnap of snapshot.docs) {
          const data = docSnap.data();
          let name = data.name || 'Чат';
          let avatar = '👤';

          if (data.type === 'direct') {
            const otherId = (data.members || []).find(m => m !== currentUser.uid);
            if (otherId) {
              const userSnap = await db.collection('users').doc(otherId).get();
              if (userSnap.exists) {
                name = userSnap.data().username || 'Пользователь';
                avatar = userSnap.data().avatar || '👤';
              }
            }
          }

          let lastMessage = '';
          const lastMsgSnap = await db.collection('chats')
            .doc(docSnap.id)
            .collection('messages')
            .orderBy('timestamp', 'desc')
            .limit(1)
            .get();

          if (!lastMsgSnap.empty) {
            lastMessage = lastMsgSnap.docs[0].data().text || '';
          }

          chats.push({
            id: docSnap.id,
            name,
            avatar,
            lastMessage,
            unread: 0,
            members: data.members || []
          });
        }

        return chats;
      } catch (err) {
        console.error('Ошибка при загрузке чатов:', err);
        return [];
      }
    }

    function renderChatsList(chats, onChatSelect) {
      const container = document.getElementById('chatsList');
      if (!container) return;

      container.innerHTML = '';

      if (chats.length === 0) {
        container.innerHTML = '<div class="loading">✨ Нет чатов. Нажмите + чтобы создать новый.</div>';
        return;
      }

      chats.forEach(chat => {
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.innerHTML = `
          <div class="avatar">${chat.avatar}</div>
          <div style="min-width:0; flex:1;">
            <div class="chat-name" style="font-weight:700; color:#fff;">
              ${chat.name}
              ${chat.unread > 0 ? `<span class="badge">${chat.unread}</span>` : ''}
            </div>
            <div class="last-msg" style="font-size:13px; color:#9db7d3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
              ${chat.lastMessage || 'Нет сообщений'}
            </div>
          </div>
        `;
        div.onclick = () => onChatSelect(chat.id, chat.name, chat.avatar);
        container.appendChild(div);
      });
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function openChat(chatId, chatName, chatAvatar) {
      const chatsPage = document.getElementById('chatsPage');

      chatsPage.innerHTML = `
        <div class="glass" style="padding:12px; height:calc(100vh - 120px); display:flex; flex-direction:column;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:12px;">
            <button id="backToChatsBtn" style="background:none; font-size:28px; color:cyan; border:none; cursor:pointer;">←</button>
            <div style="display:flex; align-items:center; gap:10px; flex:1; justify-content:center;">
              <div class="avatar" style="width:40px; height:40px; font-size:22px;">${chatAvatar}</div>
              <h3 style="color:#fff; text-align:center;">${escapeHtml(chatName)}</h3>
            </div>
            <div style="width:28px;"></div>
          </div>

          <div id="chatMessagesArea" class="messages-area" style="flex:1;"></div>

          <div style="display:flex; gap:8px; margin-top:12px;">
            <input type="text" id="messageInput" class="neon-input" style="flex:1;" placeholder="Сообщение...">
            <button id="sendMsgBtn" class="neon-btn">➤</button>
          </div>
        </div>
      `;

      const messagesContainer = document.getElementById('chatMessagesArea');

      if (activeChatUnsubscribe) activeChatUnsubscribe();

      activeChatUnsubscribe = db.collection('chats')
        .doc(chatId)
        .collection('messages')
        .orderBy('timestamp', 'asc')
        .onSnapshot((snapshot) => {
          messagesContainer.innerHTML = '';
          snapshot.forEach(docSnap => {
            const msg = docSnap.data();
            const isOut = msg.userId === currentUser.uid;

            const div = document.createElement('div');
            div.className = `message ${isOut ? 'out' : 'in'}`;

            const time = msg.timestamp
              ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
              : '';

            div.innerHTML = `
              <div>${escapeHtml(msg.text || '')}</div>
              <div style="font-size:10px; opacity:0.7; margin-top:4px;">${time}</div>
            `;
            messagesContainer.appendChild(div);
          });

          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });

      document.getElementById('backToChatsBtn').onclick = () => {
        if (activeChatUnsubscribe) activeChatUnsubscribe();
        renderMainApp();
      };

      document.getElementById('sendMsgBtn').onclick = async () => {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;

        await db.collection('chats')
          .doc(chatId)
          .collection('messages')
          .add({
            text,
            userId: currentUser.uid,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });

        input.value = '';
      };

      document.getElementById('messageInput').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('sendMsgBtn').click();
        }
      });
    }

    async function createNewChat() {
      const snapshot = await db.collection('users').get();
      const users = [];

      snapshot.forEach(userDoc => {
        if (userDoc.id !== currentUser.uid) {
          users.push({
            id: userDoc.id,
            name: userDoc.data().username || 'Пользователь',
            avatar: userDoc.data().avatar || '👤'
          });
        }
      });

      if (users.length === 0) {
        alert('Нет других пользователей для чата');
        return;
      }

      const userList = users.map((u, idx) => `${idx + 1}. ${u.name} ${u.avatar}`).join('\n');
      const choice = prompt(`Выберите пользователя для чата:\n${userList}\n\nВведите номер:`);
      const index = parseInt(choice, 10) - 1;
      const selected = users[index];
      if (!selected) return;

      const existing = await db.collection('chats')
        .where('members', 'array-contains', currentUser.uid)
        .get();

      let chatExists = false;
      existing.forEach(docSnap => {
        const data = docSnap.data();
        if (data.type === 'direct' && (data.members || []).includes(selected.id)) {
          chatExists = true;
        }
      });

      if (chatExists) {
        alert('Чат с этим пользователем уже существует');
        return;
      }

      await db.collection('chats').add({
        type: 'direct',
        members: [currentUser.uid, selected.id],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      alert('Чат создан!');
      renderMainApp();
    }

    async function loadWallPosts() {
      const snapshot = await db.collection('wall')
        .orderBy('timestamp', 'desc')
        .get();
      return snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
    }

    function renderWallPosts(posts, onLike, onComment) {
      const container = document.getElementById('wallPostsContainer');
      if (!container) return;

      container.innerHTML = '';

      if (posts.length === 0) {
        container.innerHTML = '<div class="loading">📡 Ещё нет постов. Напиши первый!</div>';
        return;
      }

      posts.forEach(post => {
        const div = document.createElement('div');
        div.className = 'wall-post';

        const author = post.author || 'Аноним';
        const avatar = post.avatar || '👤';
        const content = post.content || '';
        const likesCount = post.likesCount || 0;
        const comments = post.comments || [];

        div.innerHTML = `
          <div class="post-header" style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
            <div class="avatar" style="width:44px; height:44px; font-size:24px;">${avatar}</div>
            <strong style="color:#fff;">${escapeHtml(author)}</strong>
          </div>

          <div style="white-space:pre-wrap; line-height:1.45;">${escapeHtml(content)}</div>

          <div style="display:flex; gap:16px; margin-top:12px;">
            <button class="like-btn neon-btn" data-id="${post.id}" style="padding:8px 14px;">❤️ ${likesCount}</button>
            <button class="comment-btn neon-btn" data-id="${post.id}" style="padding:8px 14px;">💬 ${comments.length}</button>
          </div>

          <div id="comments-${post.id}" style="margin-top:12px;">
            ${comments.map(c => `<div style="background:rgba(0,255,255,0.1); border-radius:20px; padding:6px 12px; margin-top:6px;">💬 ${escapeHtml(c)}</div>`).join('')}
          </div>
        `;

        container.appendChild(div);
      });

      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.onclick = () => onLike(btn.dataset.id);
      });

      document.querySelectorAll('.comment-btn').forEach(btn => {
        btn.onclick = () => {
          const comment = prompt('Ваш комментарий:');
          if (comment && comment.trim()) onComment(btn.dataset.id, comment.trim());
        };
      });
    }

    async function publishPost(content) {
      await db.collection('wall').add({
        author: currentUser.displayName || 'Без имени',
        avatar: currentUser.photoURL || '👤',
        content,
        likesCount: 0,
        comments: [],
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        userId: currentUser.uid
      });
    }

    async function likePost(postId) {
      const postRef = db.collection('wall').doc(postId);
      const snap = await postRef.get();

      if (snap.exists) {
        const newLikes = (snap.data().likesCount || 0) + 1;
        await postRef.update({ likesCount: newLikes });
      }
    }

    async function commentPost(postId, comment) {
      const postRef = db.collection('wall').doc(postId);
      await postRef.update({
        comments: firebase.firestore.FieldValue.arrayUnion(comment)
      });
    }

    async function renderMainApp() {
      const root = document.getElementById('root');

      root.innerHTML = `
        <div style="max-width:1300px; margin:0 auto; padding:16px; padding-bottom:90px;">
          <div id="chatsPage" class="page active-page">
            <div class="glass" style="padding:18px;">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="text-shadow:0 0 5px #0ff; color:#fff;">💬 NEON CHATS</h2>
                <button id="newChatBtn" style="background:none; color:cyan; font-size:28px; border:1px solid cyan; border-radius:40px; padding:4px 16px; cursor:pointer;">+</button>
              </div>
              <div id="chatsList"><div class="loading">Загрузка чатов...</div></div>
            </div>
          </div>

          <div id="wallPage" class="page">
            <div class="glass" style="padding:18px;">
              <h2 style="margin-bottom:20px; text-shadow:0 0 5px #0ff; color:#fff;">📡 КИБЕР-СТЕНА</h2>
              <textarea id="postContent" rows="2" placeholder="Опубликовать пост..." style="width:100%; border-radius:28px; background:#0a0f1f; border:1px solid cyan; color:cyan; padding:12px;"></textarea>
              <div style="display:flex; justify-content:flex-end; margin-top:10px;">
                <button id="publishPostBtn" class="neon-btn">⚡ ЗАПУСТИТЬ</button>
              </div>
              <div id="wallPostsContainer"><div class="loading">Загрузка постов...</div></div>
            </div>
          </div>

          <div id="profilePage" class="page">
            <div class="glass" style="padding:28px; text-align:center;">
              <div id="profileAvatar" style="width:100px; height:100px; border-radius:50%; margin:0 auto 20px; background:linear-gradient(135deg, cyan, magenta); display:flex; align-items:center; justify-content:center; font-size:48px;">
                ${escapeHtml(currentUser.photoURL || '👤')}
              </div>
              <h3 id="profileUsername" style="font-size:26px; color:#fff;">${escapeHtml(currentUser.displayName || 'Без имени')}</h3>
              <p style="color:#99f; margin-top:8px;">${escapeHtml(currentUser.phoneNumber || '')}</p>
              <hr style="margin:24px 0; border-color:cyan;">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#fff;">💎 NEON PREMIUM</span>
                <span id="subStatus" class="badge" style="background:#0ff;">НЕАКТИВНА</span>
              </div>
              <button id="manageSubBtn" class="neon-btn" style="margin-top:24px; width:100%;">🔓 Активировать (49₽/мес)</button>
              <button id="logoutBtn" style="background:none; border:1px solid magenta; color:magenta; margin-top:20px; width:100%; padding:10px; border-radius:40px; cursor:pointer;">ВЫЙТИ</button>
            </div>
          </div>
        </div>

        <div class="bottom-nav">
          <button class="nav-item active" data-page="chats"><span class="nav-icon">💬</span><span>ЧАТЫ</span></button>
          <button class="nav-item" data-page="wall"><span class="nav-icon">📡</span><span>СТЕНА</span></button>
          <button class="nav-item" data-page="profile"><span class="nav-icon">👾</span><span>ПРОФИЛЬ</span></button>
        </div>
      `;

      let chats = await loadChats();
      renderChatsList(chats, (chatId, name, avatar) => openChat(chatId, name, avatar));

      let wallPosts = await loadWallPosts();
      renderWallPosts(wallPosts, async (postId) => {
        await likePost(postId);
        wallPosts = await loadWallPosts();
        renderWallPosts(wallPosts, likePost, commentPost);
      }, async (postId, comment) => {
        await commentPost(postId, comment);
        wallPosts = await loadWallPosts();
        renderWallPosts(wallPosts, likePost, commentPost);
      });

      const pages = {
        chats: document.getElementById('chatsPage'),
        wall: document.getElementById('wallPage'),
        profile: document.getElementById('profilePage')
      };

      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = async () => {
          const pageId = btn.dataset.page;

          Object.values(pages).forEach(p => p.classList.remove('active-page'));
          pages[pageId].classList.add('active-page');

          document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          if (pageId === 'wall') {
            wallPosts = await loadWallPosts();
            renderWallPosts(wallPosts, likePost, commentPost);
          }

          if (pageId === 'profile') {
            document.getElementById('profileUsername').innerText = currentUser.displayName || 'Без имени';
            document.getElementById('profileAvatar').innerHTML = escapeHtml(currentUser.photoURL || '👤');
          }
        };
      });

      document.getElementById('newChatBtn').onclick = () => createNewChat();

      document.getElementById('publishPostBtn').onclick = async () => {
        const content = document.getElementById('postContent').value.trim();
        if (!content) return;

        await publishPost(content);
        document.getElementById('postContent').value = '';

        wallPosts = await loadWallPosts();
        renderWallPosts(wallPosts, likePost, commentPost);
      };

      document.getElementById('manageSubBtn').onclick = () => {
        alert('💳 Подписка 49₽/мес. Реквизиты: 40817810099910004312 (демо).');
      };

      document.getElementById('logoutBtn').onclick = async () => {
        await auth.signOut();
        currentUser = null;
        localStorage.removeItem('neon_user');
        renderLogin();
      };
    }

    function renderLogin() {
      document.getElementById('root').innerHTML = `
        <div class="glass" style="max-width:500px; margin:60px auto; padding:30px">
          <h2 style="color:#0ff; text-align:center">🔮 NEON LOGIN</h2>

          <input id="phone" class="neon-input" placeholder="Номер телефона (+79991234567)" style="margin-top:16px;">
          <input id="name" class="neon-input" placeholder="Ваше имя" style="margin-top:10px;">

          <div id="recaptcha-container"></div>

          <button id="login" class="neon-btn" style="width:100%; margin-top:10px">Войти / Регистрация</button>

          <div style="margin-top:12px; font-size:12px; color:#88aaff; line-height:1.4;">
            Для работы телефона в Firebase должен быть включён Phone Auth и добавлен домен в Authorized domains.
          </div>
        </div>
      `;

      document.getElementById('login').onclick = async () => {
        const btn = document.getElementById('login');
        const phone = document.getElementById('phone').value.trim();
        const username = document.getElementById('name').value.trim();

        if (!phone || !username) {
          alert('Введите номер телефона и имя');
          return;
        }

        btn.disabled = true;
        btn.textContent = '...';

        try {
          const user = await loginWithPhone(phone, 'recaptcha-container');
          const userData = await updateUserProfile(user, username, '👤');

          currentUser = {
            uid: userData.uid,
            phoneNumber: userData.phoneNumber,
            displayName: userData.displayName,
            photoURL: userData.photoURL
          };

          localStorage.setItem('neon_user', JSON.stringify(currentUser));
          renderMainApp();
        } catch (err) {
          console.error(err);
          alert('Ошибка входа: ' + (err?.message || 'Неизвестная ошибка'));
          renderLogin();
        } finally {
          btn.disabled = false;
          btn.textContent = 'Войти / Регистрация';
        }
      };
    }

    auth.onAuthStateChanged(async (user) => {
      console.log('AUTH STATE:', user);

      if (user) {
        const userSnap = await db.collection('users').doc(user.uid).get();

        if (!userSnap.exists) {
          renderLogin();
          return;
        }

        currentUser = {
          uid: user.uid,
          phoneNumber: user.phoneNumber || userSnap.data().phone || '',
          displayName: userSnap.data().username || 'Без имени',
          photoURL: userSnap.data().avatar || '👤'
        };

        localStorage.setItem('neon_user', JSON.stringify(currentUser));
        renderMainApp();
      } else {
        const saved = localStorage.getItem('neon_user');
        if (saved) localStorage.removeItem('neon_user');
        renderLogin();
      }
    });
  </script>
</body>
</html>
