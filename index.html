<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NEON MESSENGER | чаты + стена</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
            min-height: 100vh;
            color: #d8f8ff;
        }

        .glass {
            background: rgba(15, 25, 45, 0.45);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 18px rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .glass:hover {
            border-color: #0ff;
            box-shadow: 0 0 28px rgba(0, 255, 255, 0.5);
        }
        .neon-input {
            background: rgba(10, 20, 40, 0.7);
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 14px 20px;
            color: #0ff;
            font-size: 16px;
            outline: none;
            width: 100%;
        }

        .neon-input:focus {
            box-shadow: 0 0 14px #0ff;
        }

        .neon-btn {
            background: linear-gradient(135deg, rgba(0,255,255,0.08), rgba(255,0,255,0.08));
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: bold;
            color: #0ff;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .neon-btn:hover {
            background: #0ff;
            color: black;
            box-shadow: 0 0 20px #0ff;
        }

        .loading {
            text-align: center;
            color: #0ff;
            padding: 20px;
        }

        textarea {
            resize: vertical;
            outline: none;
        }

        button {
            outline: none;
        }
    </style>
</head>
<body>
<div id="root"><div class="loading">✨ Загрузка...</div></div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
    }
}
</script>

<script type="module">
import { initializeApp } from 'firebase/app';
import { 
    getAuth, 
    signInWithPhoneNumber, 
    RecaptchaVerifier, 
    onAuthStateChanged, 
    signOut 
} from 'firebase/auth';
import { 
    getFirestore, 
    collection, 
    doc, 
    setDoc, 
    getDoc, 
    query, 
    where, 
    onSnapshot, 
    addDoc, 
    updateDoc, 
    serverTimestamp 
} from 'firebase/firestore';

// ===== FIREBASE CONFIG =====
const firebaseConfig = {
    apiKey: "AIzaSyA9gA_Nvei89csa7_YrmbnbnxFngb0UKoM",
    authDomain: "neon-messenger-83ed4.firebaseapp.com",
    projectId: "neon-messenger-83ed4",
    storageBucket: "neon-messenger-83ed4.appspot.com",
    messagingSenderId: "954172505610",
    appId: "1:954172505610:web:03f56a8a5b89f2d402a9f3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

auth.languageCode = 'ru';

let currentUser = null;
let recaptchaVerifier = null;

// ===== HELPER FUNCTIONS =====
function resetCaptcha() {
    if (recaptchaVerifier) {
        recaptchaVerifier.clear();
        recaptchaVerifier = null;
    }

    const container = document.getElementById('recaptcha-container');
    if (container) {
        container.innerHTML = '';
    }
}

async function createCaptcha(containerId) {
    resetCaptcha();

    const container = document.getElementById(containerId);
    recaptchaVerifier = new RecaptchaVerifier(containerId, {
        size: 'normal',
        callback: () => console.log('reCAPTCHA solved'),
        'expired-callback': () => resetCaptcha()
    }, auth);

    await recaptchaVerifier.render();
}

// ===== LOGIN =====
async function loginWithPhone(phone, containerId) {
    await createCaptcha(containerId);

    try {
        const confirmation = await signInWithPhoneNumber(auth, phone, recaptchaVerifier);
        const code = prompt('Введите код из SMS:');
        if (!code) throw new Error('Код не введён');
        const userCredential = await confirmation.confirm(code); 
        return userCredential.user;
    } catch (error) {
        console.error('Login error:', error);
        resetCaptcha();
        throw error;
    }
}

// ===== USER INITIALIZATION =====
async function setUpUser(user, username) {
    const userRef = doc(db, 'users', user.uid);
    const docSnap = await getDoc(userRef);

    if (!docSnap.exists()) {
        await setDoc(userRef, {
            username,
            phone: user.phoneNumber || '',
            avatar: '👤',
            createdAt: serverTimestamp(),
        });
    }
    return {
        uid: user.uid,
        phoneNumber: user.phoneNumber,
        displayName: username,
        photoURL: '👤'
    };
}

// ===== RENDER LOGIN =====
function renderLogin() {
    const root = document.getElementById('root');
    root.innerHTML = `
        <div class="glass" style="max-width:500px; margin:60px auto; padding:30px">
            <h2 style="color:#0ff; text-align:center">🔮 NEON LOGIN</h2>

            <input id="phone" class="neon-input" placeholder="Номер телефона (+79991234567)" style="margin-top:16px;">
            <input id="name" class="neon-input" placeholder="Ваше имя" style="margin-top:10px;">

            <div id="recaptcha-container"></div>

            <button id="login" class="neon-btn" style="width:100%; margin-top:10px">Войти / Регистрация</button>
        </div>
    `;

    document.getElementById('login').onclick = async () => {
        const phone = document.getElementById('phone').value.trim();
        const username = document.getElementById('name').value.trim();

        if (!phone || !username) {
            alert('Введите номер телефона и имя.');
            return;
        }

        try {
            const firebaseUser = await loginWithPhone(phone, 'recaptcha-container');
            currentUser = await setUpUser(firebaseUser, username);
            console.log('User setup complete:', currentUser);
            // Render main app logic can be added here
        } catch (error) {
            alert(`Ошибка входа: ${error.message}`);
            renderLogin();
        }
    };
}

// ===== AUTH STATE =====
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        console.log('User signed in:', currentUser);
        // Render logic for app's UI...
    } else {
        renderLogin();
    }
});
</script>
</body>
</html>
