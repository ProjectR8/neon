<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NEON Messenger | Чаты + Стена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
            min-height: 100vh;
            color: #d8f8ff;
        }

        .glass {
            background: rgba(15, 25, 45, 0.45);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 18px rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .glass:hover {
            border-color: #0ff;
            box-shadow: 0 0 28px rgba(0, 255, 255, 0.5);
        }

        .neon-input {
            background: rgba(10, 20, 40, 0.7);
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 14px 20px;
            color: #0ff;
            font-size: 16px;
            outline: none;
            width: 100%;
        }

        .neon-input:focus {
            box-shadow: 0 0 14px #0ff;
        }

        .neon-btn {
            background: linear-gradient(135deg, rgba(0,255,255,0.08), rgba(255,0,255,0.08));
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: bold;
            color: #0ff;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .neon-btn:hover {
            background: #0ff;
            color: black;
            box-shadow: 0 0 20px #0ff;
        }

        .loading {
            text-align: center;
            color: #0ff;
            padding: 20px;
        }

        textarea, button, input {
            outline: none;
            border-radius: 6px;
        }

        textarea {
            resize: none;
        }

    </style>
</head>
<body>
<div id="root"><div class="loading">✨ Загрузка...</div></div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
    }
}
</script>

<script type="module">
import { initializeApp } from 'firebase/app';
import { 
    getAuth, 
    signInWithPhoneNumber, 
    RecaptchaVerifier, 
    onAuthStateChanged, 
    signOut 
} from 'firebase/auth';
import { 
    getFirestore, 
    collection, 
    doc,
    setDoc,
    getDoc,
    query,
    where,
    onSnapshot,
    serverTimestamp 
} from 'firebase/firestore';

// ===== Firebase Configuration =====
const firebaseConfig = {
    apiKey: "AIzaSy...Вашключ...",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_APPID",
    messagingSenderId: "12345678998120",
    appId: "ВАШ_APP_ID"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

auth.languageCode = 'ru';

let currentUser = null;
let recaptchaVerifier;

// --- Reset and Initialize Captcha ---
function resetCaptcha() {
    if (recaptchaVerifier) {
        recaptchaVerifier.clear();
        recaptchaVerifier = null;
    }

    const container = document.getElementById('recaptcha-container');
    if (container) {
        container.innerHTML = '';
    }
}

async function createCaptcha(containerId) {
    resetCaptcha();

    recaptchaVerifier = new RecaptchaVerifier(containerId, {
        size: 'normal',
        callback: () => console.log('reCAPTCHA passed'),
        'expired-callback': () => console.error('reCAPTCHA expired')
    }, auth);

    await recaptchaVerifier.render();
}

// --- User Authentication ---
async function loginWithPhone(phone, containerId) {
    await createCaptcha(containerId);

    try {
        const confirmationResult = await signInWithPhoneNumber(auth, phone, recaptchaVerifier);
        const code = prompt('Введите код из SMS.');

        if (!code) {
            throw new Error('Код не введён');
        }

        const userCredentials = await confirmationResult.confirm(code);
        return userCredentials.user;
    } catch (error) {
        console.error('Ошибка при входе:', error);
        resetCaptcha();
        throw error;
    }
}

// --- Firebase User Initialization ---
async function setUpUser(user, username) {
    const userRef = doc(db, 'users', user.uid);
    const docSnapshot = await getDoc(userRef);

    if (!docSnapshot.exists()) {
        await setDoc(userRef, {
            username: username || 'Аноним',
            phoneNumber: user.phoneNumber,
            createdAt: serverTimestamp()
        });
    }
}

// --- Render Login Screen ---
function renderLogin() {
    document.getElementById('root').innerHTML = `
        <div class="glass" style="max-width:500px; margin:60px auto; padding:30px">
            <h2 style="color:#0ff; text-align:center">🔮 Вход в NEON</h2>

            <input id="phone" type="text" class="neon-input" placeholder="+79991234567" style="margin-top:16px;">
            <input id="username" type="text" class="neon-input" placeholder="Ваше имя">

            <div id="recaptcha-container"></div>

            <button id="login" class="neon-btn" style="width:100%; margin-top:16px;">Войти</button>
        </div>
    `;

    document.getElementById('login').addEventListener('click', async () => {
        const phone = document.getElementById('phone').value.trim();
        const username = document.getElementById('username').value.trim();

        if (!phone || !username) {
            alert('Пожалуйста, заполните все поля.');
            return;
        }

        try {
            const firebaseUser = await loginWithPhone(phone, 'recaptcha-container');
            await setUpUser(firebaseUser, username);

            currentUser = firebaseUser;
            alert('Вход успешно выполнен!');
            console.log('Пользователь:', currentUser);
        } catch (error) {
            console.error('Ошибка входа:', error);
            alert('Ошибка входа. Пожалуйста, повторите попытку.');
        }
    });
}

// --- Observe Authentication State ---
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        console.log('Пользователь авторизован:', currentUser);
        renderMainApp();
    } else {
        renderLogin();
    }
});
</script>
</body>
</html>
