<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NEON MESSENGER | чаты + стена</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
      color: #d8f8ff;
    }

    .glass {
      background: rgba(15, 25, 45, 0.45);
      backdrop-filter: blur(16px) saturate(180%);
      border-radius: 32px;
      border: 1px solid rgba(0, 255, 255, 0.35);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 18px rgba(0, 255, 255, 0.2);
      transition: all 0.3s;
    }

    .glass:hover {
      border-color: #0ff;
      box-shadow: 0 0 28px rgba(0, 255, 255, 0.5);
    }

    .neon-input {
      background: rgba(10, 20, 40, 0.7);
      border: 1px solid #0ff;
      border-radius: 60px;
      padding: 14px 20px;
      color: #0ff;
      font-size: 16px;
      outline: none;
      width: 100%;
    }

    .neon-input:focus {
      box-shadow: 0 0 14px #0ff;
    }

    .neon-btn {
      background: linear-gradient(135deg, rgba(0,255,255,0.08), rgba(255,0,255,0.08));
      border: 1px solid #0ff;
      border-radius: 60px;
      padding: 12px 24px;
      font-weight: bold;
      color: #0ff;
      cursor: pointer;
      transition: 0.2s;
      text-transform: uppercase;
    }

    .neon-btn:hover:not(:disabled) {
      background: #0ff;
      color: black;
      box-shadow: 0 0 20px #0ff;
    }

    .neon-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .bottom-nav {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 480px;
      background: rgba(5, 10, 25, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 60px;
      display: flex;
      justify-content: space-around;
      padding: 8px 12px;
      border: 1px solid #0ff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #88aaff;
      background: none;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
    }

    .nav-item.active {
      background: rgba(0, 255, 255, 0.2);
      color: #0ff;
      text-shadow: 0 0 5px #0ff;
      box-shadow: 0 0 8px #0ff;
    }

    .nav-icon { font-size: 26px; }

    .page { display: none; animation: fade 0.25s; }
    .page.active-page { display: block; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 28px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      transition: 0.2s;
    }

    .chat-item:hover {
      background: rgba(0, 255, 255, 0.1);
      transform: translateX(5px);
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0ff, #f0f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 8px cyan;
      flex-shrink: 0;
    }

    .badge {
      background: #f0f;
      color: black;
      border-radius: 40px;
      padding: 2px 10px;
      font-size: 11px;
      margin-left: 8px;
      display: inline-block;
    }

    .message {
      max-width: 75%;
      padding: 10px 18px;
      border-radius: 24px;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .message.out {
      align-self: flex-end;
      background: #0a2a3a;
      border: 1px solid #0ff;
      color: #0ff;
    }

    .message.in {
      align-self: flex-start;
      background: #1a1a2e;
      border: 1px solid #88f;
      color: #ccd;
    }

    .messages-area {
      height: calc(100vh - 170px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    .wall-post {
      background: rgba(10, 15, 30, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid #0ff;
    }

    .loading {
      text-align: center;
      color: #0ff;
      padding: 20px;
    }

    #recaptcha-container {
      display: block !important;
      visibility: visible !important;
      min-height: 78px;
      width: 100%;
      margin: 16px 0 0 0;
      position: relative;
      z-index: 10000;
      overflow: visible;
    }

    textarea {
      resize: vertical;
      outline: none;
    }

    button {
      outline: none;
    }

    @media (max-width: 768px) {
      .avatar { width: 44px; height: 44px; font-size: 24px; }
      .message { max-width: 85%; }
    }
  </style>
</head>
<body>
  <div id="root"><div class="loading">✨ Загрузка...</div></div>

  <script type="module">
    // ВСЕ ИМПОРТЫ ДОЛЖНЫ БЫТЬ В САМОМ ВЕРХУ
    // >>>>>>>>>>>>>> ИМПОРТЫ ДЛЯ СОВМЕСТИМОГО (COMPAT) РЕЖИМА: ЗАГРУЖАЕМ ИХ ДЛЯ ПОБОЧНОГО ЭФФЕКТА СОЗДАНИЯ ГЛОБАЛЬНОГО `window.firebase` <<<<<<<<<<<<<<<<
    // *** ВНИМАНИЕ: Ссылки на SDK теперь полные и корректные! ***
    import "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js";
    import "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js";
    import "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js";
    import "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js";
    import "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js";



    // ТЕПЕРЬ firebaseConfig, а затем все остальное
    const firebaseConfig = {
      apiKey: "AIzaSyA9gA_Nvei89csa7_YrmbnbnxFngb0UKoM",
      authDomain: "neon-messenger-83ed4.firebaseapp.com",
      projectId: "neon-messenger-83ed4",
      storageBucket: "neon-messenger-83ed4.firebasestorage.app",
      messagingSenderId: "954172505610",
      appId: "1:954172505610:web:03f56a8a5b89f2d402a9f3"
    };

    // >>>>>>>>>>>>>> ИЗМЕНЕННАЯ ИНИЦИАЛИЗАЦИЯ И ПОЛУЧЕНИЕ СЕРВИСОВ <<<<<<<<<<<<<<<<
    const app = window.firebase.initializeApp(firebaseConfig);
    const auth = window.firebase.auth(app);
// ====> ВОТ ЗДЕСЬ ДОЛЖНО БЫТЬ ИЗМЕНЕНИЕ:
    const db = window.firebase.firestore(app, 'neonmess');// Используем firebase.firestore
    auth.languageCode = "ru";

    const messaging = firebase.messaging(app); // Используем firebase.messaging
    const storage = firebase.storage(app); // Используем firebase.storage
    // >>>>>>>>>>>>>> КОНЕЦ ИЗМЕНЕННОЙ ИНИЦИАЛИЗАЦИИ <<<<<<<<<<<<<<<<


    const state = {
      user: null,
      profile: null,
      page: "chats",
      chats: [],
      wallPosts: [],
      activeChat: null,
      chatUnsub: null,
      captcha: null,
      // >>>>>>>>>>>>>> НАЧАЛО НОВОГО ПОЛЯ FCM <<<<<<<<<<<<<<<<
      fcmToken: null // Для хранения FCM токена
      // >>>>>>>>>>>>>> КОНЕЦ НОВОГО ПОЛЯ FCM <<<<<<<<<<<<<<<<<
    };

    const root = document.getElementById("root");

    const escapeHtml = (value) =>
      String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    const directChatId = (uid1, uid2) => [uid1, uid2].sort().join("__");

    function resetCaptcha() {
      try {
        if (state.captcha) state.captcha.clear();
      } catch {}
      state.captcha = null;
      const container = document.getElementById("recaptcha-container");
      if (container) container.innerHTML = "";
    }

    async function createCaptcha(containerId) {
      resetCaptcha();
      // >>>>>>>>>>>>>> ИЗМЕНЕНО: firebase.auth.RecaptchaVerifier <<<<<<<<<<<<<<<<
      const verifier = new firebase.auth.RecaptchaVerifier(containerId, {
        size: "normal",
        callback: () => console.log("reCAPTCHA solved"),
        "expired-callback": () => resetCaptcha()
      });
      await verifier.render();
      return verifier;
    }

    async function loginWithPhone(phone, containerId) {
      const verifier = await createCaptcha(containerId);
      // >>>>>>>>>>>>>> ИЗМЕНЕНО: auth.signInWithPhoneNumber <<<<<<<<<<<<<<<<
      const confirmation = await auth.signInWithPhoneNumber(phone, verifier);
      const code = prompt("Введите код из SMS:");
      if (!code) throw new Error("Код не введён");
      const result = await confirmation.confirm(code);
      resetCaptcha();
      return result.user;
    }

    async function ensureProfile(user, username, avatar) {
      // >>>>>>>>>>>>>> ИЗМЕНЕНО: db.collection("users").doc(user.uid) <<<<<<<<<<<<<<<<
      const ref = db.collection("users").doc(user.uid);
      const snap = await ref.get();

      const baseData = {
        phone: user.phoneNumber || "",
        username: username || snap.data()?.username || "Без имени",
        avatar: avatar || snap.data()?.avatar || "👤",
        // >>>>>>>>>>>>>> ИЗМЕНЕНО: firebase.firestore.FieldValue.serverTimestamp() <<<<<<<<<<<<<<<<
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      if (!snap.exists()) {
        await ref.set({
          ...baseData,
          // >>>>>>>>>>>>>> ИЗМЕНЕНО: firebase.firestore.FieldValue.serverTimestamp() <<<<<<<<<<<<<<<<
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          isSubscribed: false,
          fcmTokens: [] // Инициализируем массив FCM токенов при создании профиля
        });
      } else if (username || avatar) {
        await ref.update(baseData);
      }

      const fresh = await ref.get();
      const data = fresh.data() || {};

      return {
        uid: user.uid,
        phoneNumber: data.phone || "",
        displayName: data.username || "Без имени",
        photoURL: data.avatar || "👤"
      };
    }

    async function loadProfile(uid) {
      // >>>>>>>>>>>>>> ИЗМЕНЕНО: db.collection("users").doc(uid).get() <<<<<<<<<<<<<<<<
      const snap = await db.collection("users").doc(uid).get();
      if (!snap.exists()) return null;
      const data = snap.data();
      return {
        uid,
        phoneNumber: data.phone || "",
        displayName: data.username || "Без имени",
        photoURL: data.avatar || "👤"
      };
    }

    async function loadChats() {
      if (!state.user) return [];
      // >>>>>>>>>>>>>> ИЗМЕНЕНО: db.collection("chats").where().get() <<<<<<<<<<<<<<<<
      const snap = await db.collection("chats")
        .where("members", "array-contains", state.user.uid)
        .get();

      const chats = await Promise.all(
        snap.docs.map(async (chatDoc) => {
          const data = chatDoc.data();
          let title = data.title || "Чат";
          let avatar = "👤";

          if (data.type === "direct") {
            const otherUid = (data.members || []).find((m) => m !== state.user.uid);
            if (otherUid) {
              const otherProfile = await loadProfile(otherUid);
              if (otherProfile) {
                title = otherProfile.displayName;
                avatar = otherProfile.photoURL;
              }
            }
          }

          return {
            id: chatDoc.id,
            ...data,
            title,
            avatar
          };
        })
      );

      chats.sort((a, b) => {
        const ta = a.updatedAt?.toMillis ? a.updatedAt.toMillis() : 0;
        const tb = b.updatedAt?.toMillis ? b.updatedAt.toMillis() : 0;
        return tb - ta;
      });

      return chats;
    }

    async function loadWallPosts() {
      // >>>>>>>>>>>>>> ИЗМЕНЕНО: db.collection("wall").orderBy().get() <<<<<<<<<<<<<<<<
      const snap = await db.collection("wall")
        .orderBy("createdAt", "desc")
        .get();
      return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    }

    function showLogin() {
      root.innerHTML = `
        <div class="glass" style="max-width:520px; margin:56px auto; padding:30px;">
          <h2 style="color:#0ff; text-align:center;">🔮 NEON LOGIN</h2>

          <input id="phone" class="neon-input" placeholder="Номер телефона (+79991234567)" style="margin-top:16px;">
          <input id="name" class="neon-input" placeholder="Ваше имя" style="margin-top:10px;">
          <input id="avatar" class="neon-input" placeholder="Аватар-эмодзи (например 👾)" style="margin-top:10px;">

          <div id="recaptcha-container"></div>

          <button id="loginBtn" class="neon-btn" style="width:100%; margin-top:10px;">Войти / Регистрация</button>

          <div style="margin-top:12px; font-size:12px; color:#88aaff; line-height:1.4;">
            Для Phone Auth в Firebase должен быть включён номерной вход и добавлен домен сайта в разрешённые домены.
          </div>
        </div>
      `;

      document.getElementById("loginBtn").onclick = async () => {
        const btn = document.getElementById("loginBtn");
        const phone = document.getElementById("phone").value.trim();
        const name = document.getElementById("name").value.trim();
        const avatar = document.getElementById("avatar").value.trim();

        if (!phone || !name) {
          alert("Введите номер телефона и имя");
          return;
        }

        btn.disabled = true;
        btn.textContent = "...";

        try {
          const user = await loginWithPhone(phone, "recaptcha-container");
          const profile = await ensureProfile(user, name, avatar || "👤");
          state.user = {
            uid: profile.uid,
            phoneNumber: profile.phoneNumber,
            displayName: profile.displayName,
            photoURL: profile.photoURL
          };
          state.profile = profile;
          renderApp();
          // Запрашиваем FCM токен после успешного логина
          const token = await requestNotificationPermissionAndGetToken();
          if (token && state.user) {
            await saveFCMTokenToFirestore(state.user.uid, token);
          }
        } catch (err) {
          console.error(err);
          alert("Ошибка входа: " + (err?.message || "неизвестная ошибка"));
          showLogin();
        } finally {
          const currentBtn = document.getElementById("loginBtn");
          if (currentBtn) {
            currentBtn.disabled = false;
            currentBtn.textContent = "Войти / Регистрация";
          }
        }
      };
    }

    function renderNav(active) {
      return `
        <div class="bottom-nav">
          <button class="nav-item ${active === "chats" ? "active" : ""}" data-page="chats">
            <span class="nav-icon">💬</span><span>ЧАТЫ</span>
          </button>
          <button class="nav-item ${active === "wall" ? "active" : ""}" data-page="wall">
            <span class="nav-icon">📡</span><span>СТЕНА</span>
          </button>
          <button class="nav-item ${active === "profile" ? "active" : ""}" data-page="profile">
            <span class="nav-icon">👾</span><span>ПРОФИЛЬ</span>
          </button>
        </div>
      `;
    }

    function renderChatsList() {
      const list = document.getElementById("chatsList");
      if (!list) return;

      if (!state.chats.length) {
        list.innerHTML = `<div class="loading">✨ Нет чатов. Нажмите + чтобы создать новый.</div>`;
        return;
      }

      list.innerHTML = state.chats.map((chat) => {
        const unread = chat.unreadCount || 0;
        return `
          <div class="chat-item" data-chat-id="${chat.id}">
            <div class="avatar">${escapeHtml(chat.avatar || "👤")}</div>
            <div style="min-width:0; flex:1;">
              <div style="font-weight:700; color:#fff;">
                ${escapeHtml(chat.title || "Чат")}
                ${unread > 0 ? `<span class="badge">${unread}</span>` : ""}
              </div>
              <div style="font-size:13px; color:#9db7d3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                ${escapeHtml(chat.lastMessage || "Нет сообщений")}
              </div>
            </div>
          </div>
        `;
      }).join("");

      list.querySelectorAll(".chat-item").forEach((el) => {
        el.onclick = () => {
          const chat = state.chats.find((c) => c.id === el.dataset.chatId);
          if (chat) openChat(chat);
        };
      });
    }

    function renderChatsPage() {
      root.innerHTML = `
        <div style="max-width:1300px; margin:0 auto; padding:16px; padding-bottom:90px;">
          <div id="chatsPage" class="page active-page">
            <div class="glass" style="padding:18px;">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="text-shadow:0 0 5px #0ff; color:#fff;">💬 NEON CHATS</h2>
                <button id="newChatBtn" style="background:none; color:cyan; font-size:28px; border:1px solid cyan; border-radius:40px; padding:4px 16px; cursor:pointer;">+</button>
              </div>
              <div id="chatsList"><div class="loading">Загрузка чатов...</div></div>
            </div>
          </div>

          <div id="wallPage" class="page"></div>
          <div id="profilePage" class="page"></div>
        </div>
        ${renderNav("chats")}
      `;

      document.getElementById("newChatBtn").onclick = createNewChat;

      document.querySelectorAll(".nav-item").forEach((btn) => {
        btn.onclick = async () => {
          const page = btn.dataset.page;
          state.page = page;
          if (page === "chats") return renderApp();
          if (page === "wall") return renderWallPage();
          if (page === "profile") return renderProfilePage();
        };
      });

      renderChatsList();
    }

    function renderWallPage() {
      root.innerHTML = `
        <div style="max-width:1300px; margin:0 auto; padding:16px; padding-bottom:90px;">
          <div id="wallPage" class="page active-page">
            <div class="glass" style="padding:18px;">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="text-shadow:0 0 5px #0ff; color:#fff;">📡 КИБЕР-СТЕНА</h2>
                <button id="refreshWallBtn" class="neon-btn" style="padding:8px 14px;">↻</button>
              </div>

              <textarea id="postContent" rows="2" placeholder="Опубликовать пост..." style="width:100%; border-radius:28px; background:#0a0f1f; border:1px solid cyan; color:cyan; padding:12px;"></textarea>

              <div style="display:flex; justify-content:flex-end; margin-top:10px;">
                <button id="publishPostBtn" class="neon-btn">⚡ ЗАПУСТИТЬ</button>
              </div>

              <div id="wallPostsContainer" style="margin-top:18px;"><div class="loading">Загрузка постов...</div></div>
            </div>
          </div>

          <div id="chatsPage" class="page"></div>
          <div id="profilePage" class="page"></div>
        </div>
        ${renderNav("wall")}
      `;

      document.getElementById("publishPostBtn").onclick = publishPost;
      document.getElementById("refreshWallBtn").onclick = async () => {
        await loadAndRenderWall();
      };

      document.querySelectorAll(".nav-item").forEach((btn) => {
        btn.onclick = async () => {
          const page = btn.dataset.page;
          state.page = page;
          if (page === "chats") return renderApp();
          if (page === "wall") return renderWallPage();
          if (page === "profile") return renderProfilePage();
        };
      });

      loadAndRenderWall();
    }

    function renderProfilePage() {
      const profile = state.profile || state.user || { displayName: "Без имени", phoneNumber: "", photoURL: "👤" };

      root.innerHTML = `
        <div style="max-width:1300px; margin:0 auto; padding:16px; padding-bottom:90px;">
          <div id="profilePage" class="page active-page">
            <div class="glass" style="padding:28px; text-align:center;">
              <div id="profileAvatar" style="width:100px; height:100px; border-radius:50%; margin:0 auto 20px; background:linear-gradient(135deg, cyan, magenta); display:flex; align-items:center; justify-content:center; font-size:48px;">
                ${escapeHtml(profile.photoURL || "👤")}
              </div>

              <h3 id="profileUsername" style="font-size:26px; color:#fff;">${escapeHtml(profile.displayName || "Без имени")}</h3>
              <p style="color:#99f; margin-top:8px;">${escapeHtml(profile.phoneNumber || "")}</p>

              <hr style="margin:24px 0; border-color:cyan;">

              <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#fff;">💎 NEON PREMIUM</span>
                <span class="badge" style="background:#0ff;">НЕАКТИВНА</span>
              </div>

              <button id="editProfileBtn" class="neon-btn" style="margin-top:16px; width:100%;">✏️ Изменить профиль</button>
              <button id="logoutBtn" style="background:none; border:1px solid magenta; color:magenta; margin-top:20px; width:100%; padding:10px; border-radius:40px; cursor:pointer;">ВЫЙТИ</button>
            </div>
          </div>

          <div id="chatsPage" class="page"></div>
          <div id="wallPage" class="page"></div>
        </div>
        ${renderNav("profile")}
      `;

      document.getElementById("editProfileBtn").onclick = async () => {
        const username = prompt("Новое имя:", profile.displayName || "");
        if (username === null) return;
        const avatar = prompt("Новый аватар-эмодзи:", profile.photoURL || "👤");
        if (avatar === null) return;

        await updateDoc(doc(db, "users", state.user.uid), {
          username: username.trim() || "Без имени",
          avatar: avatar.trim() || "👤",
          updatedAt: serverTimestamp()
        });

        state.profile = {
          ...profile,
          displayName: username.trim() || "Без имени",
          photoURL: avatar.trim() || "👤"
        };
        state.user.displayName = state.profile.displayName;
        state.user.photoURL = state.profile.photoURL;
        renderProfilePage();
      };

      document.getElementById("logoutBtn").onclick = async () => {
        await signOut(auth);
        state.user = null;
        state.profile = null;
        state.chats = [];
        state.wallPosts = [];
        if (state.chatUnsub) {
          state.chatUnsub();
          state.chatUnsub = null;
        }
        showLogin();
      };

      document.querySelectorAll(".nav-item").forEach((btn) => {
        btn.onclick = async () => {
          const page = btn.dataset.page;
          state.page = page;
          if (page === "chats") return renderApp();
          if (page === "wall") return renderWallPage();
          if (page === "profile") return renderProfilePage();
        };
      });
    }

    function renderApp() {
      if (state.page === "wall") return renderWallPage();
      if (state.page === "profile") return renderProfilePage();
      renderChatsPage();
      refreshChats();
    }

    async function refreshChats() {
      state.chats = await loadChats();
      renderChatsList();
    }

    async function loadAndRenderWall() {
      state.wallPosts = await loadWallPosts();
      const container = document.getElementById("wallPostsContainer");
      if (!container) return;

      if (!state.wallPosts.length) {
        container.innerHTML = `<div class="loading">📡 Ещё нет постов. Напиши первый!</div>`;
        return;
      }

      container.innerHTML = state.wallPosts.map((post) => {
        const comments = post.comments || [];
        return `
          <div class="wall-post" data-post-id="${post.id}">
            <div class="post-header" style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
              <div class="avatar" style="width:44px; height:44px; font-size:24px;">${escapeHtml(post.avatar || "👤")}</div>
              <strong style="color:#fff;">${escapeHtml(post.author || "Аноним")}</strong>
            </div>

            <div style="white-space:pre-wrap; line-height:1.45;">${escapeHtml(post.content || "")}</div>

            <div style="display:flex; gap:16px; margin-top:12px;">
              <button class="like-btn neon-btn" data-post-id="${post.id}" style="padding:8px 14px;">❤️ ${post.likesCount || 0}</button>
              <button class="comment-btn neon-btn" data-post-id="${post.id}" style="padding:8px 14px;">💬 ${comments.length}</button>
            </div>

            <div class="comments" style="margin-top:12px;">
              ${comments.map((c) => `
                <div style="background:rgba(0,255,255,0.1); border-radius:20px; padding:6px 12px; margin-top:6px;">
                  💬 ${escapeHtml(c)}
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll(".like-btn").forEach((btn) => {
        btn.onclick = async () => {
          const postId = btn.dataset.postId;
          await updateDoc(doc(db, "wall", postId), { likesCount: increment(1) });
          await loadAndRenderWall();
        };
      });

      container.querySelectorAll(".comment-btn").forEach((btn) => {
        btn.onclick = async () => {
          const postId = btn.dataset.postId;
          const comment = prompt("Ваш комментарий:");
          if (!comment || !comment.trim()) return;
          await updateDoc(doc(db, "wall", postId), {
            comments: arrayUnion(comment.trim())
          });
          await loadAndRenderWall();
        };
      });
    }

    async function publishPost() {
      const input = document.getElementById("postContent");
      if (!input) return;
      const content = input.value.trim();
      if (!content) return;

      await addDoc(collection(db, "wall"), {
        author: state.profile?.displayName || state.user?.displayName || "Без имени",
        avatar: state.profile?.photoURL || state.user?.photoURL || "👤",
        content,
        likesCount: 0,
        comments: [],
        createdAt: serverTimestamp(),
        userId: state.user.uid
      });

      input.value = "";
      await loadAndRenderWall();
    }

    async function openChat(chat) {
      if (state.chatUnsub) {
        state.chatUnsub();
        state.chatUnsub = null;
      }

      state.activeChat = chat;

      const chatTitle = chat.type === "direct" ? chat.title : (chat.title || "Чат");
      const chatAvatar = chat.avatar || "👤";

      root.innerHTML = `
        <div style="max-width:1300px; margin:0 auto; padding:16px; padding-bottom:90px;">
          <div class="glass" style="padding:12px; height:calc(100vh - 120px); display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:12px;">
              <button id="backToChatsBtn" style="background:none; font-size:28px; color:cyan; border:none; cursor:pointer;">←</button>
              <div style="display:flex; align-items:center; gap:10px; flex:1; justify-content:center;">
                <div class="avatar" style="width:40px; height:40px; font-size:22px;">${escapeHtml(chatAvatar)}</div>
                <h3 style="color:#fff; text-align:center;">${escapeHtml(chatTitle)}</h3>
              </div>
              <div style="width:28px;"></div>
            </div>

            <div id="chatMessagesArea" class="messages-area" style="flex:1;"></div>

            <div style="display:flex; gap:8px; margin-top:12px;">
              <input type="text" id="messageInput" class="neon-input" style="flex:1;" placeholder="Сообщение...">
              <button id="sendMsgBtn" class="neon-btn">➤</button>
            </div>
          </div>
        </div>
      `;

      const messagesContainer = document.getElementById("chatMessagesArea");
      const messagesRef = collection(db, "chats", chat.id, "messages");
      const messagesQuery = query(messagesRef, orderBy("createdAt", "asc"));

      state.chatUnsub = onSnapshot(messagesQuery, (snapshot) => {
        messagesContainer.innerHTML = "";
        snapshot.forEach((msgDoc) => {
          const msg = msgDoc.data();
          const isOut = msg.userId === state.user.uid;
          const time = msg.createdAt?.toDate
            ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
            : "";

          const div = document.createElement("div");
          div.className = `message ${isOut ? "out" : "in"}`;
          div.innerHTML = `
            <div>${escapeHtml(msg.text || "")}</div>
            <div style="font-size:10px; opacity:0.7; margin-top:4px;">${time}</div>
          `;
          messagesContainer.appendChild(div);
        });
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      });

      document.getElementById("backToChatsBtn").onclick = () => {
        if (state.chatUnsub) {
          state.chatUnsub();
          state.chatUnsub = null;
        }
        state.activeChat = null;
        state.page = "chats";
        renderApp();
      };

      document.getElementById("sendMsgBtn").onclick = sendMessage;
      document.getElementById("messageInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });

      async function sendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text) return;

        await addDoc(messagesRef, {
          text,
          userId: state.user.uid,
          createdAt: serverTimestamp()
        });

        await updateDoc(doc(db, "chats", chat.id), {
          lastMessage: text,
          updatedAt: serverTimestamp()
        });

        input.value = "";
      }
    }

    async function createNewChat() {
      const usersSnap = await getDocs(collection(db, "users"));
      const users = [];

      usersSnap.forEach((d) => {
        if (d.id !== state.user.uid) {
          const data = d.data();
          users.push({
            uid: d.id,
            username: data.username || "Пользователь",
            avatar: data.avatar || "👤"
          });
        }
      });

      if (!users.length) {
        alert("Нет других пользователей для чата");
        return;
      }

      const choice = prompt(
        "Выберите пользователя для чата:\n\n" +
        users.map((u, i) => `${i + 1}. ${u.username} ${u.avatar}`).join("\n") +
        "\n\nВведите номер:"
      );

      const index = parseInt(choice, 10) - 1;
      const selected = users[index];
      if (!selected) return;

      const chatId = directChatId(state.user.uid, selected.uid);
      const chatRef = doc(db, "chats", chatId);
      const snap = await getDoc(chatRef);

      if (!snap.exists()) {
        await setDoc(chatRef, {
          type: "direct",
          members: [state.user.uid, selected.uid],
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          lastMessage: ""
        });
      }

      state.chats = await loadChats();
      const chat = state.chats.find((c) => c.id === chatId);
      if (chat) openChat(chat);
    }

    async function boot() {
      auth.onAuthStateChanged(async (user) => { // <--- ИСПРАВЛЕНО: теперь это метод объекта 'auth'
        if (!user) {
          state.user = null;
          state.profile = null;
          state.chats = [];
          state.wallPosts = [];
          if (state.chatUnsub) { // Этот блок я не увидел в вашем предыдущем сокращенном коде, но он должен быть здесь.
              state.chatUnsub();
              state.chatUnsub = null;
          }
          showLogin();
          return;
        }

        let profile = await loadProfile(user.uid);
        if (!profile) {
          profile = await ensureProfile(user, user.displayName || "Без имени", user.photoURL || "👤");
        }

        state.user = {
          uid: user.uid,
          phoneNumber: user.phoneNumber || profile.phoneNumber || "",
          displayName: profile.displayName || "Без имени",
          photoURL: profile.photoURL || "👤"
        };
        state.profile = profile;
        state.page = "chats";
        renderApp();

        // После успешного входа, запрашиваем разрешение на уведомления
        const token = await requestNotificationPermissionAndGetToken();
        if (token && state.user) {
          await saveFCMTokenToFirestore(state.user.uid, token);
        }
      });
    }

        // ====================================================================
    // >>>>>>>>>>>>>> НАЧАЛО НОВОГО КОДА ДЛЯ FCM <<<<<<<<<<<<<<<<
    // ====================================================================

    // Запрашиваем разрешение на уведомления и получаем токен
    async function requestNotificationPermissionAndGetToken() {
      try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          console.log('Разрешение на уведомления получено.');
          // Получаем токен устройства для FCM
          const currentToken = await getToken(messaging, {
            vapidKey: 'BDRTV4EZNNWVT9_dRipTDFG_JHwJa53Ne82UgG5g6XdgLWufZumogCNM8EQK_T-Qg9fZDeCEq7_R6DchHcfWXZQ' // <-- ОБЯЗАТЕЛЬНО ЗАМЕНИТЕ НА ВАШ КЛЮЧ VAPID
          });
          if (currentToken) {
            console.log('FCM Device Token:', currentToken);
            state.fcmToken = currentToken;
            // Сохраняем токен в Firestore для текущего пользователя
            if (state.user) {
              await saveFCMTokenToFirestore(state.user.uid, currentToken);
            }
            return currentToken;
          } else {
            console.warn('Не удалось получить токен устройства. Убедитесь, что браузер поддерживает Service Worker и разрешения не заблокированы.');
          }
        } else {
          console.warn('Разрешение на уведомления отклонено.');
        }
      } catch (error) {
        console.error('Ошибка при запросе разрешения на уведомления или получении токена:', error);
      }
      return null;
    }

    // Функция для сохранения FCM токена в Firestore
    async function saveFCMTokenToFirestore(uid, token) {
      if (!uid || !token) return;
      try {
        const userRef = doc(db, "users", uid);
        await updateDoc(userRef, {
          fcmTokens: arrayUnion(token) // Сохраняем токены в массиве, чтобы у пользователя могло быть несколько устройств
        });
        console.log(`FCM токен для пользователя ${uid} сохранен/обновлен.`);
      } catch (error) {
        console.error('Ошибка при сохранении FCM токена в Firestore:', error);
      }
    }

    // Слушаем входящие сообщения, когда приложение находится на переднем плане
    messaging.onMessage((payload) => { // Убран первый аргумент 'messaging'
      console.log('Сообщение получено на переднем плане:', payload);
      // Здесь вы можете показать кастомное уведомление или обновить UI
      // Например, с помощью Notification API
      if (payload.notification) {
        new Notification(payload.notification.title, {
          body: payload.notification.body,
          icon: payload.notification.icon || '/firebase-logo.png' // Укажите путь к вашей иконке
        });
      }
    });

    // ====================================================================
    // >>>>>>>>>>>>>> КОНЕЦ НОВОГО КОДА ДЛЯ FCM <<<<<<<<<<<<<<<<
    // ====================================================================
    boot();
  </script>
</body>
