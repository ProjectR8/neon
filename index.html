<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <title>NEON MESSENGER | STABLE</title>
  <style>
    /* === общие стили (без изменений) === */
    :root { --bg: #0a0f1f; --surface: rgba(15, 25, 45, 0.7); --surface-border: rgba(0, 255, 255, 0.35); --text-primary: #d8f8ff; --text-secondary: #9db7d3; --accent: #0ff; --accent-glow: rgba(0, 255, 255, 0.5); --danger: #ff5580; --premium: #f5c542; --safe-bottom: env(safe-area-inset-bottom, 20px); --radius-lg: 32px; --radius-md: 24px; --radius-sm: 18px; --font: 'Montserrat', system-ui, -apple-system, sans-serif; --transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); --glass-blur: 22px; --bg-image: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b); }
    body.theme-neon { --bg: #0a0f1f; --surface: rgba(15, 25, 45, 0.7); --surface-border: rgba(0, 255, 255, 0.35); --text-primary: #d8f8ff; --text-secondary: #9db7d3; --accent: #0ff; --accent-glow: rgba(0, 255, 255, 0.5); --danger: #ff5580; --bg-image: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b); }
    body.theme-minimal { --bg: #0a0a0a; --surface: rgba(18, 18, 18, 0.8); --surface-border: rgba(255, 255, 255, 0.06); --text-primary: #f0f0f0; --text-secondary: #a0a0a0; --accent: #c8a96e; --accent-glow: rgba(200, 169, 110, 0.3); --danger: #b05a5a; --bg-image: radial-gradient(ellipse at 50% 0%, #1a1a1a 0%, #0a0a0a 70%); }
    body.theme-glass { --bg: #15202b; --surface: rgba(30, 40, 50, 0.65); --surface-border: rgba(255, 255, 255, 0.08); --text-primary: #e7e9ec; --text-secondary: #8b98a5; --accent: #1da1f2; --accent-glow: rgba(29, 161, 242, 0.35); --danger: #e0245e; --glass-blur: 28px; --bg-image: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 70%); }
    * { margin:0; padding:0; box-sizing:border-box; font-family:var(--font); }
    body { min-height: 100vh; min-height: calc(var(--vh, 1vh) * 100); background: var(--bg); background-image: var(--bg-image); color: var(--text-primary); -webkit-tap-highlight-color: transparent; touch-action: manipulation; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
    .glass { background: var(--surface); backdrop-filter: blur(var(--glass-blur)) saturate(180%); -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%); border-radius: var(--radius-lg); border: 1px solid var(--surface-border); box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 12px var(--accent-glow); transition: var(--transition); }
    .glass:hover { border-color: var(--accent); box-shadow: 0 0 28px var(--accent-glow), 0 8px 32px rgba(0,0,0,0.6); }
    .neon-input { background: rgba(255,255,255,0.04); border: 1px solid var(--surface-border); border-radius: 60px; padding: 14px 20px; color: var(--text-primary); font-size: 16px; outline: none; width: 100%; transition: var(--transition); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); font-weight: 600; }
    .neon-input:focus { border-color: var(--accent); box-shadow: 0 0 18px var(--accent-glow); }
    textarea.neon-input { border-radius: 28px; resize: vertical; }
    .neon-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--surface-border); border-radius: 60px; padding: 12px 24px; font-weight: 700; color: var(--text-primary); cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: inline-flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; }
    .neon-btn::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, var(--accent-glow), transparent 70%); opacity: 0; transition: opacity 0.4s; }
    .neon-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); border-color: var(--accent); box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
    .neon-btn:active:not(:disabled) { transform: scale(0.97); }
    .neon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; display: flex; justify-content: center; gap: 0; padding: 10px 0 calc(10px + var(--safe-bottom)); background: var(--surface); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur)); border-radius: 34px 34px 0 0; border: 1px solid var(--surface-border); border-bottom: none; box-shadow: 0 -4px 20px rgba(0,0,0,0.5), 0 0 8px var(--accent-glow); z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); border: none; background: transparent; cursor: pointer; transition: 0.3s; position: relative; height: 64px; }
    .nav-item.active { color: var(--accent); text-shadow: 0 0 8px var(--accent-glow); }
    .nav-item.active::after { content: ''; position: absolute; bottom: 4px; width: 40px; height: 4px; background: var(--accent); border-radius: 4px; box-shadow: 0 0 12px var(--accent-glow); animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(10px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .nav-icon { font-size: 24px; transition: transform 0.3s; }
    .nav-item.active .nav-icon { transform: scale(1.15); }
    .nav-label { font-size: 10px; font-weight: 700; margin-top: 4px; letter-spacing: 0.5px; }

    .page { display: none; }
    .page.visible-page { display: block; animation: fadeSlide 0.3s ease; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .chat-item { display: flex; align-items: center; gap: 16px; padding: 14px 18px; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); background: transparent; margin-bottom: 6px; }
    .chat-item:active { background: rgba(255,255,255,0.03); transform: scale(0.98); }
    .avatar { position: relative; width: 52px; height: 52px; min-width: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), rgba(0,0,0,0.3)); background-size: 160% 160%; background-position: center; border: 1px solid var(--surface-border); display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); overflow: hidden; transition: var(--transition); }
    .online-dot { position: absolute; bottom: 4px; right: 4px; width: 13px; height: 13px; background: #4caf50; border-radius: 50%; border: 2px solid var(--bg); box-shadow: 0 0 8px rgba(76,175,80,0.6); animation: breathe 2s infinite; }
    @keyframes breathe { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.2); opacity:0.8; } }
    .premium-badge { position: absolute; top: -4px; right: -4px; font-size: 18px; filter: drop-shadow(0 0 6px var(--premium)); z-index: 2; }
    .wall-post { background:var(--surface); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-radius:var(--radius-md); padding:20px; margin-bottom:16px; border:1px solid var(--surface-border); transition:var(--transition); box-shadow:0 10px 30px rgba(0,0,0,0.5); }
    .comment-thread { margin-top:16px; padding-left:16px; border-left: 1px solid var(--surface-border); }
    .comment-item { background: rgba(255,255,255,0.02); border-radius: 18px; padding: 10px 14px; margin-top: 12px; border: 1px solid var(--surface-border); }
    .loading { text-align:center; color:var(--text-secondary); padding:28px; letter-spacing:1px; animation:pulseText 2.4s infinite; }
    @keyframes pulseText { 0%,100%{ opacity:0.4; } 50%{ opacity:0.8; } }
    #recaptcha-container { display:block!important; visibility:visible!important; min-height:78px; width:100%; margin:16px 0 0 0; }
    #search-modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    #search-modal-overlay.hidden { display: none; }
    #search-modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--surface-border); box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 20px var(--accent-glow); width: 100%; max-width: 420px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
    #search-modal .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--surface-border); display: flex; justify-content: space-between; align-items: center; color: var(--text-primary); font-weight: 700; }
    #search-modal .modal-body { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; }
    .search-user-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.2s; }
    .search-user-item:hover { background: rgba(255,255,255,0.04); }

    /* === ЧАТ UI === */
    .chat-container { height: 100vh; height: calc(var(--vh, 1vh) * 100); display: flex; flex-direction: column; background: var(--bg); }
    .chat-header { display: flex; align-items: center; padding: 10px 16px; background: var(--surface); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur)); border-bottom: 1px solid var(--surface-border); position: sticky; top: 0; z-index: 10; height: 64px; }
    .back-btn, .delete-btn { background: none; border: none; color: var(--text-primary); font-size: 24px; cursor: pointer; padding: 8px; line-height: 1; }
    .back-btn { margin-right: 8px; }
    .delete-btn { margin-left: auto; }
    .header-info { margin-left: 12px; flex: 1; min-width: 0; }
    .header-title { font-weight: 700; font-size: 16px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-status { font-size: 12px; color: var(--text-secondary); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg); -webkit-overflow-scrolling: touch; }

    .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; margin-bottom: 2px; word-break: break-word; position: relative; font-size: 15px; line-height: 1.4; animation: msgIn 0.25s ease-out; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.out { align-self: flex-end; background: rgba(29, 161, 242, 0.15); border: 1px solid rgba(29, 161, 242, 0.3); }
    .message.in { align-self: flex-start; background: rgba(255, 255, 255, 0.04); }
    .message.out + .message.out { border-top-right-radius: 6px; margin-top: -1px; }
    .message.in + .message.in { border-top-left-radius: 6px; margin-top: -1px; }
    .message .edit-btn { position: absolute; top: 4px; right: 8px; background: rgba(0,0,0,0.5); border: none; color: var(--accent); font-size: 13px; padding: 2px 6px; border-radius: 10px; opacity: 0; transition: opacity 0.2s; }
    .message:hover .edit-btn, .message:active .edit-btn { opacity: 1; }

    .chat-input-area { display: flex; align-items: center; margin: 10px 12px; margin-bottom: calc(10px + var(--safe-bottom)); border-radius: 28px; background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--surface-border); padding: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .chat-input-area .voice-btn { background: none; border: none; color: var(--text-secondary); font-size: 22px; padding: 6px; margin-right: 4px; }
    .chat-input-area .voice-btn.recording { color: var(--accent); }
    #messageInput { flex: 1; background: transparent; border: none; color: var(--text-primary); font-size: 15px; outline: none; padding: 6px 8px; }
    .send-btn { background: var(--accent); border: none; color: var(--bg); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-left: 4px; cursor: pointer; transition: transform 0.2s; flex-shrink: 0; }
    .send-btn:active { transform: scale(0.9); }
    .typing-indicator { padding: 2px 16px; font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; height: 20px; }
    .recording-indicator { text-align: center; color: var(--accent); font-size: 14px; padding: 4px; }
    @media (max-width:480px) { .message { max-width: 85%; } }
  </style>
</head>
<body class="theme-glass">
<div id="root"><div class="loading">✦ Загрузка...</div></div>

<div id="search-modal-overlay" class="hidden">
  <div id="search-modal">
    <div class="modal-header">
      <span>🔍 Новый чат</span>
      <button id="close-search-modal" style="background:none;border:none;color:var(--text-primary);font-size:24px;cursor:pointer;">✕</button>
    </div>
    <div style="padding:8px 16px;">
      <input type="text" id="user-search-input" class="neon-input" placeholder="Поиск по имени..." autocomplete="off" />
    </div>
    <div class="modal-body" id="search-results-container">
      <div class="loading">Загрузка...</div>
    </div>
  </div>
</div>

<script type="module">
  // ===================== 1. FIREBASE ИНИЦИАЛИЗАЦИЯ =====================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { initializeFirestore, enableIndexedDbPersistence, collection, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, addDoc, query, where, orderBy, limit, onSnapshot, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA9gA_Nvei89csa7_YrmbnbnxFngb0UKoM",
    authDomain: "neon-messenger-83ed4.firebaseapp.com",
    projectId: "neon-messenger-83ed4",
    storageBucket: "neon-messenger-83ed4.firebasestorage.app",
    messagingSenderId: "954172505610",
    appId: "1:954172505610:web:03f56a8a5b89f2d402a9f3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = initializeFirestore(app, { experimentalForceLongPolling: true, useFetchStreams: false }, 'neonmess');
  enableIndexedDbPersistence(db).catch(e => console.warn("Persistence:", e.code));
  const storage = getStorage(app);
  let messaging = null;
  try { messaging = getMessaging(app); } catch (e) { console.warn("Messaging not supported"); }
  auth.languageCode = "ru";

  // ===================== 2. DATA LAYER (чистые запросы к Firebase) =====================
  const Data = {
    // Профиль
    async loadProfile(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      if (!snap.exists()) return null;
      const d = snap.data();
      return { uid, phoneNumber: d.phone || "", displayName: d.username || "Без имени", photoURL: d.avatar || "👤", online: d.online || false, lastSeen: d.lastSeen, isPremium: d.isPremium || false };
    },
    async ensureProfile(user, username, avatar) {
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);
      const base = {
        phone: user.phoneNumber || "",
        username: username || snap.data()?.username || "Без имени",
        avatar: avatar || snap.data()?.avatar || "👤",
        online: true,
        lastSeen: serverTimestamp(),
        updatedAt: serverTimestamp(),
        isPremium: snap.data()?.isPremium || false
      };
      if (!snap.exists()) await setDoc(ref, { ...base, createdAt: serverTimestamp(), fcmTokens: [] });
      else await updateDoc(ref, base);
      return (await getDoc(ref)).data();
    },
    async saveFCMToken(uid, token) {
      await updateDoc(doc(db, "users", uid), { fcmTokens: [token] });
    },

    // Чаты
    subscribeChats(uid, callback) {
      const q = query(collection(db, "chats"), where("members", "array-contains", uid), orderBy("updatedAt", "desc"));
      return onSnapshot(q, callback, error => { console.error("Chats sub error", error); callback({ docs: [] }); });
    },
    subscribeMessages(chatId, callback) {
      const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
      return onSnapshot(q, callback);
    },
    subscribeTyping(chatId, callback) {
      const q = collection(db, "chats", chatId, "typing");
      return onSnapshot(q, callback);
    },
    subscribePresence(uid, callback) {
      return onSnapshot(doc(db, "users", uid), callback);
    },
    subscribeWall(callback) {
      return onSnapshot(collection(db, "wall"), callback);
    },
    async sendMessage(chatId, text) {
      await addDoc(collection(db, "chats", chatId, "messages"), {
        text,
        userId: auth.currentUser.uid,
        createdAt: serverTimestamp()
      });
      await updateDoc(doc(db, "chats", chatId), {
        lastMessage: text,
        updatedAt: serverTimestamp()
      });
    },
    async deleteChat(chatId) {
      await deleteDoc(doc(db, "chats", chatId));
    },
    async createDirectChat(uid1, uid2) {
      const chatId = [uid1, uid2].sort().join("__");
      const ref = doc(db, "chats", chatId);
      if (!(await getDoc(ref)).exists()) {
        await setDoc(ref, {
          type: "direct",
          members: [uid1, uid2],
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          lastMessage: ""
        });
      }
      return chatId;
    },
    // Стена
    async publishPost(author, avatar, content) {
      await addDoc(collection(db, "wall"), {
        author, avatar, content,
        likesCount: 0, commentsCount: 0,
        createdAt: serverTimestamp(),
        userId: auth.currentUser.uid
      });
    },
    async likePost(postId) {
      await updateDoc(doc(db, "wall", postId), { likesCount: increment(1) });
    },
    async addComment(postId, authorId, authorName, authorAvatar, text) {
      await addDoc(collection(db, "wall_comments"), {
        postId, authorId, authorName, authorAvatar, text,
        replyTo: null, createdAt: serverTimestamp()
      });
      await updateDoc(doc(db, "wall", postId), { commentsCount: increment(1) });
    },
    async loadComments(postId) {
      const snap = await getDocs(query(collection(db, "wall_comments"), where("postId", "==", postId)));
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
  };

  // ===================== 3. STATE LAYER (централизованное состояние) =====================
  class AppState {
    constructor() {
      this.state = {
        user: null,
        profile: null,
        page: "chats",
        chats: [],
        wallPosts: [],
        activeChat: null,
        allUsers: []
      };
      this.listeners = {};
      this.subscriptions = [];
    }
    get(key) { return this.state[key]; }
    set(key, value) {
      this.state[key] = value;
      (this.listeners[key] || []).forEach(fn => fn(value));
    }
    onChange(key, fn) {
      if (!this.listeners[key]) this.listeners[key] = [];
      this.listeners[key].push(fn);
      return () => { this.listeners[key] = this.listeners[key].filter(f => f !== fn); };
    }
    addSub(unsub) { this.subscriptions.push(unsub); }
    clearSubs() {
      this.subscriptions.forEach(fn => fn());
      this.subscriptions = [];
    }
  }
  const State = new AppState();

  // ===================== 4. UI LAYER (рендеринг и обработчики) =====================
  const UI = {
    escapeHtml: (s) => String(s ?? "").replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])),
    setViewportHeight() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    },
    // Переключение тем
    applyTheme(theme) {
      document.body.className = '';
      document.body.classList.add('theme-' + theme);
      localStorage.setItem('neon_theme', theme);
    },
    // Инициализация интерфейса (навигация, страницы)
    initPages() {
      document.getElementById('root').innerHTML = `
        <div id="pages-container" style="max-width:1300px;margin:0 auto;padding:16px;padding-bottom:0;">
          <div id="page-chats" class="page visible-page">
            <div class="glass" style="padding:20px;margin-bottom:80px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
                <h2 style="font-weight:800;color:var(--text-primary);text-shadow:0 0 8px var(--accent-glow);">Сообщения</h2>
                <button id="newChatBtn" style="background:none;border:1px solid var(--surface-border);color:var(--text-primary);font-size:24px;border-radius:50%;width:44px;height:44px;">+</button>
              </div>
              <div id="chatsList"></div>
              <div id="chatsLoader" class="loading" style="display:none;">Загрузка...</div>
            </div>
          </div>
          <div id="page-wall" class="page">
            <div class="glass" style="padding:20px;margin-bottom:80px;">
              <h2 style="font-weight:800;color:var(--text-primary);margin-bottom:20px;text-shadow:0 0 8px var(--accent-glow);">🔗 Стена</h2>
              <textarea id="postContent" class="neon-input" rows="2" placeholder="Что нового?"></textarea>
              <div style="display:flex;justify-content:flex-end;margin-top:12px;"><button id="publishPostBtn" class="neon-btn">Опубликовать</button></div>
              <div id="wallPostsContainer" style="margin-top:24px;"></div>
            </div>
          </div>
          <div id="page-profile" class="page">
            <div class="glass" style="padding:32px;text-align:center;margin-bottom:80px;"></div>
          </div>
          <div id="page-chat" class="page"></div>
        </div>
        <div class="bottom-nav">
          <button class="nav-item active" data-page="chats"><span class="nav-icon">💬</span><span class="nav-label">Чаты</span></button>
          <button class="nav-item" data-page="wall"><span class="nav-icon">📡</span><span class="nav-label">Стена</span></button>
          <button class="nav-item" data-page="profile"><span class="nav-icon">👤</span><span class="nav-label">Профиль</span></button>
        </div>`;
      document.getElementById('newChatBtn').onclick = () => UI.openSearchModal();
      document.getElementById('publishPostBtn').onclick = () => {
        const content = document.getElementById('postContent').value.trim();
        if (content) Data.publishPost(State.get('profile')?.displayName || "Аноним", State.get('profile')?.photoURL || "👤", content).then(() => {
          document.getElementById('postContent').value = "";
        });
      };
      document.querySelectorAll('.nav-item').forEach(btn => btn.onclick = () => UI.switchPage(btn.dataset.page));
    },
    switchPage(page) {
      if (State.get('page') === page && page !== 'chat') return;
      // Отписываемся от всех слушателей, кроме глобального списка чатов (если нужен)
      State.clearSubs();
      State.set('page', page);
      document.querySelectorAll('.page').forEach(p => p.classList.remove('visible-page'));
      const target = document.getElementById(`page-${page}`);
      if (target) target.classList.add('visible-page');
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      const activeBtn = document.querySelector(`.nav-item[data-page="${page}"]`);
      if (activeBtn) activeBtn.classList.add('active');

      // Запускаем соответствующие подписки
      if (page === 'chats') {
        UI.startChatsSubscription();
      } else if (page === 'wall') {
        UI.startWallSubscription();
      } else if (page === 'profile') {
        UI.renderProfile();
      }
    },
    // Подписка на чаты (real-time)
    startChatsSubscription() {
      const unsub = Data.subscribeChats(State.get('user').uid, snap => {
        const chats = snap.docs.map(d => {
          const data = d.data();
          const otherId = data.members?.find(m => m !== State.get('user').uid);
          let title = data.title || "Чат", avatar = data.avatar || "👤";
          if (otherId) {
            const cached = State.get('allUsers')?.find(u => u.uid === otherId);
            if (cached) { title = cached.username; avatar = cached.avatar; }
          }
          return { id: d.id, ...data, title, avatar, otherUid: otherId };
        });
        State.set('chats', chats);
        UI.renderChatsList();
      });
      State.addSub(unsub);
    },
    // Список чатов в DOM
    renderChatsList() {
      const list = document.getElementById('chatsList');
      if (!list) return;
      const chats = State.get('chats');
      if (!chats.length) { list.innerHTML = `<div class="loading">Нет чатов</div>`; return; }
      list.innerHTML = chats.map(chat => {
        const premiumIcon = chat.isPremium ? '<span class="premium-badge">💎</span>' : '';
        return `<div class="chat-item" data-chat-id="${chat.id}">
          <div class="avatar">${UI.escapeHtml(chat.avatar)}${premiumIcon}</div>
          <div style="min-width:0;flex:1;"><div style="font-weight:600;color:var(--text-primary);">${UI.escapeHtml(chat.title)}</div><div style="font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${UI.escapeHtml(chat.lastMessage||"")}</div></div>
        </div>`;
      }).join('');
      list.querySelectorAll('.chat-item').forEach(el => {
        el.onclick = () => {
          const chat = State.get('chats').find(c => c.id === el.dataset.chatId);
          if (chat) UI.openChat(chat);
        };
      });
    },
    // Открытие чата
    async openChat(chat) {
      State.clearSubs();
      State.set('activeChat', chat);
      const pageChat = document.getElementById('page-chat');
      pageChat.innerHTML = `
        <div class="chat-container">
          <div class="chat-header">
            <button id="backToChatsBtn" class="back-btn">‹</button>
            <div class="avatar" style="width:40px;height:40px;font-size:20px;">${UI.escapeHtml(chat.avatar)}</div>
            <div class="header-info"><div class="header-title">${UI.escapeHtml(chat.title)}</div><div id="userStatus" class="header-status"></div></div>
            <button id="deleteChatBtn" class="delete-btn">🗑</button>
          </div>
          <div class="chat-messages" id="chatMessagesArea"></div>
          <div id="typingIndicator" class="typing-indicator" style="display:none;"><span>печатает</span></div>
          <div class="chat-input-area">
            <button id="voiceRecordBtn" class="voice-btn">🎤</button>
            <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off" />
            <button id="sendMsgBtn" class="send-btn">➤</button>
          </div>
          <div id="recordingIndicator" class="recording-indicator" style="display:none;">Запись...</div>
        </div>`;
      UI.switchPage('chat');

      // Подписка на сообщения
      const unsubMessages = Data.subscribeMessages(chat.id, snap => {
        const area = document.getElementById('chatMessagesArea');
        if (!area) return;
        const wasNearBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 120;
        snap.docChanges().forEach(change => {
          if (change.type === 'added') {
            const msg = change.doc.data();
            const isOut = msg.userId === State.get('user').uid;
            const time = msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}) : "";
            const div = document.createElement('div');
            div.className = `message ${isOut ? "out" : "in"}`;
            div.setAttribute('data-id', change.doc.id);
            div.innerHTML = `<div>${UI.escapeHtml(msg.text||"")}</div><div style="font-size:10px;opacity:0.6;text-align:right;">${time} ${msg.edited?'(ред.)':''}</div>`;
            if (isOut) {
              const editBtn = document.createElement('button');
              editBtn.className = 'edit-btn';
              editBtn.innerHTML = '✎';
              editBtn.onclick = (e) => { e.stopPropagation(); UI.editMessage(change.doc.id, msg.text || ''); };
              div.appendChild(editBtn);
            }
            area.appendChild(div);
          } else if (change.type === 'modified') {
            const el = document.querySelector(`[data-id="${change.doc.id}"]`);
            if (el) {
              const msg = change.doc.data();
              const isOut = msg.userId === State.get('user').uid;
              const time = msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}) : "";
              el.className = `message ${isOut ? "out" : "in"}`;
              el.innerHTML = `<div>${UI.escapeHtml(msg.text||"")}</div><div style="font-size:10px;opacity:0.6;text-align:right;">${time} ${msg.edited?'(ред.)':''}</div>`;
              if (isOut) {
                const editBtn = document.createElement('button');
                editBtn.className = 'edit-btn';
                editBtn.innerHTML = '✎';
                editBtn.onclick = (e) => { e.stopPropagation(); UI.editMessage(change.doc.id, msg.text || ''); };
                el.appendChild(editBtn);
              }
            }
          }
        });
        if (wasNearBottom) area.scrollTop = area.scrollHeight;
      });
      State.addSub(unsubMessages);

      // Typing
      const unsubTyping = Data.subscribeTyping(chat.id, snap => {
        const now = Date.now();
        let show = false;
        snap.forEach(d => { if (d.id !== State.get('user').uid && d.data().timestamp && now - d.data().timestamp.toMillis() < 5000) show = true; });
        document.getElementById('typingIndicator').style.display = show ? 'flex' : 'none';
      });
      State.addSub(unsubTyping);

      // Presence (если есть другой участник)
      if (chat.otherUid) {
        const unsubPresence = Data.subscribePresence(chat.otherUid, snap => {
          const data = snap.data();
          const statusDiv = document.getElementById('userStatus');
          if (data && statusDiv) {
            const online = data.online;
            const lastSeen = data.lastSeen?.toMillis();
            let text = '';
            if (online && lastSeen && Date.now() - lastSeen < 60000) text = 'в сети';
            else if (lastSeen) {
              const diff = Math.floor((Date.now() - lastSeen)/1000);
              text = diff < 60 ? 'был(а) только что' : diff < 3600 ? `был(а) ${Math.floor(diff/60)} мин назад` : `был(а) ${Math.floor(diff/3600)} ч назад`;
            }
            statusDiv.textContent = text;
          }
        });
        State.addSub(unsubPresence);
      }

      // Обработчики
      document.getElementById('backToChatsBtn').onclick = () => UI.switchPage('chats');
      document.getElementById('deleteChatBtn').onclick = async () => {
        if (confirm('Удалить чат?')) {
          await Data.deleteChat(chat.id);
          UI.switchPage('chats');
        }
      };
      const sendMsg = async () => {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        await Data.sendMessage(chat.id, text);
        input.value = "";
      };
      document.getElementById('sendMsgBtn').onclick = sendMsg;
      document.getElementById('messageInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendMsg(); } });
      document.getElementById('messageInput').addEventListener('input', () => {
        clearTimeout(chat._typingTimer);
        chat._typingTimer = setTimeout(() => {
          setDoc(doc(db, "chats", chat.id, "typing", State.get('user').uid), { timestamp: serverTimestamp() });
        }, 300);
      });
    },
    async editMessage(msgId, oldText) {
      const newText = prompt("Редактировать:", oldText);
      if (newText !== null && newText !== oldText) {
        await updateDoc(doc(db, "chats", State.get('activeChat').id, "messages", msgId), { text: newText, edited: true });
      }
    },
    // Стена
    startWallSubscription() {
      const unsub = Data.subscribeWall(snap => {
        const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        posts.sort((a,b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));
        State.set('wallPosts', posts);
        UI.renderWall();
      });
      State.addSub(unsub);
    },
    async renderWall() {
      const container = document.getElementById('wallPostsContainer');
      if (!container) return;
      const posts = State.get('wallPosts');
      if (!posts.length) { container.innerHTML = `<div class="loading">Пока тихо...</div>`; return; }
      container.innerHTML = '';
      for (const post of posts) {
        const comments = await Data.loadComments(post.id);
        const postDiv = document.createElement('div');
        postDiv.className = 'wall-post';
        postDiv.innerHTML = `
          <div style="display:flex; gap:12px; align-items:center; margin-bottom:14px;"><div class="avatar" style="width:44px;height:44px;font-size:24px;">${UI.escapeHtml(post.avatar||"👤")}</div><div><strong style="color:var(--text-primary);">${UI.escapeHtml(post.author||"Аноним")}</strong></div></div>
          <div style="white-space:pre-wrap; color:var(--text-secondary);">${UI.escapeHtml(post.content)}</div>
          <div style="display:flex; gap:16px; margin-top:16px;">
            <button class="like-btn neon-btn" data-post-id="${post.id}" style="padding:8px 16px;">❤️ ${post.likesCount||0}</button>
            <button class="comment-toggle neon-btn" data-post-id="${post.id}" style="padding:8px 16px;">💬 ${post.commentsCount||0}</button>
          </div>
          <div class="comment-thread" style="display:none;">
            ${comments.map(c => `<div class="comment-item"><div style="display:flex;align-items:center;gap:8px;"><div class="avatar" style="width:28px;height:28px;font-size:16px;">${UI.escapeHtml(c.authorAvatar)}</div><strong style="font-size:14px;">${UI.escapeHtml(c.authorName)}</strong></div><div style="margin-top:6px;">${UI.escapeHtml(c.text)}</div></div>`).join('')||'<div style="color:var(--text-secondary);">Нет комментариев</div>'}
            <div style="margin-top:12px;"><input type="text" class="comment-input neon-input" placeholder="Комментарий..."><button class="add-comment-btn neon-btn">Отправить</button></div>
          </div>`;
        // Обработчики
        postDiv.querySelector('.like-btn').onclick = () => Data.likePost(post.id);
        const toggleBtn = postDiv.querySelector('.comment-toggle');
        toggleBtn.onclick = () => {
          const thread = postDiv.querySelector('.comment-thread');
          thread.style.display = thread.style.display === 'none' ? 'block' : 'none';
        };
        postDiv.querySelector('.add-comment-btn').onclick = () => {
          const input = postDiv.querySelector('.comment-input');
          const text = input.value.trim();
          if (text) {
            Data.addComment(post.id, State.get('user').uid, State.get('profile')?.displayName, State.get('profile')?.photoURL, text);
            input.value = '';
          }
        };
        container.appendChild(postDiv);
      }
    },
    // Профиль
    renderProfile() {
      const container = document.querySelector('#page-profile .glass');
      if (!container) return;
      const p = State.get('profile') || State.get('user') || { displayName:"", phoneNumber:"", photoURL:"👤", isPremium:false };
      container.innerHTML = `
        <div style="position:relative; width:100px; margin:0 auto 24px;"><div class="avatar" style="width:100px;height:100px;font-size:48px;">${UI.escapeHtml(p.photoURL)}</div>${p.isPremium?'<span class="premium-badge" style="top:-8px;right:-8px;font-size:28px;">💎</span>':''}</div>
        <h3 style="font-weight:800;color:var(--text-primary);text-shadow:0 0 8px var(--accent-glow);">${UI.escapeHtml(p.displayName)}</h3>
        <p style="color:var(--text-secondary);">${UI.escapeHtml(p.phoneNumber)}</p>
        <hr style="margin:28px 0;border-color:var(--surface-border);">
        <div style="background:var(--surface);border-radius:24px;padding:18px;margin-bottom:20px;">
          <p style="color:var(--text-secondary);font-size:14px;margin-bottom:12px;">Тема</p>
          <div style="display:flex;gap:8px;justify-content:center;">
            <button class="theme-btn neon-btn" data-theme="neon">NEON</button>
            <button class="theme-btn neon-btn" data-theme="minimal">MINIMAL</button>
            <button class="theme-btn neon-btn" data-theme="glass">GLASS</button>
          </div>
        </div>
        ${!p.isPremium ? `<button id="premiumBtn" class="neon-btn" style="width:100%;background:var(--premium);color:#000;margin-bottom:20px;">💎 Оформить NEON PREMIUM</button>` : ''}
        <button id="editProfileBtn" class="neon-btn" style="width:100%;">Изменить профиль</button>
        <button id="logoutBtn" style="background:none;border:1px solid var(--surface-border);color:var(--danger);margin-top:24px;width:100%;padding:10px;border-radius:60px;">Выйти</button>`;
      container.querySelectorAll('.theme-btn').forEach(btn => btn.onclick = () => { UI.applyTheme(btn.dataset.theme); UI.renderProfile(); });
      container.querySelector('#editProfileBtn')?.addEventListener('click', async () => {
        const name = prompt("Имя:", p.displayName);
        const av = prompt("Аватар:", p.photoURL);
        if (name !== null && av !== null) {
          await updateDoc(doc(db, "users", State.get('user').uid), { username: name, avatar: av });
          const newProfile = { ...p, displayName: name, photoURL: av };
          State.set('profile', newProfile);
          State.set('user', { ...State.get('user'), displayName: name, photoURL: av });
          UI.renderProfile();
        }
      });
      if (container.querySelector('#premiumBtn')) {
        container.querySelector('#premiumBtn').onclick = async () => {
          await updateDoc(doc(db, "users", State.get('user').uid), { isPremium: true });
          p.isPremium = true;
          State.set('profile', p);
          UI.renderProfile();
        };
      }
      container.querySelector('#logoutBtn').onclick = async () => {
        await signOut(auth);
      };
    },
    // Поиск пользователей
    async openSearchModal() {
      const overlay = document.getElementById('search-modal-overlay');
      overlay.classList.remove('hidden');
      const users = await (async () => {
        const snap = await getDocs(collection(db, "users"));
        return snap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(u => u.uid !== State.get('user').uid);
      })();
      State.set('allUsers', users);
      UI.renderSearchResults(users);
      document.getElementById('user-search-input').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = term ? users.filter(u => u.username.toLowerCase().includes(term)) : users;
        UI.renderSearchResults(filtered);
      };
      document.getElementById('close-search-modal').onclick = () => overlay.classList.add('hidden');
    },
    renderSearchResults(users) {
      const container = document.getElementById('search-results-container');
      if (!users.length) { container.innerHTML = `<div style="color:var(--text-secondary);text-align:center;padding:20px;">Никого нет</div>`; return; }
      container.innerHTML = users.map(u => `<div class="search-user-item" data-uid="${u.uid}"><div class="avatar" style="width:40px;height:40px;font-size:22px;">${UI.escapeHtml(u.avatar)}</div><div style="flex:1;">${UI.escapeHtml(u.username)}</div></div>`).join('');
      container.querySelectorAll('.search-user-item').forEach(el => {
        el.onclick = async () => {
          document.getElementById('search-modal-overlay').classList.add('hidden');
          const otherUid = el.dataset.uid;
          const chatId = await Data.createDirectChat(State.get('user').uid, otherUid);
          UI.switchPage('chats');
        };
      });
    }
  };

  // ===================== 5. ЗАПУСК ПРИЛОЖЕНИЯ =====================
  window.addEventListener('resize', UI.setViewportHeight);
  window.addEventListener('orientationchange', UI.setViewportHeight);
  UI.setViewportHeight();
  UI.applyTheme(localStorage.getItem('neon_theme') || 'glass');

  function showLogin() {
    State.clearSubs();
    document.getElementById('root').innerHTML = `
      <div class="glass" style="max-width:480px; margin:60px auto; padding:32px;">
        <h2 style="text-align:center;">NEON</h2>
        <input id="phone" class="neon-input" placeholder="+7 999 123-45-67" style="margin-top:20px;">
        <input id="name" class="neon-input" placeholder="Ваше имя" style="margin-top:12px;">
        <input id="avatar" class="neon-input" placeholder="Аватар-эмодзи (👾)" style="margin-top:12px;">
        <div id="recaptcha-container"></div>
        <button id="loginBtn" class="neon-btn" style="width:100%; margin-top:16px;">Войти</button>
      </div>`;
    document.getElementById('loginBtn').onclick = async () => {
      const phone = document.getElementById('phone').value.trim();
      const name = document.getElementById('name').value.trim();
      const avatar = document.getElementById('avatar').value.trim();
      if (!phone || !name) return alert("Введите номер и имя");
      try {
        const verifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size:'normal' });
        const confirmation = await signInWithPhoneNumber(auth, phone, verifier);
        const code = prompt("Код из SMS:");
        if (!code) return;
        await confirmation.confirm(code);
      } catch (e) { alert("Ошибка: " + e.message); }
    };
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      showLogin();
      return;
    }
    let profile = await Data.loadProfile(user.uid);
    if (!profile) {
      profile = await Data.ensureProfile(user, user.displayName || "Без имени", user.photoURL || "👤");
    }
    State.set('user', { uid: user.uid, phoneNumber: user.phoneNumber || profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL, isPremium: profile.isPremium });
    State.set('profile', profile);
    UI.initPages();
    UI.switchPage('chats');
    // Сердцебиение
    const setOnline = () => updateDoc(doc(db, "users", user.uid), { online: true, lastSeen: serverTimestamp() });
    setOnline();
    const heartbeat = setInterval(setOnline, 30000);
    window.addEventListener('beforeunload', () => updateDoc(doc(db, "users", user.uid), { online: false, lastSeen: serverTimestamp() }));
    State.addSub(() => clearInterval(heartbeat));
    // Уведомления (по желанию)
    if (Notification.permission === 'default') {
      try {
        const perm = await Notification.requestPermission();
        if (perm === 'granted' && messaging) {
          const token = await getToken(messaging, { vapidKey: '...' }); // при необходимости добавить VAPID ключ
          if (token) await Data.saveFCMToken(user.uid, token);
        }
      } catch(e) {}
    }
  });
</script>
</body>
</html>
