<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0a12" />
    <title>NEON MESSENGER | чаты + стена</title>
    <style>
        :root {
            --vh: 1vh;
            --bg-deep: #0a0a12;
            --bg-card: rgba(18, 18, 30, 0.75);
            --bg-card-solid: #12121e;
            --gold: #c9a86c;
            --gold-light: #d4b87a;
            --gold-soft: #b8945a;
            --gold-glow: rgba(201, 168, 108, 0.25);
            --gold-border: rgba(201, 168, 108, 0.2);
            --gold-border-strong: rgba(201, 168, 108, 0.45);
            --text-primary: #e8e6f0;
            --text-secondary: #9898a8;
            --text-tertiary: #6e6e7c;
            --text-heading: #f0ede8;
            --online: #4caf84;
            --online-glow: rgba(76, 175, 132, 0.5);
            --danger: #e05555;
            --danger-bg: rgba(224, 85, 85, 0.1);
            --msg-out-bg: #1e1c26;
            --msg-out-border: rgba(201, 168, 108, 0.35);
            --msg-out-text: #e8e6f0;
            --msg-in-bg: #15141d;
            --msg-in-border: rgba(255, 255, 255, 0.08);
            --msg-in-text: #d0ced8;
            --input-bg: rgba(22, 22, 34, 0.8);
            --input-border: rgba(201, 168, 108, 0.3);
            --input-focus-glow: rgba(201, 168, 108, 0.4);
            --btn-primary-bg: #c9a86c;
            --btn-primary-text: #0a0a12;
            --btn-ghost-border: rgba(255, 255, 255, 0.12);
            --btn-ghost-text: #c9a86c;
            --nav-bg: rgba(10, 10, 18, 0.9);
            --nav-border: rgba(255, 255, 255, 0.06);
            --avatar-glow: 0 0 18px rgba(201, 168, 108, 0.35);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
            --shadow-elevated: 0 8px 40px rgba(0, 0, 0, 0.5);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --radius-full: 50%;
            --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            --blur-glass: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
        }
        body {
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            background: var(--bg-deep);
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        body.no-scroll {
            overflow: hidden;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(var(--blur-glass)) saturate(140%);
            -webkit-backdrop-filter: blur(var(--blur-glass)) saturate(140%);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gold-border);
            box-shadow: var(--shadow-card);
            transition: var(--transition-smooth);
        }
        @supports not (backdrop-filter: blur(16px)) {
            .glass-card {
                background: var(--bg-card-solid);
            }
        }

        .input-premium {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 60px;
            padding: 13px 18px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            width: 100%;
            transition: var(--transition-smooth);
            letter-spacing: 0.01em;
        }
        .input-premium:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--input-focus-glow);
        }

        .btn-primary {
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: none;
            border-radius: 60px;
            padding: 12px 22px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition-smooth);
            letter-spacing: 0.02em;
            text-transform: none;
        }
        .btn-primary:active {
            transform: scale(0.96);
            opacity: 0.85;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--btn-ghost-border);
            color: var(--btn-ghost-text);
            border-radius: 60px;
            padding: 10px 20px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .btn-ghost:active {
            background: rgba(201, 168, 108, 0.1);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0 10px;
            border-top: 1px solid var(--nav-border);
            z-index: 100;
            height: 72px;
            border-radius: 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-size: 11px;
            color: var(--text-tertiary);
            background: none;
            border: none;
            padding: 4px 12px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition-smooth);
            min-width: 60px;
            letter-spacing: 0.01em;
        }
        .nav-item.active {
            color: var(--gold-light);
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -2px;
            width: 20px;
            height: 2px;
            background: var(--gold);
            border-radius: 0 0 2px 2px;
            box-shadow: 0 0 6px var(--gold-glow);
        }
        .nav-icon {
            font-size: 22px;
            line-height: 1;
        }
        .nav-item span:not(.nav-icon) {
            font-size: 10px;
            line-height: 1;
            font-weight: 500;
        }

        .page {
            display: none;
            animation: fadePage 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .page.active-page {
            display: block;
        }
        @keyframes fadePage {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 13px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: var(--transition-smooth);
            border-radius: var(--radius-md);
            margin: 2px 8px;
        }
        .chat-item:active {
            background: rgba(201, 168, 108, 0.06);
        }
        .chat-item.animate-in {
            animation: fadeInUp 0.35s cubic-bezier(0.4, 0, 0.2, 1) both;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, #2a2520, #1a1815);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 0 0 1px var(--gold-border);
        }
        .avatar.large {
            width: 90px;
            height: 90px;
            font-size: 44px;
            box-shadow: var(--avatar-glow), 0 0 0 2px var(--gold-border-strong);
        }
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--online);
            border: 2px solid #0a0a12;
            box-shadow: 0 0 8px var(--online-glow);
        }
        .online-dot.small {
            width: 10px;
            height: 10px;
            bottom: 1px;
            right: 1px;
            border-width: 1.5px;
        }

        .message {
            max-width: 78%;
            padding: 10px 16px;
            border-radius: 20px;
            margin-bottom: 6px;
            word-break: break-word;
            animation: messageIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
            font-size: 14px;
            line-height: 1.45;
        }
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.out {
            align-self: flex-end;
            background: var(--msg-out-bg);
            border: 1px solid var(--msg-out-border);
            color: var(--msg-out-text);
            border-bottom-right-radius: 6px;
        }
        .message.in {
            align-self: flex-start;
            background: var(--msg-in-bg);
            border: 1px solid var(--msg-in-border);
            color: var(--msg-in-text);
            border-bottom-left-radius: 6px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 14px;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
            gap: 2px;
        }

        .wall-post {
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius-xl);
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid var(--gold-border);
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-card);
        }
        .loading {
            text-align: center;
            color: var(--text-tertiary);
            padding: 28px;
            font-size: 13px;
            letter-spacing: 0.02em;
        }
        #recaptcha-container {
            display: block !important;
            visibility: visible !important;
            min-height: 78px;
            width: 100%;
            margin: 14px 0 0 0;
            position: relative;
            z-index: 10000;
        }
        textarea {
            resize: vertical;
            outline: none;
        }
        button {
            outline: none;
            touch-action: manipulation;
        }

        .voice-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 18px;
            margin-right: 4px;
            transition: var(--transition-smooth);
            flex-shrink: 0;
        }
        .voice-btn.recording {
            background: #e05555;
            border-color: #e05555;
            color: #fff;
            box-shadow: 0 0 16px rgba(224, 85, 85, 0.5);
            animation: pulse-rec 1.1s infinite;
        }
        @keyframes pulse-rec {
            0% {
                box-shadow: 0 0 0 0 rgba(224, 85, 85, 0.7);
            }
            70% {
                box-shadow: 0 0 0 14px rgba(224, 85, 85, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(224, 85, 85, 0);
            }
        }

        .voice-message audio {
            width: 180px;
            max-width: 100%;
            height: 32px;
            margin-top: 2px;
            border-radius: 20px;
        }
        .voice-message .duration {
            font-size: 11px;
            opacity: 0.7;
            margin-left: 6px;
        }

        .theme-switcher {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 14px 0;
        }
        .theme-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition-smooth);
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .theme-dot:active {
            transform: scale(1.12);
            border-color: #fff;
        }
        .theme-dot.active-theme {
            border-color: #fff;
            box-shadow: 0 0 18px currentColor, 0 0 32px currentColor;
            transform: scale(1.08);
        }
        .theme-dot.active-theme::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: bold;
            font-size: 13px;
            text-shadow: 0 0 3px #000;
        }
        .theme-dot.premium-gold {
            background: linear-gradient(135deg, #c9a86c, #7a5e3a);
            color: #c9a86c;
        }
        .theme-dot.deep-noir {
            background: linear-gradient(135deg, #333, #0a0a0a);
            color: #888;
        }
        .theme-dot.forest {
            background: linear-gradient(135deg, #5a9e7c, #1a3a2a);
            color: #5a9e7c;
        }
        .theme-dot.plum {
            background: linear-gradient(135deg, #9b6db5, #3a1a4a);
            color: #9b6db5;
        }
        .theme-dot.ocean {
            background: linear-gradient(135deg, #6ba4c9, #1a3a5c);
            color: #6ba4c9;
        }
        .theme-dot.terracotta {
            background: linear-gradient(135deg, #d4856b, #5a2a1a);
            color: #d4856b;
        }
        .theme-dot.slate {
            background: linear-gradient(135deg, #6b7d8a, #1a2228);
            color: #8a9ba8;
        }
        .theme-dot.rose-gold {
            background: linear-gradient(135deg, #d4a0a0, #6b3a3a);
            color: #d4a0a0;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-content {
            background: var(--bg-card-solid);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: var(--radius-xl);
            border: 1px solid var(--gold-border-strong);
            box-shadow: var(--shadow-elevated);
            padding: 22px;
            width: 100%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
            color: var(--text-primary);
        }

        .chat-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: calc(var(--vh, 1vh) * 100);
            z-index: 150;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
        }
        .chat-fullscreen .glass-card {
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            border: none;
            box-shadow: none;
            background: var(--bg-deep);
        }
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 2;
        }
        .chat-header-tap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            cursor: pointer;
            min-width: 0;
            padding: 4px 8px;
            border-radius: var(--radius-md);
            transition: var(--transition-smooth);
        }
        .chat-header-tap:active {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Chat Profile Panel */
        .profile-panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            background: rgba(0, 0, 0, 0.55);
            animation: fadeIn 0.25s ease;
            display: flex;
            justify-content: flex-end;
        }
        .profile-panel {
            width: 88%;
            max-width: 380px;
            height: 100%;
            background: var(--bg-card-solid);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--gold-border);
            box-shadow: var(--shadow-elevated);
            overflow-y: auto;
            animation: slideInRight 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            -webkit-overflow-scrolling: touch;
            padding-bottom: 30px;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }
        .profile-panel.closing {
            animation: slideOutRight 0.28s cubic-bezier(0.55, 0, 1, 0.45) forwards;
        }
        @keyframes slideOutRight {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(100%);
            }
        }
        .profile-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .profile-panel-avatar-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0 18px;
        }
        .profile-panel-actions {
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 18px;
            gap: 6px;
        }
        .profile-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-lg);
            padding: 12px 14px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 11px;
            transition: var(--transition-smooth);
            min-width: 60px;
            font-weight: 500;
        }
        .profile-action-btn:active {
            background: rgba(201, 168, 108, 0.1);
            border-color: var(--gold-border-strong);
            color: var(--gold-light);
        }
        .profile-action-btn .action-icon {
            font-size: 22px;
        }
        .profile-section {
            padding: 6px 16px;
        }
        .profile-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            padding: 14px 16px 6px;
            font-weight: 600;
        }
        .profile-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition-smooth);
            gap: 10px;
        }
        .profile-row:active {
            background: rgba(255, 255, 255, 0.03);
        }
        .profile-row-icon {
            font-size: 18px;
            width: 32px;
            text-align: center;
            flex-shrink: 0;
        }
        .profile-row-text {
            flex: 1;
            min-width: 0;
        }
        .profile-row-label {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }
        .profile-row-sub {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        .profile-row-arrow {
            color: var(--text-tertiary);
            font-size: 14px;
        }
        .toggle-switch {
            position: relative;
            width: 46px;
            height: 26px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 26px;
            transition: var(--transition-smooth);
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: var(--transition-smooth);
        }
        .toggle-switch input:checked+.toggle-slider {
            background: var(--gold);
        }
        .toggle-switch input:checked+.toggle-slider::before {
            transform: translateX(20px);
        }
        .danger-row {
            color: var(--danger);
        }
        .divider-thin {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 4px 16px;
        }
        .badge-count {
            background: rgba(201, 168, 108, 0.2);
            color: var(--gold-light);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }
        .splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .logo-premium {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--gold-light);
            text-shadow: 0 0 30px var(--gold-glow);
            animation: logoPulse 1.8s ease-in-out infinite alternate;
        }
        @keyframes logoPulse {
            0% {
                opacity: 0.7;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.04);
            }
        }
        .subtitle {
            color: var(--text-tertiary);
            font-size: 15px;
            margin-top: 8px;
            letter-spacing: 3px;
            font-weight: 400;
        }
        .dots {
            margin-top: 28px;
            display: flex;
            gap: 9px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold);
            animation: dotBreathe 1.3s infinite ease-in-out;
        }
        .dot:nth-child(2) {

        const isOnline = (lastSeen) => {
            if (!lastSeen) return false;
            const ms = lastSeen.toMillis ? lastSeen.toMillis() : lastSeen;
            return (Date.now() - ms) < 5 * 60 * 1000;
        };
        const formatLastSeen = (lastSeen) => {
            if (!lastSeen) return 'давно';
            if (isOnline(lastSeen)) return 'в сети';
            const d = lastSeen.toDate ? lastSeen.toDate() : new Date(lastSeen);
            const now = new Date();
            const diffMs = now - d;
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 1) return 'только что';
            if (diffMin < 60) return `${diffMin} мин назад`;
            const diffH = Math.floor(diffMin / 60);
            if (diffH < 24) return `${diffH} ч назад`;
            const diffD = Math.floor(diffH / 24);
            if (diffD < 7) return `${diffD} дн назад`;
            return d.toLocaleDateString('ru', { day: 'numeric', month: 'short' });
        };

            const saved = localStorage.getItem('neon-messenger-theme');
            if (saved && THEMES.includes(saved)) uiState.currentTheme = saved;
            else uiState.currentTheme = 'premium-gold';
            applyTheme(uiState.currentTheme);
        }

        function applyTheme(themeName) {
            uiState.currentTheme = themeName;
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('neon-messenger-theme', themeName);
            const vars = THEME_CSS_VARS[themeName] || THEME_CSS_VARS['premium-gold'];
            const rootEl = document.documentElement;
            Object.entries(vars).forEach(([key, val]) => rootEl.style.setProperty(key, val));
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
                const bgColors = { 'premium-gold': '#0a0a12', 'deep-noir': '#0a0a0c', 'forest': '#0a1410',
                    'plum': '#100a18', 'ocean': '#0a141a', 'terracotta': '#140c0a', 'slate': '#0e1014',
                    'rose-gold': '#120c0e' };
                metaTheme.setAttribute('content', bgColors[themeName] || '#0a0a12');
            }
            document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active-theme', d.dataset.theme ===
                themeName));
        }

          </div>`;
        }

            document.querySelectorAll('.theme-dot').forEach(dot => {

                    if (theme && THEMES.includes(theme)) {
                        applyTheme(theme);
                        if (uiState.page === 'profile') renderProfilePage();
                    }
                };
            });

            if (cacheState.usersCache.has(uid)) return cacheState.usersCache.get(uid);
            const snap = await getDoc(doc(db, "users", uid));
            if (!snap.exists()) return null;
            const d = snap.data();
            const user = { uid, username: d.username || "Без имени", avatar: d.avatar || "👤", phone: d.phone || "",
                lastSeen: d.lastSeen || null };
            cacheState.usersCache.set(uid, user);
            if (d.lastSeen) cacheState.lastSeenCache.set(uid, d.lastSeen);
            return user;

        async function preloadAllUsers() {
            const snap = await getDocs(collection(db, "users"));
            cacheState.allUsers = [];
            snap.forEach(docSnap => {
                const d = docSnap.data();
                const user = { uid: docSnap.id, username: d.username || "Пользователь", avatar: d.avatar || "👤",
                    phone: d.phone || "", lastSeen: d.lastSeen || null };
                cacheState.usersCache.set(user.uid, user);
                if (d.lastSeen) cacheState.lastSeenCache.set(user.uid, d.lastSeen);
                if (user.uid !== authState.user?.uid) cacheState.allUsers.push(user);
            });
        }

        async function ensureProfile(user, username, avatar) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            const baseData = { phone: user.phoneNumber || "", username: username || snap.data()?.username || "Без имени",
                avatar: avatar || snap.data()?.avatar || "👤", updatedAt: serverTimestamp(), lastSeen: serverTimestamp() };
            if (!snap.exists()) await setDoc(ref, { ...baseData, createdAt: serverTimestamp(), fcmTokens: [] });
            else await updateDoc(ref, baseData);
            const fresh = await getDoc(ref);
            const d = fresh.data() || {};
            const profile = { uid: user.uid, phoneNumber: user.phoneNumber || d.phone || "", displayName: d.username ||
                    "Без имени", photoURL: d.avatar || "👤" };
            cacheState.usersCache.set(user.uid, { uid: user.uid, username: profile.displayName, avatar: profile.photoURL,
                phone: profile.phoneNumber, lastSeen: d.lastSeen || null });
            await updateProfileInChats(user.uid, profile.displayName, profile.photoURL);
            return profile;
        }

        async function updateProfileInChats(uid, username, avatar) {
            try {
                const chatsSnap = await getDocs(query(collection(db, "chats"), where("members", "array-contains", uid)));
                if (chatsSnap.empty) return;
                const batch = writeBatch(db);
                chatsSnap.forEach(docSnap => { batch.update(docSnap.ref, { [`memberUsernames.${uid}`]: username,
                        [`memberAvatars.${uid}`]: avatar }); });
                await batch.commit();
            } catch (e) { console.warn("updateProfileInChats error", e); }
        }

        async function startDirectChat(otherUid) {
            const chatId = directChatId(authState.user.uid, otherUid);
            const chatRef = doc(db, "chats", chatId);
            const chatSnap = await getDoc(chatRef);
            let chatData;
            const me = cacheState.usersCache.get(authState.user.uid) || { username: authState.profile?.displayName ||
                    "Без имени", avatar: authState.profile?.photoURL || "👤" };
            const other = cacheState.usersCache.get(otherUid) || await getUserData(otherUid);
            if (!chatSnap.exists()) {
                const newChat = { type: "direct", members: [authState.user.uid, otherUid], memberUsernames: { [authState
                            .user.uid]: me.username, [otherUid]: other.username },
                    memberAvatars: { [authState.user.uid]: me.avatar, [otherUid]: other.avatar }, createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(), lastMessage: "", muted: false, pinned: false };
                await setDoc(chatRef, newChat);
                chatData = { id: chatId, ...newChat, title: other.username, avatar: other.avatar, lastSeen: other
                        .lastSeen };
            } else {
                const data = chatSnap.data();
                chatData = { id: chatId, ...data, title: other.username, avatar: other.avatar, lastSeen: other.lastSeen };
            }
            openChat(chatData);
            refreshChats();
        }

        async function loadChats() {
            if (!authState.user) return [];
            const q = query(collection(db, "chats"), where("members", "array-contains", authState.user.uid));
            const snap = await getDocs(q);
            const chats = [];
            snap.forEach(docSnap => {
                const data = docSnap.data();
                let title = data.title || "Чат";
                let avatar = "👤";
                let lastSeen = null;
                if (data.type === "direct") {
                    const otherUid = (data.members || []).find(m => m !== authState.user.uid);
                    if (otherUid) {
                        if (data.memberUsernames && data.memberAvatars) { title = data.memberUsernames[
                            otherUid] || "Пользователь";
                            avatar = data.memberAvatars[otherUid] || "👤"; } else { const cu = cacheState.usersCache
                                .get(otherUid); if (cu) { title = cu.username;
                                avatar = cu.avatar;
                                lastSeen = cu.lastSeen; } }
                        const cached = cacheState.lastSeenCache.get(otherUid);
                        if (cached) lastSeen = cached;
                    }
                }
                chats.push({ id: docSnap.id, ...data, title, avatar, lastSeen });
            });
            chats.sort((a, b) => (b.updatedAt?.toMillis() || 0) - (a.updatedAt?.toMillis() || 0));
            return chats;
        }

        function switchToChatsPage() { renderChatsPage();
            refreshChats();
            setupGlobalMessageListener(); }

        function switchToWallPage() { renderWallPage();
            loadAndRenderWall(); }

        async function loadAndRenderWall() { const container = document.getElementById("wallPostsContainer"); if (!container)
                return;
            container.innerHTML = `<div class="loading">📡 Загрузка...</div>`;
            chatState.wallPosts = await loadWallPosts();
            renderWallPostsList(chatState.wallPosts);
            setupWallListener(); }

        async function publishPost() { if (postingInProgress) return; const input = document.getElementById("postContent"); if (
                !input) return; const content = input.value.trim(); if (!content) return;
            postingInProgress = true; const btn = document.getElementById("publishPostBtn"); if (btn) btn.disabled =
                true; try { await addDoc(collection(db, "wall"), { author: authState.profile?.displayName || "Без имени",
                    avatar: authState.profile?.photoURL || "👤", content, likesCount: 0, comments: [],
                    createdAt: serverTimestamp(), userId: authState.user.uid });
                input.value = ""; } catch (e) { console.warn(e); } finally { postingInProgress = false; if (btn) btn
                    .disabled = false; } }

        function createMessageElement(msg, isOut) {
            const time = msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], { hour: "2-digit",
                minute: "2-digit" }) : "";
            const div = document.createElement("div");
            div.className = `message ${isOut?"out":"in"}`;
            if (msg.type === 'audio') { div.innerHTML =
                    `<div style="display:flex;align-items:center;gap:6px;"><audio controls src="${escapeHtml(msg.audioURL)}"></audio><span style="font-size:11px;opacity:0.7;">${msg.duration?Math.round(msg.duration)+'с':''}</span></div><div style="font-size:9px;opacity:0.5;margin-top:3px;">${time}</div>`; } else { div
                    .innerHTML =
                    `<div>${escapeHtml(msg.text||"")}</div><div style="font-size:9px;opacity:0.5;margin-top:3px;">${time}</div>`; }
            return div;
        }

        function openChatProfilePanel(chat) {
            const existingPanel = document.querySelector('.profile-panel-overlay');
            if (existingPanel) existingPanel.remove();
            const otherUid = chat.type === 'direct' ? (chat.members || []).find(m => m !== authState.user?.uid) : null;
            const otherUser = otherUid ? cacheState.usersCache.get(otherUid) : null;
            const online = isOnline(otherUser?.lastSeen || chat.lastSeen);
            const overlay = document.createElement('div');
            overlay.className = 'profile-panel-overlay';
            overlay.id = 'profilePanelOverlay';
            overlay.innerHTML = `
            <div class="profile-panel" id="profilePanel">
              <div class="profile-panel-header">
                <button id="closeProfilePanel" style="background:none; border:none; font-size:20px; color:var(--text-secondary); cursor:pointer;">←</button>
                <span style="font-weight:600; color:var(--text-heading); font-size:15px;">Профиль чата</span>
                <div style="width:28px;"></div>
              </div>
              <div class="profile-panel-avatar-wrap">
                <div class="avatar large" style="position:relative;">${escapeHtml(chat.avatar||"👤")}${online?'<span class="online-dot" style="bottom:4px;right:4px;width:16px;height:16px;border-width:3px;"></span>':''}</div>
                <h3 style="color:var(--text-heading); font-weight:600; font-size:20px; margin-top:10px;">${escapeHtml(chat.title||"Чат")}</h3>
                <span class="status-text ${online?'online':''}" style="font-size:13px;">${online?'в сети':(otherUser?.lastSeen?formatLastSeen(otherUser.lastSeen):'офлайн')}</span>
              </div>
              <div class="profile-panel-actions">
                <button class="profile-action-btn" onclick="alert('📞 Звонок — демо')"><span class="action-icon">📞</span>Звонок</button>
                <button class="profile-action-btn" onclick="alert('💬 Сообщение')"><span class="action-icon">💬</span>Написать</button>
                <button class="profile-action-btn" id="profileMuteBtn"><span class="action-icon">${chat.muted?'🔔':'🔇'}</span>${chat.muted?'Звук':'Без звука'}</button>
                <button class="profile-action-btn" id="profilePinBtn"><span class="action-icon">📌</span>${chat.pinned?'Откр.':'Закреп.'}</button>
              </div>
              <div class="divider-thin"></div>
              <div class="profile-section-title">📂 Содержимое</div>
              <div class="profile-row" onclick="alert('📸 Медиа — демо-раздел')">
                <span class="profile-row-icon">📸</span><div class="profile-row-text"><span class="profile-row-label">Медиа</span></div><span class="badge-count">—</span><span class="profile-row-arrow">›</span>
              </div>
              <div class="profile-row" onclick="alert('📁 Файлы — демо-раздел')">
                <span class="profile-row-icon">📁</span><div class="profile-row-text"><span class="profile-row-label">Файлы</span></div><span class="badge-count">—</span><span class="profile-row-arrow">›</span>
              </div>
              <div class="profile-row" onclick="alert('🔗 Ссылки — демо-раздел')">
                <span class="profile-row-icon">🔗</span><div class="profile-row-text"><span class="profile-row-label">Ссылки</span></div><span class="badge-count">—</span><span class="profile-row-arrow">›</span>
              </div>
              <div class="divider-thin"></div>
              <div class="profile-section-title">⚙️ Настройки чата</div>
              <div class="profile-row" id="profileNotifToggle">
                <span class="profile-row-icon">🔔</span><div class="profile-row-text"><span class="profile-row-label">Уведомления</span></div>
                <label class="toggle-switch"><input type="checkbox" ${!chat.muted?'checked':''}><span class="toggle-slider"></span></label>
              </div>
              <div class="profile-row" onclick="alert('🔊 Звуки — настройка в демо')">
                <span class="profile-row-icon">🔊</span><div class="profile-row-text"><span class="profile-row-label">Звук уведомлений</span></div><span class="profile-row-arrow">›</span>
              </div>
              <div class="profile-row" onclick="alert('🎨 Тема чата — демо')">
                <span class="profile-row-icon">🎨</span><div class="profile-row-text"><span class="profile-row-label">Тема чата</span></div><span class="profile-row-arrow">›</span>
              </div>
              <div class="profile-row" onclick="alert('🖼️ Фон чата — демо')">
                <span class="profile-row-icon">🖼️</span><div class="profile-row-text"><span class="profile-row-label">Фон чата</span></div><span class="profile-row-arrow">›</span>
              </div>
              <div class="profile-row" onclick="alert('⏱️ Автоудаление — демо')">
                <span class="profile-row-icon">⏱️</span><div class="profile-row-text"><span class="profile-row-label">Автоудаление</span><span class="profile-row-sub">Выкл</span></div><span class="profile-row-arrow">›</span>
              </div>
              <div class="divider-thin"></div>
              <div class="profile-section-title">⚠️ Опасная зона</div>
              <div class="profile-row danger-row" id="profileClearChat">
                <span class="profile-row-icon">🗑️</span><div class="profile-row-text"><span class="profile-row-label">Очистить чат</span></div>
              </div>
              <div class="profile-row danger-row" id="profileBlockUser">
                <span class="profile-row-icon">🚫</span><div class="profile-row-text"><span class="profile-row-label">Заблокировать</span></div>
              </div>
            </div>`;
            document.body.appendChild(overlay);
            document.body.classList.add('no-scroll');

            const closePanel = () => {
                const panel = document.getElementById('profilePanel');
                if (panel) { panel.classList.add('closing');
                    setTimeout(() => { overlay.remove();
                        document.body.classList.remove('no-scroll'); }, 260); } else { overlay.remove();
                    document.body.classList.remove('no-scroll'); }
            };
            document.getElementById('closeProfilePanel').onclick = closePanel;
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closePanel(); });

            document.getElementById('profileMuteBtn').onclick = async () => {
                const newMuted = !chat.muted;
                await updateDoc(doc(db, "chats", chat.id), { muted: newMuted });
                chat.muted = newMuted;
                const btn = document.getElementById('profileMuteBtn');
                if (btn) btn.innerHTML =
                    `<span class="action-icon">${newMuted?'🔔':'🔇'}</span>${newMuted?'Звук':'Без звука'}`;
                refreshChats();
            };
            document.getElementById('profilePinBtn').onclick = async () => {
                const newPinned = !chat.pinned;
                await updateDoc(doc(db, "chats", chat.id), { pinned: newPinned });
                chat.pinned = newPinned;
                const btn = document.getElementById('profilePinBtn');
                if (btn) btn.innerHTML =
                    `<span class="action-icon">📌</span>${newPinned?'Откр.':'Закреп.'}`;
                refreshChats();
            };
            document.getElementById('profileNotifToggle').querySelector('input').onchange = async (e) => {
                const muted = !e.target.checked;
                await updateDoc(doc(db, "chats", chat.id), { muted });
                chat.muted = muted;
                const btn = document.getElementById('profileMuteBtn');
                if (btn) btn.innerHTML =
                    `<span class="action-icon">${muted?'🔔':'🔇'}</span>${muted?'Звук':'Без звука'}`;
                refreshChats();
            };
            document.getElementById('profileClearChat').onclick = async () => {
                if (confirm('Очистить все сообщения в этом чате?')) {
                    const msgsSnap = await getDocs(collection(db, "chats", chat.id, "messages"));
                    const batch = writeBatch(db);
                    msgsSnap.forEach(d => batch.delete(d.ref));
                    await batch.commit();
                    await updateDoc(doc(db, "chats", chat.id), { lastMessage: "", updatedAt: serverTimestamp() });
                    refreshChats();
                }
            };
            document.getElementById('profileBlockUser').onclick = () => {
                alert('🚫 Блокировка пользователя — демо-функция.');
            };
            setImmediate(() => updateLastSeen());
        }

        async function openChat(chat) {
            if (chatState.chatUnsub) { chatState.chatUnsub();
                chatState.chatUnsub = null; }
            chatState.activeChat = chat;
            const title = chat.title || "Чат";
            const av = chat.avatar || "👤";
            const otherUid = chat.type === 'direct' ? (chat.members || []).find(m => m !== authState.user?.uid) : null;
            const otherUser = otherUid ? cacheState.usersCache.get(otherUid) : null;
            const online = isOnline(otherUser?.lastSeen || chat.lastSeen);
            const existing = document.getElementById('chatFullscreen');
            if (existing) existing.remove();
            document.body.classList.add('no-scroll');
            const fullscreen = document.createElement('div');
            fullscreen.className = 'chat-fullscreen';
            fullscreen.id = 'chatFullscreen';
            fullscreen.innerHTML = `
            <div class="glass-card">
              <div class="chat-header">
                <button id="backToChatsBtn" style="background:none;font-size:22px;color:var(--text-secondary);border:none;cursor:pointer;padding:4px 8px;">←</button>
                <div class="chat-header-tap" id="chatHeaderTap">
                  <div class="avatar" style="width:38px;height:38px;font-size:18px;position:relative;">${escapeHtml(av)}${online?'<span class="online-dot small"></span>':''}</div>
                  <div style="min-width:0;">
                    <div style="font-weight:600;color:var(--text-heading);font-size:14px;">${escapeHtml(title)}</div>
                    <div class="status-text ${online?'online':''}" style="font-size:11px;">${online?'в сети':(otherUser?.lastSeen?formatLastSeen(otherUser.lastSeen):'')}</div>
                  </div>
                </div>
                <button id="chatMenuBtn" style="background:none;font-size:20px;color:var(--text-secondary);border:none;cursor:pointer;padding:4px 8px;">☰</button>
              </div>
              <div class="messages-area" id="chatMessagesArea"></div>
              <div style="display:flex;gap:6px;padding:10px 12px;align-items:center;border-top:1px solid rgba(255,255,255,0.05);background:var(--bg-card);">
                <button id="voiceRecordBtn" class="voice-btn">🎤</button>
                <input type="text" id="messageInput" class="input-premium" style="flex:1;" placeholder="Сообщение...">
                <button id="sendMsgBtn" class="voice-btn" style="font-size:16px;">➤</button>
              </div>
              <div id="recordingIndicator" style="text-align:center;color:#e05555;margin-top:2px;display:none;font-size:12px;">🔴 Запись...</div>
            </div>`;
            document.body.appendChild(fullscreen);
            const messagesContainer = fullscreen.querySelector('#chatMessagesArea');
            const messageInput = fullscreen.querySelector('#messageInput');
            const sendBtn = fullscreen.querySelector('#sendMsgBtn');
            const voiceBtn = fullscreen.querySelector('#voiceRecordBtn');
            const recordingIndicator = fullscreen.querySelector('#recordingIndicator');
            const backBtn = fullscreen.querySelector('#backToChatsBtn');
            const chatHeaderTap = fullscreen.querySelector('#chatHeaderTap');
            const chatMenuBtn = fullscreen.querySelector('#chatMenuBtn');
            const messagesRef = collection(db, "chats", chat.id, "messages");
            const messagesQuery = query(messagesRef, orderBy("createdAt", "asc"));
            let renderedIds = [];
            const renderAllMessages = (docs) => { messagesContainer.innerHTML = ""; const frag = document
                    .createDocumentFragment();
                docs.forEach(doc => { const msg = doc.data();
                    frag.appendChild(createMessageElement(msg, msg.userId === authState.user.uid)); });
                messagesContainer.appendChild(frag);
                messagesContainer.scrollTop = messagesContainer.scrollHeight; };
            chatState.chatUnsub = onSnapshot(messagesQuery, snap => { const docs = snap.docs; if (docs.length ===
                    0) { messagesContainer.innerHTML = "";
                    renderedIds = []; return; } const newIds = docs.map(d => d.id); if (renderedIds.length ===
                    0 || docs.length < renderedIds.length) { renderAllMessages(docs);
                    renderedIds = newIds; return; } let mismatch = false; for (let i = 0; i < renderedIds
                    .length; i++) { if (i >= docs.length || docs[i].id !== renderedIds[i]) { mismatch =
                        true; break; } } if (mismatch) { renderAllMessages(docs);
                    renderedIds = newIds; return; } if (docs.length > renderedIds.length) { const frag = document
                        .createDocumentFragment(); for (let i = renderedIds.length; i < docs.length; i++) { const
                            msg = docs[i].data();
                        frag.appendChild(createMessageElement(msg, msg.userId === authState.user.uid)); }
                    messagesContainer.appendChild(frag);
                    renderedIds = newIds;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight; } });
            backBtn.onclick = () => { if (chatState.chatUnsub) { chatState.chatUnsub();
                    chatState.chatUnsub = null; }
                chatState.activeChat = null;
                voiceState.cleanup();
                fullscreen.remove();
                document.body.classList.remove('no-scroll');
                uiState.page = "chats";
                switchToChatsPage(); };
            chatHeaderTap.onclick = () => openChatProfilePanel(chat);
            chatMenuBtn.onclick = () => openChatProfilePanel(chat);
            const sendMessage = async () => { const text = messageInput.value.trim(); if (!text) return;
                await addDoc(messagesRef, { text, userId: authState.user.uid, createdAt: serverTimestamp() });
                await updateDoc(doc(db, "chats", chat.id), { lastMessage: text, lastMessageUserId: authState.user.uid,
                    updatedAt: serverTimestamp() });
                messageInput.value = "";
                await updateLastSeen(); };
            sendBtn.onclick = sendMessage;
            messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault();
                    sendMessage(); } });
            voiceBtn.onclick = () => { if (voiceState.mediaRecorder && voiceState.mediaRecorder.state ===
                    'recording') { voiceState.mediaRecorder.stop();
                    voiceBtn.classList.remove('recording');
                    recordingIndicator.style.display = 'none'; } else { startVoiceRecording(chat.id, voiceBtn,
                        recordingIndicator); } };
            setImmediate(() => updateLastSeen());
        }

        async function startVoiceRecording(chatId, voiceBtn, indicator) {
            if (!navigator.mediaDevices?.getUserMedia) { alert("Микрофон не доступен"); return; }
            voiceState.cleanup();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                voiceState.mediaStream = stream;
                voiceState.audioChunks = [];
                voiceState.recordingChatId = chatId;
                const recorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                voiceState.mediaRecorder = recorder;
                recorder.ondataavailable = e => { if (e.data.size > 0) voiceState.audioChunks.push(e.data); };
                recorder.onstop = async () => { const chunks = [...voiceState.audioChunks];
                    voiceState.cleanup();
                    voiceBtn.classList.remove('recording');
                    indicator.style.display = 'none'; if (chunks.length === 0) return; const blob = new Blob(chunks, { type: 'audio/webm' }); try { await uploadAudioAndSendMessage(
                            chatId, blob); } catch (e) { console.error("uploadAudio failed:", e); } };
                recorder.start();
                voiceBtn.classList.add('recording');
                indicator.style.display = 'block';
            } catch (err) { console.error("mic error", err);
                voiceState.cleanup();
                voiceBtn.classList.remove('recording');
                indicator.style.display = 'none';
                alert("Ошибка микрофона"); }
        }
        window.addEventListener('beforeunload', () => voiceState.cleanup());

        async function uploadAudioAndSendMessage(chatId, blob) {
            const sendBtn = document.querySelector('#chatFullscreen #sendMsgBtn');
            if (sendBtn) { sendBtn.disabled = true;
                sendBtn.textContent = "⏳"; }
            const messagesRef = collection(db, "chats", chatId, "messages");
            const newMsgRef = doc(messagesRef);
            const filePath = `chats/${chatId}/audio/${newMsgRef.id}.webm`;
            const storageRef = ref(storage, filePath);
            try {
                const uploadTask = uploadBytesResumable(storageRef, blob);
                await new Promise((resolve, reject) => { uploadTask.on('state_changed', null, reject, resolve); });
                const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                const audioEl = document.createElement('audio');
                audioEl.src = downloadURL;
                let duration = 0;
                await new Promise((resolve) => { audioEl.addEventListener('loadedmetadata', () => { duration = audioEl
                            .duration;
                        resolve(); });
                    audioEl.load(); });
                await setDoc(newMsgRef, { type: 'audio', audioURL: downloadURL, duration, userId: authState.user.uid,
                    createdAt: serverTimestamp() });
                await updateDoc(doc(db, "chats", chatId), { lastMessage: "🎤 Голосовое", lastMessageUserId: authState.user
                        .uid, updatedAt: serverTimestamp() });
                await updateLastSeen();
            } catch (error) { console.error("audio upload error", error);
                alert("Не удалось отправить голосовое."); } finally { if (sendBtn) { sendBtn.disabled = false;
                    sendBtn.textContent = "➤"; } }
        }

        function setupGlobalMessageListener() {
            if (!authState.user || chatState.globalChatsUnsub) return;
            const q = query(collection(db, "chats"), where("members", "array-contains", authState.user.uid));
            chatState.globalChatsUnsub = onSnapshot(q, async snap => { snap.docChanges().forEach(async change => { if (
                            change.type === "modified") { const chat = change.doc.data(); const chatId = change.doc
                            .id; if (chat.lastMessageUserId && chat.lastMessageUserId !== authState.user.uid &&
                            chatState.activeChat?.id !== chatId) { if (Notification.permission === 'granted') { const
                                    sender = cacheState.usersCache.get(chat.lastMessageUserId) || await
                                getUserData(chat.lastMessageUserId);
                            new Notification(`${sender?.username||'NEON'} 💬`, { body: chat.lastMessage,
                                icon: '/neon/icon-192x192.png', tag: chatId }).onclick = () => { window
                                    .focus(); const c = chatState.chats.find(x => x.id === chatId); if (
                                    c) openChat(c); }; }
                        refreshChats(); } } }); });
        }

        async function requestNotificationPermissionAndGetToken() {
            if (!messaging) { alert("Браузер не поддерживает уведомления"); return null; }
            try { const swPath = '/neon/firebase-messaging-sw.js'; const reg = await navigator.serviceWorker.register(
                    swPath);
                await navigator.serviceWorker.ready; const permission = await Notification.requestPermission(); if (
                    permission === 'granted') { const token = await getToken(messaging, { vapidKey: 'BDRTV4EZNNWVT9_dRipTDFG_JHwJa53Ne82UgG5g6XdgLWufZumogCNM8EQK_T-Qg9fZDeCEq7_R6DchHcfWXZQ',
                        serviceWorkerRegistration: reg }); if (token) { authState.fcmToken = token; return token; } } } catch (
                error) { console.error("Token error:", error); }
            return null;
        }

        async function saveFCMTokenToFirestore(uid, token) { if (!uid || !token) return;
            await updateDoc(doc(db, "users", uid), { fcmTokens: arrayUnion(token) }).catch(() => {}); }
        if (messaging) { onMessage(messaging, payload => { if (payload.notification) new Notification(payload.notification
                    .title, { body: payload.notification.body, icon: '/neon/icon-192x192.png' }); }); }
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && authState
                .user) { updateLastSeen(); if (uiState.page === 'chats') { if (chatState.globalChatsUnsub) { chatState
                        .globalChatsUnsub();
                        chatState.globalChatsUnsub = null; }
                    setupGlobalMessageListener();
                    refreshChats(); } if (uiState.page === 'wall') { if (chatState.wallUnsub) { chatState.wallUnsub();
                        chatState.wallUnsub = null; }
                    setupWallListener();
                    loadAndRenderWall(); } if (chatState.activeChat) { const c = chatState.activeChat; if (chatState
                        .chatUnsub) { chatState.chatUnsub();
                        chatState.chatUnsub = null; }
                    openChat(c); } } });

        function boot() {
            loadTheme();
            setInterval(() => { if (authState.user && document.visibilityState === 'visible') updateLastSeen(); },
            4 * 60 * 1000);
            onAuthStateChanged(auth, async (user) => {
                if (!uiState.splashHidden) { setTimeout(hideSplash, 1500); }
                if (!user) { authState.user = null;
                    authState.profile = null;
                    chatState.chats = [];
                    chatState.wallPosts = [];
                    uiState.chatsAnimated = false;
                    cacheState.usersCache.clear();
                    cacheState.allUsers = null;
                    cacheState.lastSeenCache.clear(); if (chatState.chatUnsub) chatState.chatUnsub(); if (chatState
                        .globalChatsUnsub) chatState.globalChatsUnsub(); if (chatState.wallUnsub) chatState
                        .wallUnsub();
                    showLogin(); return; }
                let profile = await getUserData(user.uid);
                if (!profile) profile = await ensureProfile(user, user.displayName || "Без имени", user.photoURL ||
                    "👤");
                authState.user = { uid: user.uid, phoneNumber: user.phoneNumber || profile.phoneNumber,
                    displayName: profile.displayName, photoURL: profile.photoURL };
                authState.profile = profile;
                await updateLastSeen();
                await preloadAllUsers();
                if (uiState.page === 'profile') renderProfilePage();
                else switchToChatsPage();
                if (!uiState.isIOS) { const token = await requestNotificationPermissionAndGetToken(); if (token)
                        await saveFCMTokenToFirestore(authState.user.uid, token); }
            });
        }
        boot();
    </script>
</body>
