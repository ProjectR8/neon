        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { min-height: 100vh; min-height: calc(var(--vh, 1vh) * 100); background: var(--bg-body); color: var(--text-primary); -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: background 0.5s ease, color 0.3s ease; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(16px) saturate(180%); border-radius: 32px; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); transition: all 0.3s; }
        @supports not (backdrop-filter: blur(16px)) { .glass { background: var(--glass-bg); } }
        .glass:hover { border-color: var(--glass-hover-border); box-shadow: var(--glass-hover-shadow); }
        .neon-input { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 60px; padding: 14px 20px; color: var(--accent); font-size: 16px; outline: none; width: 100%; transition: all 0.3s; }
        .neon-input:focus { box-shadow: var(--input-focus-shadow); }
        .neon-btn { background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 60px; padding: 12px 24px; font-weight: bold; color: var(--btn-text); cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .neon-btn:hover:not(:disabled) { background: var(--btn-hover-bg); color: var(--btn-hover-text); box-shadow: var(--btn-hover-shadow); }
        .neon-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Нижняя панель Telegram style, теперь прижата к нулю и выше */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; width: 100%;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            padding: 6px 0 8px; border-top: 1px solid var(--nav-border);
            box-shadow: 0 -2px 12px rgba(0,0,0,0.2); z-index: 100;
            height: 70px; border-radius: 0;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0px; font-size: 10px; color: var(--nav-text); background: none; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-weight: 500; transition: all 0.2s; position: relative; min-width: 60px; }
        .nav-item.active { color: var(--nav-active-text); }
        .nav-item.active::before { content: ''; position: absolute; top: -4px; width: 20px; height: 3px; background: var(--nav-active-text); border-radius: 0 0 3px 3px; box-shadow: 0 0 6px var(--nav-active-text); }
        .nav-icon { font-size: 22px; line-height: 1; }
        .nav-item span:not(.nav-icon) { font-size: 10px; line-height: 1; }

        .page { display: none; animation: fade 0.3s; }
        .page.active-page { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .chat-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--chat-item-border); transition: 0.2s; }
        .chat-item.animate-in {
            animation: fadeInUp 0.3s ease both;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .chat-item:active { background: var(--chat-item-active); }
        .avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--avatar-gradient); display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: var(--avatar-shadow); flex-shrink: 0; }
        .badge { background: var(--badge-bg); color: var(--badge-text); border-radius: 40px; padding: 2px 10px; font-size: 11px; margin-left: 8px; }
        .message { max-width: 75%; padding: 10px 18px; border-radius: 24px; margin-bottom: 8px; word-break: break-word; animation: messageIn 0.3s ease both; }
        @keyframes messageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.out { align-self: flex-end; background: var(--msg-out-bg); border: 1px solid var(--msg-out-border); color: var(--msg-out-text); }
        .message.in { align-self: flex-start; background: var(--msg-in-bg); border: 1px solid var(--msg-in-border); color: var(--msg-in-text); }
        .messages-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 16px; -webkit-overflow-scrolling: touch; }
        .wall-post { background: var(--wall-post-bg); backdrop-filter: blur(12px); border-radius: 28px; padding: 18px; margin-bottom: 18px; border: 1px solid var(--wall-post-border); transition: all 0.3s; }
        .loading { text-align: center; color: var(--loading-color); padding: 20px; }
        #recaptcha-container { display: block !important; visibility: visible !important; min-height: 78px; width: 100%; margin: 16px 0 0 0; position: relative; z-index: 10000; }
        textarea { resize: vertical; outline: none; }
        button { outline: none; touch-action: manipulation; }
        .voice-btn { background: none; border: 1px solid var(--voice-btn-border); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--voice-btn-color); font-size: 20px; margin-right: 6px; transition: 0.2s; }
        .voice-btn.recording { background: var(--voice-recording-bg); border-color: var(--voice-recording-border); color: white; box-shadow: var(--voice-recording-shadow); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,255,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,255,0); } }
        .voice-message audio { width: 200px; max-width: 100%; height: 36px; margin-top: 4px; }
        .voice-message .duration { font-size: 12px; opacity: 0.8; margin-left: 8px; }

        .theme-switcher { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 16px 0; }
        .theme-dot { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; position: relative; box-shadow: 0 0 8px rgba(0,0,0,0.3); }
        .theme-dot:hover { transform: scale(1.15); border-color: #fff; box-shadow: 0 0 16px currentColor; }
        .theme-dot.active-theme { border-color: #fff; box-shadow: 0 0 20px currentColor, 0 0 40px currentColor; transform: scale(1.1); }
        .theme-dot.active-theme::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-weight: bold; font-size: 16px; text-shadow: 0 0 4px #000; }
        .theme-dot.neon-cyan { background: linear-gradient(135deg, #0ff, #f0f); color: #0ff; }
        .theme-dot.golden { background: linear-gradient(135deg, #ffb828, #8b5e00); color: #ffb828; }
        .theme-dot.emerald { background: linear-gradient(135deg, #00ff82, #005530); color: #00ff82; }
        .theme-dot.purple { background: linear-gradient(135deg, #b44cff, #4a0080); color: #b44cff; }
        .theme-dot.frost { background: linear-gradient(135deg, #88ccff, #1a3a5c); color: #88ccff; }
        .theme-dot.inferno { background: linear-gradient(135deg, #ff5032, #7a1800); color: #ff5032; }
        .theme-dot.dark { background: linear-gradient(135deg, #444, #111); color: #aaa; }
        .theme-dot.subtle-gold { background: linear-gradient(135deg, #7a6a4e, #3a3028); color: #b48c50; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }

        @media (max-width: 480px) {
            .glass { padding: 12px !important; }
            .bottom-nav { padding: 4px 0 6px; height: 60px; }
            .nav-item { padding: 2px 8px; font-size: 9px; }
            .nav-icon { font-size: 20px; }
            .avatar { width: 44px; height: 44px; font-size: 24px; }
            .message { max-width: 85%; }
            .theme-dot { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>
<div id="root"><div class="loading">✨ Загрузка...</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { initializeFirestore, enableIndexedDbPersistence, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9gA_Nvei89csa7_YrmbnbnxFngb0UKoM",
        authDomain: "neon-messenger-83ed4.firebaseapp.com",
        projectId: "neon-messenger-83ed4",
        storageBucket: "neon-messenger-83ed4.firebasestorage.app",
        messagingSenderId: "954172505610",
        appId: "1:954172505610:web:03f56a8a5b89f2d402a9f3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true, useFetchStreams: false }, 'neonmess');
    enableIndexedDbPersistence(db).catch(e => console.warn("Persistence:", e.code));
    const storage = getStorage(app);
    let messaging = null;
    try { messaging = getMessaging(app); } catch (e) { console.warn("Messaging not supported"); }
    auth.languageCode = "ru";

    const state = {
        user: null, profile: null, page: "chats", chats: [], wallPosts: [],
        activeChat: null, chatUnsub: null, captcha: null, fcmToken: null,
        globalChatsUnsub: null, wallUnsub: null, pollingInterval: null,
        isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent),
        isAndroid: /Android/.test(navigator.userAgent),
        mediaRecorder: null, audioChunks: [], recordingChatId: null,
        currentTheme: 'neon-cyan'
    };
    const root = document.getElementById("root");

    const THEMES = ['neon-cyan','golden','emerald','purple','frost','inferno','dark','subtle-gold'];
    const THEME_LABELS = {
        'neon-cyan': '🔮 Неон', 'golden': '👑 Золото', 'emerald': '🍀 Изумруд',
        'purple': '🌆 Пурпур', 'frost': '❄️ Лёд', 'inferno': '🔥 Огонь',
        'dark': '🌑 Тёмная', 'subtle-gold': '🏅 Серая с золотом'
    };

    function loadTheme() {
        const saved = localStorage.getItem('neon-messenger-theme');
        if (saved && THEMES.includes(saved)) state.currentTheme = saved;
        else state.currentTheme = 'neon-cyan';
        applyTheme(state.currentTheme);
    }
    function applyTheme(themeName) {
        state.currentTheme = themeName;
        document.documentElement.setAttribute('data-theme', themeName);
        localStorage.setItem('neon-messenger-theme', themeName);
        const metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) {
            const themeColors = {
                'neon-cyan': '#0a0f1f','golden': '#1a1008','emerald': '#051510',
                'purple': '#120518','frost': '#0a1018','inferno': '#180a06',
                'dark': '#0a0a0c','subtle-gold': '#1c1c1e'
            };
            metaTheme.setAttribute('content', themeColors[themeName] || '#0a0f1f');
        }
        document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active-theme', d.dataset.theme === themeName));
    }
    function renderThemeSwitcher() {
        const current = state.currentTheme;
        return `<div style="margin-top:8px;">
          <p style="color:var(--text-secondary); font-size:13px; margin-bottom:10px;">🎨 Выберите тему:</p>
          <div class="theme-switcher">
            ${THEMES.map(t => `<div class="theme-dot ${t} ${t === current ? 'active-theme' : ''}" data-theme="${t}" title="${THEME_LABELS[t] || t}" style="cursor:pointer;"></div>`).join('')}
          </div>
          <p style="color:var(--text-secondary); font-size:11px; text-align:center; margin-top:6px;">${THEME_LABELS[current] || current}</p>
        </div>`;
    }
    function bindThemeSwitcherEvents() {
        document.querySelectorAll('.theme-dot').forEach(dot => {
            dot.onclick = () => {
                const theme = dot.dataset.theme;
                if (theme && THEMES.includes(theme)) {
                    applyTheme(theme);
                    if (state.page === 'profile') renderProfilePage();
                }
            };
        });
    }

    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
    const directChatId = (uid1, uid2) => [uid1, uid2].sort().join("__");

    function setViewportHeight() {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    window.addEventListener('resize', setViewportHeight);
    window.addEventListener('orientationchange', setViewportHeight);
    setViewportHeight();

    function resetCaptcha() {
        try { if (state.captcha) state.captcha.clear(); } catch {}
        state.captcha = null;
        const c = document.getElementById("recaptcha-container");
        if (c) c.innerHTML = "";
    }
    async function createCaptcha(containerId) {
        resetCaptcha();
        state.captcha = new RecaptchaVerifier(auth, containerId, { size: "normal", callback: () => console.log("reCAPTCHA solved"), "expired-callback": () => resetCaptcha() });
        await state.captcha.render();
        return state.captcha;
    }

    async function loginWithPhone(phone, containerId) {
        const verifier = await createCaptcha(containerId);
        const confirmation = await signInWithPhoneNumber(auth, phone, verifier);
        const code = prompt("Введите код из SMS:");
        if (!code) throw new Error("Код не введён");
        const result = await confirmation.confirm(code);
        resetCaptcha();
        return result.user;
    }
    async function ensureProfile(user, username, avatar) {
        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);
        const baseData = {
            phone: user.phoneNumber || "",
            username: username || snap.data()?.username || "Без имени",
            avatar: avatar || snap.data()?.avatar || "👤",
            updatedAt: serverTimestamp()
        };
        if (!snap.exists()) await setDoc(ref, { ...baseData, createdAt: serverTimestamp(), fcmTokens: [] });
        else await updateDoc(ref, baseData);
        const fresh = await getDoc(ref);
        const d = fresh.data() || {};
        return { uid: user.uid, phoneNumber: user.phoneNumber || d.phone || "", displayName: d.username || "Без имени", photoURL: d.avatar || "👤" };
    }
    async function loadProfile(uid) {
        const snap = await getDoc(doc(db, "users", uid));
        if (!snap.exists()) return null;
        const d = snap.data();
        return { uid, phoneNumber: d.phone || "", displayName: d.username || "Без имени", photoURL: d.avatar || "👤" };
    }

    function showLogin() {
        root.innerHTML = `
        <div class="glass" style="max-width:520px; margin:56px auto; padding:30px;">
          <h2 style="color:var(--accent); text-align:center;">🔮 NEON LOGIN</h2>
          <input id="phone" class="neon-input" placeholder="Номер телефона (+79991234567)" style="margin-top:16px;">
          <input id="name" class="neon-input" placeholder="Ваше имя" style="margin-top:10px;">
          <input id="avatar" class="neon-input" placeholder="Аватар-эмодзи (например 👾)" style="margin-top:10px;">
          <div id="recaptcha-container"></div>
          <button id="loginBtn" class="neon-btn" style="width:100%; margin-top:10px;">Войти / Регистрация</button>
          <div style="margin-top:12px; font-size:12px; color:var(--text-secondary);">Для Phone Auth должен быть включён номерной вход.</div>
          ${renderThemeSwitcher()}
        </div>`;
        bindThemeSwitcherEvents();
        document.getElementById("loginBtn").onclick = async () => {
            const btn = document.getElementById("loginBtn");
            const phone = document.getElementById("phone").value.trim();
            const name = document.getElementById("name").value.trim();
            const avatar = document.getElementById("avatar").value.trim();
            if (!phone || !name) { alert("Введите номер и имя"); return; }
            btn.disabled = true; btn.textContent = "...";
            try {
                const user = await loginWithPhone(phone, "recaptcha-container");
                const profile = await ensureProfile(user, name, avatar || "👤");
                state.user = { uid: profile.uid, phoneNumber: profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL };
                state.profile = profile;
                renderApp();
                if (!state.isIOS) {
                    const token = await requestNotificationPermissionAndGetToken();
                    if (token) await saveFCMTokenToFirestore(state.user.uid, token);
                }
            } catch (err) {
                alert("Ошибка входа: " + (err?.message || "неизвестная ошибка"));
                showLogin();
            } finally {
                const cur = document.getElementById("loginBtn");
                if (cur) { cur.disabled = false; cur.textContent = "Войти / Регистрация"; }
            }
        };
    }

    async function loadChats() {
        if (!state.user) return [];
        const snap = await getDocs(query(collection(db, "chats"), where("members", "array-contains", state.user.uid)));
        const chats = await Promise.all(snap.docs.map(async d => {
            const data = d.data();
            let title = data.title || "Чат", av = "👤";
            if (data.type === "direct") {
                const other = (data.members || []).find(m => m !== state.user.uid);
                if (other) {
                    const p = await loadProfile(other);
                    if (p) { title = p.displayName; av = p.photoURL; }
                }
            }
            return { id: d.id, ...data, title, avatar: av };
        }));
        chats.sort((a,b) => (b.updatedAt?.toMillis()||0) - (a.updatedAt?.toMillis()||0));
        return chats;
    }
    async function loadWallPosts() {
        const snap = await getDocs(query(collection(db, "wall"), orderBy("createdAt", "desc")));
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    async function refreshChats() { state.chats = await loadChats(); renderChatsList(); }

    function setupWallListener() {
        if (!state.user || state.wallUnsub) return;
        const q = query(collection(db, "wall"), orderBy("createdAt", "desc"));
        state.wallUnsub = onSnapshot(q, snap => {
            state.wallPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (state.page === 'wall') renderWallPostsList();
        });
    }
    async function loadAndRenderWall() {
        const container = document.getElementById("wallPostsContainer");
        if (!container) return;
        container.innerHTML = `<div class="loading">📡 Загрузка постов...</div>`;
        state.wallPosts = await loadWallPosts();
        renderWallPostsList();
        setupWallListener();
    }
    function renderWallPostsList() {
        const c = document.getElementById("wallPostsContainer");
        if (!c) return;
        if (!state.wallPosts.length) { c.innerHTML = `<div class="loading">📡 Ещё нет постов. Напиши первый!</div>`; return; }
        c.innerHTML = state.wallPosts.map(post => {
            const comments = post.comments || [];
            return `
            <div class="wall-post" data-post-id="${post.id}">
              <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
                <div class="avatar" style="width:44px; height:44px; font-size:24px;">${escapeHtml(post.avatar||"👤")}</div>
                <strong style="color:var(--text-heading);">${escapeHtml(post.author||"Аноним")}</strong>
              </div>
              <div style="white-space:pre-wrap;">${escapeHtml(post.content||"")}</div>
              <div style="display:flex; gap:16px; margin-top:12px;">
                <button class="like-btn neon-btn" data-post-id="${post.id}" style="padding:8px 14px;">❤️ ${post.likesCount||0}</button>
                <button class="comment-btn neon-btn" data-post-id="${post.id}" style="padding:8px 14px;">💬 ${comments.length}</button>
              </div>
              <div class="comments" style="margin-top:12px;">
                ${comments.map(c => `<div style="background:var(--comment-bg); border-radius:20px; padding:6px 12px; margin-top:6px;">💬 ${escapeHtml(c)}</div>`).join("")}
              </div>
            </div>`;
        }).join("");
        c.querySelectorAll(".like-btn").forEach(btn => btn.onclick = async () => { await updateDoc(doc(db, "wall", btn.dataset.postId), { likesCount: increment(1) }); });
        c.querySelectorAll(".comment-btn").forEach(btn => btn.onclick = async () => {
            const comment = prompt("Ваш комментарий:"); if (!comment?.trim()) return;
            await updateDoc(doc(db, "wall", btn.dataset.postId), { comments: arrayUnion(comment.trim()) });
        });
    }
    async function publishPost() {
        const input = document.getElementById("postContent"); if (!input) return;
        const content = input.value.trim(); if (!content) return;
        await addDoc(collection(db, "wall"), {
            author: state.profile?.displayName || state.user?.displayName || "Без имени",
            avatar: state.profile?.photoURL || state.user?.photoURL || "👤",
            content, likesCount: 0, comments: [], createdAt: serverTimestamp(), userId: state.user.uid
        });
        input.value = "";
    }

    function renderNav(active) {
        return `<div class="bottom-nav">
          <button class="nav-item ${active==='chats'?'active':''}" data-page="chats"><span class="nav-icon">💬</span><span>Чаты</span></button>
          <button class="nav-item ${active==='wall'?'active':''}" data-page="wall"><span class="nav-icon">📡</span><span>Стена</span></button>
          <button class="nav-item ${active==='profile'?'active':''}" data-page="profile"><span class="nav-icon">👾</span><span>Профиль</span></button>
        </div>`;
    }
    function renderChatsList(animate = false) {
        const list = document.getElementById("chatsList"); if (!list) return;
        if (!state.chats.length) { list.innerHTML = `<div class="loading">✨ Нет чатов. Нажмите + чтобы создать новый.</div>`; return; }
        list.innerHTML = state.chats.map((chat, index) => {
            const delay = (index < 5) ? (0.02 + index * 0.02) : 0;
            const animClass = animate ? 'animate-in' : '';
            const animStyle = animate ? `animation-delay: ${delay}s;` : '';
            return `
          <div class="chat-item ${animClass}" data-chat-id="${chat.id}" style="${animStyle}">
            <div class="avatar">${escapeHtml(chat.avatar||"👤")}</div>
            <div style="min-width:0; flex:1;">
              <div style="font-weight:700; color:var(--text-heading);">${escapeHtml(chat.title||"Чат")}</div>
              <div style="font-size:13px; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(chat.lastMessage||"Нет сообщений")}</div>
            </div>
          </div>`;
        }).join("");
        list.querySelectorAll(".chat-item").forEach(el => el.onclick = () => { const chat = state.chats.find(c => c.id === el.dataset.chatId); if (chat) openChat(chat); });
    }

    function renderChatsPage() {
        root.innerHTML = `
          <div style="display:flex; flex-direction:column; height: calc(var(--vh, 1vh) * 100);">
            <div id="chatsPage" class="page active-page" style="flex:1; overflow-y:auto; padding:0 0 70px;">
              <div style="padding:16px 16px 0;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                  <h2 style="text-shadow:0 0 5px var(--accent); color:var(--text-heading);">💬 NEON CHATS</h2>
                  <button id="newChatBtn" style="background:none; color:var(--accent); font-size:28px; border:1px solid var(--accent); border-radius:40px; padding:4px 16px;">+</button>
                </div>
                <div id="chatsList"><div class="loading">Загрузка чатов...</div></div>
              </div>
            </div>
            ${renderNav("chats")}
          </div>`;
        document.getElementById("newChatBtn").onclick = createNewChat;
        document.querySelectorAll(".nav-item").forEach(btn => btn.onclick = () => switchPage(btn.dataset.page));
        renderChatsList(true);
    }
    function renderWallPage() {
        root.innerHTML = `
          <div style="display:flex; flex-direction:column; height: calc(var(--vh, 1vh) * 100);">
            <div id="wallPage" class="page active-page" style="flex:1; overflow-y:auto; padding:16px 16px 70px;">
              <div class="glass" style="padding:18px;">
                <h2 style="text-shadow:0 0 5px var(--accent); color:var(--text-heading); margin-bottom:20px;">📡 КИБЕР-СТЕНА</h2>
                <textarea id="postContent" rows="2" placeholder="Опубликовать пост..." style="width:100%; border-radius:28px; background:var(--input-bg); border:1px solid var(--input-border); color:var(--accent); padding:12px;"></textarea>
                <div style="display:flex; justify-content:flex-end; margin-top:10px;"><button id="publishPostBtn" class="neon-btn">⚡ ЗАПУСТИТЬ</button></div>
                <div id="wallPostsContainer" style="margin-top:18px;"><div class="loading">Загрузка постов...</div></div>
              </div>
            </div>
            ${renderNav("wall")}
          </div>`;
        document.getElementById("publishPostBtn").onclick = publishPost;
        document.querySelectorAll(".nav-item").forEach(btn => btn.onclick = () => switchPage(btn.dataset.page));
        loadAndRenderWall();
    }
    function renderProfilePage() {
        const profile = state.profile || state.user || { displayName: "Без имени", phoneNumber: "", photoURL: "👤" };
        const notifStatus = Notification.permission;
        root.innerHTML = `
          <div style="display:flex; flex-direction:column; height: calc(var(--vh, 1vh) * 100);">
            <div id="profilePage" class="page active-page" style="flex:1; overflow-y:auto; padding:16px 16px 70px;">
              <div class="glass" style="padding:28px; text-align:center;">
                <div style="width:100px; height:100px; border-radius:50%; margin:0 auto 20px; background:var(--profile-avatar-gradient); display:flex; align-items:center; justify-content:center; font-size:48px;">${escapeHtml(profile.photoURL||"👤")}</div>
                <h3 style="font-size:26px; color:var(--text-heading);">${escapeHtml(profile.displayName||"Без имени")}</h3>
                <p style="color:var(--text-secondary);">${escapeHtml(profile.phoneNumber||"")}</p>
                <hr style="margin:24px 0; border-color:var(--divider-color);">
                ${renderThemeSwitcher()}
                <hr style="margin:24px 0; border-color:var(--divider-color);">
                <div style="background: rgba(0,0,0,0.3); border-radius:20px; padding:15px; margin-bottom:15px;">
                  ${state.isIOS ? `
                    <div style="color:#ff0; font-size:14px; margin-bottom:10px;">⚠️ iOS: уведомления работают только если сайт добавлен на домашний экран (PWA).</div>
                    <p style="color:var(--text-secondary); font-size:12px;">Нажмите «Поделиться» → «На экран Домой», затем откройте приложение с иконки.</p>
                  ` : `
                    <div style="color:${notifStatus==='granted'?'#0f0':'#ff0'}; font-size:14px; margin-bottom:10px;">${notifStatus==='granted'?'✅ Уведомления включены':'⚠️ Уведомления не настроены'}</div>
                    <button id="enableNotificationsBtn" class="neon-btn" style="width:100%;">🔔 ${notifStatus==='granted'?'ОБНОВИТЬ':'ВКЛЮЧИТЬ УВЕДОМЛЕНИЯ'}</button>
                    ${state.isAndroid ? `<p style="color:var(--text-secondary); font-size:11px; margin-top:8px;">Если не приходят: проверьте настройки браузера и системы.</p>` : ''}
                  `}
                </div>
                <button id="editProfileBtn" class="neon-btn" style="margin-top:10px; width:100%;">✏️ Изменить профиль</button>
                <button id="logoutBtn" style="background:none; border:1px solid var(--logout-border); color:var(--logout-text); margin-top:20px; width:100%; padding:10px; border-radius:40px;">ВЫЙТИ</button>
              </div>
            </div>
            ${renderNav("profile")}
          </div>`;
        bindThemeSwitcherEvents();
        if (!state.isIOS) {
            document.getElementById("enableNotificationsBtn").onclick = async () => {
                const token = await requestNotificationPermissionAndGetToken();
                if (token) { await saveFCMTokenToFirestore(state.user.uid, token); alert('✅ Уведомления включены!'); renderProfilePage(); }
                else alert('❌ Не удалось включить. Проверьте разрешения браузера.');
            };
        }
        document.getElementById("editProfileBtn").onclick = async () => {
            const newName = prompt("Новое имя:", profile.displayName||"");
            if (newName === null) return;
            const newAvatar = prompt("Новый аватар-эмодзи:", profile.photoURL||"👤");
            if (newAvatar === null) return;
            await updateDoc(doc(db, "users", state.user.uid), { username: newName.trim() || "Без имени", avatar: newAvatar.trim() || "👤", updatedAt: serverTimestamp() });
            state.profile = { ...profile, displayName: newName.trim(), photoURL: newAvatar.trim() };
            state.user.displayName = state.profile.displayName;
            state.user.photoURL = state.profile.photoURL;
            renderProfilePage();
        };
        document.getElementById("logoutBtn").onclick = async () => {
            await signOut(auth); stopPolling();
            state.user = null; state.profile = null; state.chats = []; state.wallPosts = [];
            if (state.chatUnsub) state.chatUnsub();
            if (state.globalChatsUnsub) state.globalChatsUnsub();
            if (state.wallUnsub) state.wallUnsub();
            showLogin();
        };
        document.querySelectorAll(".nav-item").forEach(btn => btn.onclick = () => switchPage(btn.dataset.page));
    }

    function switchPage(page) {
        if (state.page === page) return;
        if (state.page === 'wall' && state.wallUnsub) { state.wallUnsub(); state.wallUnsub = null; }
        if (state.page === 'chats' && state.globalChatsUnsub) { state.globalChatsUnsub(); state.globalChatsUnsub = null; }
        state.page = page;
        if (page === 'chats') renderApp();
        else if (page === 'wall') renderWallPage();
        else if (page === 'profile') renderProfilePage();
    }
    function renderApp() {
        if (state.page === 'wall') return renderWallPage();
        if (state.page === 'profile') return renderProfilePage();
        renderChatsPage();
        refreshChats();
        setupGlobalMessageListener();
    }

    async function openChat(chat) {
        if (state.chatUnsub) { state.chatUnsub(); state.chatUnsub = null; }
        state.activeChat = chat;
        const title = chat.type === "direct" ? chat.title : (chat.title || "Чат");
        const av = chat.avatar || "👤";
        root.innerHTML = `
          <div style="display:flex; flex-direction:column; height: calc(var(--vh, 1vh) * 100);">
            <div class="glass" style="margin:0; border-radius:0; flex:1; display:flex; flex-direction:column; border:none; box-shadow:none;">
              <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--chat-item-border);">
                <button id="backToChatsBtn" style="background:none; font-size:28px; color:var(--accent); border:none;">←</button>
                <div style="display:flex; align-items:center; gap:10px; flex:1; justify-content:center;">
                  <div class="avatar" style="width:40px; height:40px; font-size:22px;">${escapeHtml(av)}</div>
                  <h3 style="color:var(--text-heading);">${escapeHtml(title)}</h3>
                </div>
                <div style="width:28px;"></div>
              </div>
              <div id="chatMessagesArea" class="messages-area" style="flex:1;"></div>
              <div style="display:flex; gap:6px; padding:12px; align-items:center; border-top:1px solid var(--chat-item-border);">
                <button id="voiceRecordBtn" class="voice-btn">🎤</button>
                <input type="text" id="messageInput" class="neon-input" style="flex:1;" placeholder="Сообщение...">
                <button id="sendMsgBtn" class="voice-btn" style="font-size:18px;">➤</button>
              </div>
              <div id="recordingIndicator" style="text-align:center; color:var(--voice-recording-bg); margin-top:4px; display:none;">🔴 Запись...</div>
            </div>
          </div>`;
        const messagesContainer = document.getElementById("chatMessagesArea");
        const messagesRef = collection(db, "chats", chat.id, "messages");
        const messagesQuery = query(messagesRef, orderBy("createdAt", "asc"));
        state.chatUnsub = onSnapshot(messagesQuery, snap => {
            messagesContainer.innerHTML = "";
            snap.forEach(msgDoc => {
                const msg = msgDoc.data();
                const isOut = msg.userId === state.user.uid;
                const time = msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) : "";
                const div = document.createElement("div");
                div.className = `message ${isOut ? "out" : "in"}`;
                if (msg.type === 'audio') {
                    div.innerHTML = `<div style="display:flex; align-items:center; gap:8px;"><audio controls src="${escapeHtml(msg.audioURL)}"></audio><span style="font-size:12px;">${msg.duration ? Math.round(msg.duration) + 'с' : ''}</span></div><div style="font-size:10px; opacity:0.7; margin-top:4px;">${time}</div>`;
                } else {
                    div.innerHTML = `<div>${escapeHtml(msg.text||"")}</div><div style="font-size:10px; opacity:0.7; margin-top:4px;">${time}</div>`;
                }
                messagesContainer.appendChild(div);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
        document.getElementById("backToChatsBtn").onclick = () => {
            if (state.chatUnsub) { state.chatUnsub(); state.chatUnsub = null; }
            state.activeChat = null; state.page = "chats"; renderApp();
        };
        const sendMsg = async () => {
            const input = document.getElementById("messageInput");
            const text = input.value.trim(); if (!text) return;
            await addDoc(messagesRef, { text, userId: state.user.uid, createdAt: serverTimestamp() });
            await updateDoc(doc(db, "chats", chat.id), { lastMessage: text, lastMessageUserId: state.user.uid, updatedAt: serverTimestamp() });
            input.value = "";
        };
        document.getElementById("sendMsgBtn").onclick = sendMsg;
        document.getElementById("messageInput").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); sendMsg(); } });
        document.getElementById("voiceRecordBtn").onclick = () => toggleVoiceRecording(chat.id);
    }

    async function toggleVoiceRecording(chatId) {
        if (state.mediaRecorder && state.mediaRecorder.state === 'recording') {
            state.mediaRecorder.stop();
            document.getElementById("voiceRecordBtn").classList.remove("recording");
            document.getElementById("recordingIndicator").style.display = "none";
        } else {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("Микрофон не доступен. Используйте HTTPS и современный браузер.");
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                state.audioChunks = [];
                state.recordingChatId = chatId;
                const recorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                state.mediaRecorder = recorder;
                recorder.ondataavailable = e => { if (e.data.size > 0) state.audioChunks.push(e.data); };
                recorder.onstop = async () => {
                    stream.getTracks().forEach(track => track.stop());
                    if (state.audioChunks.length === 0) return;
                    const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
                    state.audioChunks = [];
                    await uploadAudioAndSendMessage(chatId, blob);
                };
                recorder.start();
                document.getElementById("voiceRecordBtn").classList.add("recording");
                document.getElementById("recordingIndicator").style.display = "block";
            } catch (err) {
                console.error("Ошибка доступа к микрофону:", err);
                alert("Не удалось получить доступ к микрофону.");
            }
        }
    }
    async function uploadAudioAndSendMessage(chatId, blob) {
        const btn = document.getElementById("sendMsgBtn");
        btn.disabled = true; btn.textContent = "⏳";
        const messagesRef = collection(db, "chats", chatId, "messages");
        const newMsgRef = doc(messagesRef);
        const filePath = `chats/${chatId}/audio/${newMsgRef.id}.webm`;
        const storageRef = ref(storage, filePath);
        try {
            const uploadTask = uploadBytesResumable(storageRef, blob);
            await new Promise((resolve, reject) => { uploadTask.on('state_changed', null, reject, resolve); });
            const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
            const audioEl = document.createElement('audio'); audioEl.src = downloadURL;
            let duration = 0;
            await new Promise((resolve) => { audioEl.addEventListener('loadedmetadata', () => { duration = audioEl.duration; resolve(); }); audioEl.load(); });
            await setDoc(newMsgRef, { type: 'audio', audioURL: downloadURL, duration, userId: state.user.uid, createdAt: serverTimestamp() });
            await updateDoc(doc(db, "chats", chatId), { lastMessage: "🎤 Голосовое сообщение", lastMessageUserId: state.user.uid, updatedAt: serverTimestamp() });
        } catch (error) {
            console.error("Ошибка загрузки аудио:", error);
            alert("Не удалось отправить голосовое сообщение.");
        } finally {
            btn.disabled = false; btn.textContent = "➤";
        }
    }

    async function createNewChat() {
        const usersSnap = await getDocs(collection(db, "users"));
        const users = [];
        usersSnap.forEach(d => { if (d.id !== state.user.uid) { const data = d.data(); users.push({ uid: d.id, username: data.username || "Пользователь", avatar: data.avatar || "👤" }); } });
        if (!users.length) { alert("Нет других пользователей"); return; }
        const choice = prompt("Выберите пользователя:\n" + users.map((u,i)=>`${i+1}. ${u.username} ${u.avatar}`).join("\n") + "\nВведите номер:");
        const index = parseInt(choice,10)-1;
        const selected = users[index]; if (!selected) return;
        const chatId = directChatId(state.user.uid, selected.uid);
        const chatRef = doc(db, "chats", chatId);
        if (!(await getDoc(chatRef)).exists()) {
            await setDoc(chatRef, { type:"direct", members:[state.user.uid, selected.uid], createdAt:serverTimestamp(), updatedAt:serverTimestamp(), lastMessage:"" });
        }
        state.chats = await loadChats();
        const chat = state.chats.find(c => c.id === chatId);
        if (chat) openChat(chat);
    }

    function setupGlobalMessageListener() {
        if (!state.user || state.globalChatsUnsub) return;
        const q = query(collection(db, "chats"), where("members", "array-contains", state.user.uid));
        state.globalChatsUnsub = onSnapshot(q, async snap => {
            snap.docChanges().forEach(async change => {
                if (change.type === "modified") {
                    const chat = change.doc.data();
                    const chatId = change.doc.id;
                    if (chat.lastMessageUserId && chat.lastMessageUserId !== state.user.uid && state.activeChat?.id !== chatId) {
                        if (Notification.permission === 'granted') {
                            const sender = await loadProfile(chat.lastMessageUserId);
                            new Notification(`${sender?.displayName || 'NEON'} 💬`, { body: chat.lastMessage, icon: '/neon/icon-192x192.png', tag: chatId }).onclick = () => { window.focus(); const c = state.chats.find(x => x.id === chatId); if (c) openChat(c); };
                        }
                        refreshChats();
                    }
                }
            });
        });
    }

    async function requestNotificationPermissionAndGetToken() {
        if (!messaging) { alert("Ваш браузер не поддерживает уведомления"); return null; }
        try {
            const swPath = '/neon/firebase-messaging-sw.js';
            const reg = await navigator.serviceWorker.register(swPath);
            await navigator.serviceWorker.ready;
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await getToken(messaging, { vapidKey: 'BDRTV4EZNNWVT9_dRipTDFG_JHwJa53Ne82UgG5g6XdgLWufZumogCNM8EQK_T-Qg9fZDeCEq7_R6DchHcfWXZQ', serviceWorkerRegistration: reg });
                if (token) { state.fcmToken = token; return token; }
            }
        } catch (error) { console.error("Token error:", error); }
        return null;
    }
    async function saveFCMTokenToFirestore(uid, token) {
        if (!uid || !token) return;
        await updateDoc(doc(db, "users", uid), { fcmTokens: arrayUnion(token) }).catch(()=>{});
    }
    if (messaging) {
        onMessage(messaging, payload => {
            if (payload.notification) new Notification(payload.notification.title, { body: payload.notification.body, icon: '/neon/icon-192x192.png' });
        });
    }

    function startPolling() {
        if (state.pollingInterval) clearInterval(state.pollingInterval);
        state.pollingInterval = setInterval(async () => {
            if (!state.user || document.visibilityState !== 'visible') return;
            if (state.page === 'chats') await refreshChats();
            if (state.page === 'wall') await loadAndRenderWall();
        }, 5000);
    }
    function stopPolling() { if (state.pollingInterval) { clearInterval(state.pollingInterval); state.pollingInterval = null; } }
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && state.user) {
            if (state.page === 'chats') { if (state.globalChatsUnsub) { state.globalChatsUnsub(); state.globalChatsUnsub = null; } setupGlobalMessageListener(); refreshChats(); }
            if (state.page === 'wall') { if (state.wallUnsub) { state.wallUnsub(); state.wallUnsub = null; } setupWallListener(); loadAndRenderWall(); }
            if (state.activeChat) { const c = state.activeChat; if (state.chatUnsub) { state.chatUnsub(); state.chatUnsub = null; } state.activeChat = null; openChat(c); }
        }
    });

    function boot() {
        loadTheme();
        startPolling();
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                stopPolling();
                state.user = null; state.profile = null; state.chats = []; state.wallPosts = [];
                if (state.chatUnsub) state.chatUnsub();
                if (state.globalChatsUnsub) state.globalChatsUnsub();
                if (state.wallUnsub) state.wallUnsub();
                showLogin();
                return;
            }
            let profile = await loadProfile(user.uid);
            if (!profile) profile = await ensureProfile(user, user.displayName || "Без имени", user.photoURL || "👤");
            state.user = { uid: user.uid, phoneNumber: user.phoneNumber || profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL };
            state.profile = profile;
            if (state.page === 'profile') renderProfilePage(); else { state.page = 'chats'; renderApp(); }
            if (!state.isIOS) {
                const token = await requestNotificationPermissionAndGetToken();
                if (token) await saveFCMTokenToFirestore(state.user.uid, token);
            }
        });
    }
    boot();
</script>
</body>
</html>
