<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />

  <title>NEON MESSENGER | чаты + стена</title>
  <style>
    :root { --vh: 1vh; }
    /* ========== ТЕМЫ ========== */
    [data-theme="neon-cyan"] {
      --bg-body: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);

      --voice-recording-bg: #f0f; --voice-recording-border: #f0f; --voice-recording-shadow: 0 0 12px #f0f;

      --loading-color: #ffb828; --divider-color: #ffb828;
      --voice-btn-border: #ffb828; --voice-btn-color: #ffb828;
      --voice-recording-bg: #ff8c00; --voice-recording-border: #ff8c00; --voice-recording-shadow: 0 0 14px #ff8c00;
      --profile-avatar-gradient: linear-gradient(135deg, #ffb828, #ff8c00);
      --logout-border: #ff4444; --logout-text: #ff6666;

      --online-color: #ffb828;
    }
    [data-theme="emerald"] {
      --bg-body: radial-gradient(circle at 20% 30%, #051510, #010805);
      --glass-bg: rgba(10,28,22,0.75); --glass-border: rgba(0,255,130,0.4);
      --accent: #00ff82; --accent2: #00cc66; --accent-glow: rgba(0,255,130,0.55);
      --text-primary: #d0f5e6; --text-secondary: #6dba9e; --text-heading: #a0ffd0;
      --input-bg: rgba(5,20,14,0.8); --input-border: #00ff82; --input-focus-shadow: 0 0 16px #00ff82;
      --btn-bg: linear-gradient(135deg, rgba(0,255,130,0.1), rgba(0,200,100,0.1));
      --btn-border: #00ff82; --btn-text: #00ff82; --btn-hover-bg: #00ff82; --btn-hover-text: #010805; --btn-hover-shadow: 0 0 24px #00ff82;
      --nav-bg: rgba(3,10,7,0.9); --nav-border: #00ff82; --nav-active-text: #a0ffd0; --nav-text: #6dba9e;
      --avatar-gradient: linear-gradient(135deg, #00ff82, #00cc66); --avatar-shadow: 0 0 10px #00ff82;
      --msg-out-bg: #0a2818; --msg-out-border: #00ff82; --msg-out-text: #a0ffd0;
      --msg-in-bg: #101a15; --msg-in-border: #3d8a65; --msg-in-text: #c0d8cc;
      --wall-post-bg: rgba(5,20,14,0.7); --wall-post-border: #00ff82; --comment-bg: rgba(0,255,130,0.12);

      --voice-btn-border: #00ff82; --voice-btn-color: #00ff82;

    [data-theme="purple"] {

      --online-color: #c9a86c;
    }

      --bg-body: #0a0a12; --accent: #c9a86c; --accent2: #d4b87a; --text-heading: #f0ede8; --nav-active-text: #d4b87a;

    }
    [data-theme="deep-noir"] {
      --bg-body: #0a0a0c; --accent: #888; --accent2: #aaa; --text-heading: #fff; --nav-active-text: #aaa;
    }

    }
    [data-theme="plum"] {
      --bg-body: #100a18; --accent: #9b6db5; --accent2: #b08cc8; --text-heading: #f0e8f6; --nav-active-text: #b08cc8;
    }
    [data-theme="ocean"] {
      --bg-body: #0a141a; --accent: #6ba4c9; --accent2: #88b8d8; --text-heading: #e8f0f6; --nav-active-text: #88b8d8;
    }
    [data-theme="terracotta"] {
      --bg-body: #140c0a; --accent: #d4856b; --accent2: #e09a84; --text-heading: #f6ece8; --nav-active-text: #e09a84;
    }
    [data-theme="slate"] {
      --bg-body: #0e1014; --accent: #7a8a98; --accent2: #94a4b0; --text-heading: #eef0f2; --nav-active-text: #94a4b0;
    }
    [data-theme="rose-gold"] {
      --bg-body: #120c0e; --accent: #d4a0a0; --accent2: #e0b8b8; --text-heading: #f6ecec; --nav-active-text: #e0b8b8;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { min-height:100vh; min-height:calc(var(--vh,1vh)*100); background:var(--bg-body); color:var(--text-primary); -webkit-tap-highlight-color:transparent; touch-action:pan-y; overflow:hidden; }
    body.no-scroll { overflow:hidden; }
    .glass { background:var(--glass-bg); backdrop-filter:blur(16px); border-radius:32px; border:1px solid var(--glass-border); box-shadow:var(--glass-shadow); }
    .neon-input { background:var(--input-bg); border:1px solid var(--input-border); border-radius:60px; padding:14px 20px; color:var(--accent); font-size:16px; outline:none; width:100%; }
    .neon-input:focus { box-shadow:var(--input-focus-shadow); }
    .neon-btn { background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:60px; padding:12px 24px; font-weight:bold; color:var(--btn-text); cursor:pointer; transition:0.2s; }
    .neon-btn:active { transform:scale(0.96); }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--nav-bg); backdrop-filter:blur(20px); display:flex; justify-content:space-around; align-items:center; padding:8px 0 14px; border-top:1px solid var(--nav-border); z-index:100; height:88px; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; font-size:13px; color:var(--nav-text); background:none; border:none; padding:4px 14px; border-radius:20px; cursor:pointer; font-weight:500; transition:0.2s; position:relative; min-width:64px; }
    .nav-item.active { color:var(--nav-active-text); }
    .nav-item.active::before { content:''; position:absolute; top:-4px; width:24px; height:3px; background:var(--nav-active-text); border-radius:0 0 3px 3px; }
    .page { display:none; }
    .page.active-page { display:block; }
    .chat-item { display:flex; align-items:center; gap:14px; padding:14px 16px; cursor:pointer; border-bottom:1px solid var(--chat-item-border); transition:0.2s; border-radius:22px; margin:2px 0; }
    .chat-item:active { background:rgba(255,255,255,0.05); }
    .avatar { width:52px; height:52px; border-radius:50%; background:var(--avatar-gradient); display:flex; align-items:center; justify-content:center; font-size:28px; box-shadow:var(--avatar-shadow); flex-shrink:0; position:relative; }
    .online-dot { position:absolute; bottom:2px; right:2px; width:12px; height:12px; border-radius:50%; background:var(--online-color); border:2px solid var(--bg-body); }
    .status-text { font-size:12px; color:var(--text-secondary); }
    .status-text.online { color:var(--online-color); font-weight:500; }
    .message { max-width:78%; padding:12px 18px; border-radius:24px; margin-bottom:12px; word-break:break-word; font-size:16px; line-height:1.4; }
    .message.out { align-self:flex-end; background:var(--msg-out-bg); border:1px solid var(--msg-out-border); color:var(--msg-out-text); border-bottom-right-radius:4px; }
    .message.in { align-self:flex-start; background:var(--msg-in-bg); border:1px solid var(--msg-in-border); color:var(--msg-in-text); border-bottom-left-radius:4px; }
    .messages-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; padding:16px; min-height:0; }
    .voice-message { display:flex; align-items:center; gap:10px; background:rgba(0,0,0,0.3); border-radius:30px; padding:8px 14px; margin:2px 0; max-width:220px; }
    .voice-play-btn { width:32px; height:32px; border-radius:50%; border:none; background:var(--accent); color:#000; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
    .voice-play-btn:active { transform:scale(0.9); }
    .voice-bars { display:flex; align-items:flex-end; gap:2px; height:20px; flex:1; }
    .voice-bar { width:3px; background:var(--accent); border-radius:2px; transition:height 0.15s; height:6px; }
    .voice-message.playing .voice-bar { animation:voiceWave 1s infinite alternate; }
    .voice-bar:nth-child(1){animation-delay:0s;} .voice-bar:nth-child(2){animation-delay:0.1s;}
    .voice-bar:nth-child(3){animation-delay:0.2s;} .voice-bar:nth-child(4){animation-delay:0.3s;}
    .voice-bar:nth-child(5){animation-delay:0.4s;}
    @keyframes voiceWave { 0%{height:6px;} 100%{height:18px;} }
    .voice-time { font-size:12px; color:var(--text-secondary); white-space:nowrap; }
    .neon-heading { text-shadow:0 0 5px var(--accent); color:var(--text-heading); }
    .wall-post { background:var(--wall-post-bg); backdrop-filter:blur(12px); border-radius:28px; padding:18px; margin-bottom:18px; border:1px solid var(--wall-post-border); }
    .voice-btn { background:none; border:1px solid var(--voice-btn-border); border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--voice-btn-color); font-size:20px; transition:0.2s; }
    .voice-btn.recording { background:var(--voice-recording-bg); border-color:var(--voice-recording-border); box-shadow:var(--voice-recording-shadow); animation:pulse 1s infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 var(--voice-recording-bg);} 70%{box-shadow:0 0 0 14px transparent;} 100%{box-shadow:0 0 0 0 transparent;} }
    .chat-fullscreen { position:fixed; top:0; left:0; width:100%; height:100%; z-index:150; display:flex; flex-direction:column; background:var(--bg-body); }
    .chat-fullscreen .glass { height:100%; display:flex; flex-direction:column; border-radius:0; border:none; box-shadow:none; background:var(--bg-body); backdrop-filter:none; }
    .chat-header { display:flex; align-items:center; padding:12px; gap:10px; background:var(--nav-bg); border-radius:0 0 20px 20px; }
    .chat-input-area { display:flex; padding:10px; gap:8px; align-items:center; border-top:1px solid var(--chat-item-border); background:var(--nav-bg); border-radius:20px 20px 0 0; }
    .theme-switcher { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:12px 0; }
    .theme-dot { width:32px; height:32px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:0.3s; position:relative; }
    .theme-dot.active-theme { border-color:#fff; box-shadow:0 0 14px currentColor; }
    .theme-dot.active-theme::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-weight:bold; font-size:14px; }
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; }
    .modal-content { background:var(--glass-bg); backdrop-filter:blur(18px); border-radius:32px; border:1px solid var(--glass-border); padding:24px; max-width:420px; width:90%; max-height:80vh; overflow-y:auto; color:var(--text-primary); }
    .profile-panel-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:300; background:rgba(0,0,0,0.6); display:flex; justify-content:flex-end; }
    .profile-panel { width:100%; height:100%; background:var(--glass-bg); backdrop-filter:blur(20px); border-left:1px solid var(--glass-border); overflow-y:auto; animation:slideIn 0.3s ease; }
    @keyframes slideIn { from{transform:translateX(100%);} to{transform:translateX(0);} }
    .size-option { padding:8px 16px; border-radius:30px; cursor:pointer; border:1px solid var(--btn-border); color:var(--btn-text); font-size:13px; }
    .size-option.active { background:var(--btn-hover-bg); color:var(--btn-hover-text); }
    @media (max-width:480px) { .bottom-nav{height:80px;padding:6px 0 10px;} .avatar{width:44px;height:44px;font-size:24px;} .message{max-width:88%;} }
  </style>
</head>
<body>
<div id="splash" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-body);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;">
  <div style="font-size:72px;font-weight:900;background:linear-gradient(45deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">NEON</div>
  <div style="color:var(--text-secondary);">MESSENGER</div>
</div>
<div id="root"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { initializeFirestore, enableIndexedDbPersistence, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, increment, arrayUnion, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9gA_Nvei89csa7_YrmbnbnxFngb0UKoM",
  authDomain: "neon-messenger-83ed4.firebaseapp.com",
  projectId: "neon-messenger-83ed4",
  storageBucket: "neon-messenger-83ed4.firebasestorage.app",
  messagingSenderId: "954172505610",
  appId: "1:954172505610:web:03f56a8a5b89f2d402a9f3"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = initializeFirestore(app, { experimentalForceLongPolling: true }, 'neonmess');
enableIndexedDbPersistence(db).catch(()=>{});
const storage = getStorage(app);
auth.languageCode = "ru";

const authState = { user: null, profile: null, captcha: null };
const chatState = { chats: [], activeChat: null, chatUnsub: null, globalChatsUnsub: null, wallPosts: [], wallUnsub: null };
const voiceState = { mediaRecorder: null, stream: null, chunks: [], chatId: null, cleanup(){ if(this.stream){ this.stream.getTracks().forEach(t=>t.stop()); } if(this.mediaRecorder&&this.mediaRecorder.state!=='inactive')this.mediaRecorder.stop(); this.chunks=[]; } };
const uiState = { page:"chats", theme:localStorage.getItem('neon-theme')||'neon-cyan', msgSize:localStorage.getItem('msgSize')||'standard' };
const cache = { users: new Map(), all: null };
const THEMES = ['neon-cyan','golden','emerald','purple','frost','inferno','dark','subtle-gold','premium-gold','deep-noir','forest','plum','ocean','terracotta','slate','rose-gold'];

const eHtml = v=>String(v??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const chatId = (a,b)=>[a,b].sort().join('__');
const isOnline = ts => ts ? (Date.now() - (ts.toMillis?ts.toMillis():ts)) < 300000 : false;
const lastSeenText = ts => {
  if(!ts) return '';
  const d = ts.toDate?ts.toDate():new Date(ts);
  const diff = Date.now() - d.getTime();
  if(diff < 60000) return 'был(а) только что';
  if(diff < 3600000) return `был(а) ${Math.floor(diff/60000)} мин назад`;
  if(diff < 86400000) return `был(а) ${Math.floor(diff/3600000)} ч назад`;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  if(d.toDateString() === yesterday.toDateString()) return 'был(а) вчера';
  if(diff < 172800000) return 'был(а) 2 дня назад';
  return `был(а) ${d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'numeric'})}`;
};

function applyTheme(t){ 
  uiState.theme=t; 
  document.documentElement.setAttribute('data-theme',t); 
  localStorage.setItem('neon-theme',t);
}
function loadTheme(){ applyTheme(uiState.theme); }

async function getUser(uid){ if(cache.users.has(uid)) return cache.users.get(uid); const s=await getDoc(doc(db,"users",uid)); if(!s.exists())return null; const d=s.data(); const u={uid, username:d.username||'Без имени', avatar:d.avatar||'👤', lastSeen:d.lastSeen||null}; cache.users.set(uid,u); return u; }
async function preloadUsers(){ const s=await getDocs(collection(db,"users")); cache.all=[]; s.forEach(d=>{const u={uid:d.id,username:d.data().username||'Пользователь',avatar:d.data().avatar||'👤',lastSeen:d.data().lastSeen}; cache.users.set(u.uid,u); if(u.uid!==authState.user?.uid) cache.all.push(u);}); }

function renderNav(active){
  return `<div class="bottom-nav">

      </div>

    </div>
    <div class="messages-area" id="msgArea"></div>

      <input id="msgInput" class="neon-input" placeholder="Сообщение..." style="flex:1;">

    </div>
    <div id="recIndicator" style="text-align:center;color:var(--voice-recording-bg);display:none;">🔴 запись...</div>
  </div>`;
  document.body.appendChild(fs);
  const msgArea=fs.querySelector('#msgArea'), msgInput=fs.querySelector('#msgInput');
  const sendBtn=fs.querySelector('#sendBtn'), voiceBtn=fs.querySelector('#voiceBtn');
  const backBtn=fs.querySelector('#backBtn'), menuBtn=fs.querySelector('#menuBtn');
  const ref=collection(db,"chats",chat.id,"messages");
  const q=query(ref,orderBy("createdAt","asc"));
  let rendered=[];
  const renderAll=docs=>{msgArea.innerHTML='';docs.forEach(d=>msgArea.appendChild(createMsgEl(d.data(),d.data().userId===authState.user.uid)));msgArea.scrollTop=msgArea.scrollHeight;};
  chatState.chatUnsub=onSnapshot(q,snap=>{
    const docs=snap.docs;
    if(docs.length===0){msgArea.innerHTML='';rendered=[];return;}
    if(rendered.length===0||docs.length<rendered.length){renderAll(docs);rendered=docs.map(d=>d.id);return;}
    let mismatch=false;
    for(let i=0;i<rendered.length;i++){if(i>=docs.length||docs[i].id!==rendered[i]){mismatch=true;break;}}
    if(mismatch){renderAll(docs);rendered=docs.map(d=>d.id);return;}
    if(docs.length>rendered.length){
      for(let i=rendered.length;i<docs.length;i++) msgArea.appendChild(createMsgEl(docs[i].data(),docs[i].data().userId===authState.user.uid));
      rendered=docs.map(d=>d.id); msgArea.scrollTop=msgArea.scrollHeight;
    }
  });

  voiceBtn.onclick=()=>{if(voiceState.mediaRecorder&&voiceState.mediaRecorder.state==='recording'){voiceState.mediaRecorder.stop();voiceBtn.classList.remove('recording');}else startRecording(chat.id,voiceBtn,fs.querySelector('#recIndicator'));};

  function closeChat(){ if(chatState.chatUnsub){chatState.chatUnsub();chatState.chatUnsub=null;} chatState.activeChat=null; voiceState.cleanup(); fs.remove(); switchPage('chats'); }
}

function createMsgEl(msg,isOut){
  const size=uiState.msgSize==='small'?'13px':(uiState.msgSize==='large'?'20px':'16px');
  if(msg.type==='audio'){
    const div=document.createElement('div'); div.className='message '+(isOut?'out':'in'); div.style.fontSize=size;
    const player=document.createElement('div'); player.className='voice-message';
    player.innerHTML=`<button class="voice-play-btn">▶</button><div class="voice-bars">${Array(5).fill('<div class="voice-bar"></div>').join('')}</div><span class="voice-time">${msg.duration?Math.round(msg.duration)+'с':''}</span>`;
    const audio=new Audio(msg.audioURL);
    let playing=false;
    player.querySelector('.voice-play-btn').onclick=()=>{
      if(playing){ audio.pause(); player.classList.remove('playing'); playing=false; player.querySelector('.voice-play-btn').textContent='▶'; }
      else{ audio.play(); player.classList.add('playing'); playing=true; player.querySelector('.voice-play-btn').textContent='⏸'; }
    };
    audio.onended=()=>{player.classList.remove('playing');playing=false;player.querySelector('.voice-play-btn').textContent='▶';};
    div.appendChild(player);
    const t=msg.createdAt?.toDate?new Date(msg.createdAt.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
    div.innerHTML+=`<div style="font-size:10px;margin-top:4px;">${t}</div>`;
    return div;
  } else {
    const div=document.createElement('div'); div.className='message '+(isOut?'out':'in'); div.style.fontSize=size;
    const t=msg.createdAt?.toDate?new Date(msg.createdAt.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
    div.innerHTML=`<div>${eHtml(msg.text||'')}</div><div style="font-size:10px;margin-top:4px;">${t}</div>`;
    return div;
  }
}

async function startRecording(chatId, voiceBtn, indicator){
  if(!navigator.mediaDevices?.getUserMedia){ alert("Микрофон не доступен"); return; }
  voiceState.cleanup();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    voiceState.stream=stream; voiceState.chunks=[]; voiceState.chatId=chatId;
    const recorder=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});
    voiceState.mediaRecorder=recorder;
    recorder.ondataavailable=e=>{if(e.data.size>0) voiceState.chunks.push(e.data);};
    recorder.onstop=async()=>{
      const chunks=[...voiceState.chunks]; voiceState.cleanup();
      voiceBtn.classList.remove('recording'); indicator.style.display='none';
      if(chunks.length===0) return;
      const blob=new Blob(chunks,{type:'audio/webm'});
      try{ await uploadAudioAndSendMessage(chatId,blob); } catch(e){ console.error(e); }
    };
    recorder.start(); voiceBtn.classList.add('recording'); indicator.style.display='block';
  }catch(err){ voiceState.cleanup(); voiceBtn.classList.remove('recording'); indicator.style.display='none'; alert("Ошибка микрофона"); }
}
async function uploadAudioAndSendMessage(chatId,blob){
  const sendBtn=document.querySelector('#chatFullscreen #sendBtn');
  if(sendBtn){sendBtn.disabled=true;sendBtn.textContent='⏳';}
  const messagesRef=collection(db,"chats",chatId,"messages");
  const newMsgRef=doc(messagesRef);
  const filePath=`chats/${chatId}/audio/${newMsgRef.id}.webm`;
  const storageRef=ref(storage,filePath);
  try{
    const uploadTask=uploadBytesResumable(storageRef,blob);
    await new Promise((resolve,reject)=>{uploadTask.on('state_changed',null,reject,resolve);});
    const downloadURL=await getDownloadURL(uploadTask.snapshot.ref);
    const audioEl=document.createElement('audio'); audioEl.src=downloadURL;
    let duration=0;
    await new Promise(resolve=>{audioEl.addEventListener('loadedmetadata',()=>{duration=audioEl.duration;resolve();});audioEl.load();});
    await setDoc(newMsgRef,{type:'audio',audioURL:downloadURL,duration,userId:authState.user.uid,createdAt:serverTimestamp()});
    await updateDoc(doc(db,"chats",chatId),{lastMessage:"🎤 Голосовое",lastMessageUserId:authState.user.uid,updatedAt:serverTimestamp()});
  }catch(e){console.error(e); alert("Ошибка отправки голосового");}
  finally{ if(sendBtn){sendBtn.disabled=false;sendBtn.textContent='▸';} }
}

  `).join('');
  c.querySelectorAll('.like-btn').forEach(btn=>btn.onclick=async()=>{const id=btn.dataset.postId; if(likingPosts.has(id))return; likingPosts.add(id); btn.disabled=true; try{await updateDoc(doc(db,"wall",id),{likesCount:increment(1)});}catch(e){} finally{likingPosts.delete(id);btn.disabled=false;}});
  c.querySelectorAll('.comment-btn').forEach(btn=>btn.onclick=async()=>{const comment=prompt("Комментарий:");if(!comment?.trim())return;await updateDoc(doc(db,"wall",btn.dataset.postId),{comments:arrayUnion(comment.trim())});});
}
function setupWallListener(){
  if(!authState.user||chatState.wallUnsub) return;
  const q=query(collection(db,"wall"),orderBy("createdAt","desc"));
  chatState.wallUnsub=onSnapshot(q,snap=>{chatState.wallPosts=snap.docs.map(d=>({id:d.id,...d.data()}));if(uiState.page==='wall')renderWallPostsList(chatState.wallPosts);});
}
function setupGlobalListener(){
  if(!authState.user||chatState.globalChatsUnsub) return;
  const q=query(collection(db,"chats"),where("members","array-contains",authState.user.uid));
  chatState.globalChatsUnsub=onSnapshot(q,()=>{refreshChats();});
}

let mainTouchX=0;
document.addEventListener('touchstart',e=>{if(e.target.closest('.chat-fullscreen,.profile-panel-overlay,.modal-overlay'))return; mainTouchX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  if(e.target.closest('.chat-fullscreen,.profile-panel-overlay,.modal-overlay'))return;
  const diff=e.changedTouches[0].clientX - mainTouchX;
  if(Math.abs(diff)<60) return;
  const pages=['chats','wall','profile']; const idx=pages.indexOf(uiState.page);
  if(diff>0&&idx>0) switchPage(pages[idx-1]);
  else if(diff<0&&idx<pages.length-1) switchPage(pages[idx+1]);
});

function showLogin(){
  root.innerHTML=`<div class="glass" style="max-width:460px;margin:40px auto;padding:28px;">
    <h2 class="neon-heading" style="text-align:center;">Вход</h2>
    <input id="phone" class="neon-input" placeholder="Телефон +7..." style="margin-top:16px;">
    <input id="name" class="neon-input" placeholder="Имя" style="margin-top:10px;">
    <input id="avatar" class="neon-input" placeholder="Аватар-эмодзи" style="margin-top:10px;">
    <div id="recaptcha-container"></div>
    <button id="loginBtn" class="neon-btn" style="width:100%;margin-top:12px;">Войти</button>
    ${themeSwitcher()}
  </div>`;
  bindThemeDots();
  document.getElementById("loginBtn").onclick=async()=>{
    const btn=document.getElementById("loginBtn");
    const phone=document.getElementById("phone").value.trim();
    const name=document.getElementById("name").value.trim();
    const avatar=document.getElementById("avatar").value.trim();
    if(!phone||!name){alert("Введите номер и имя");return;}
    btn.disabled=true;btn.textContent="...";
    try{
      const user=await loginWithPhone(phone,"recaptcha-container");
      const profile=await ensureProfile(user,name,avatar||"👤");
      authState.user={uid:profile.uid,phoneNumber:profile.phoneNumber,displayName:profile.displayName,photoURL:profile.photoURL};
      authState.profile=profile;
      await preloadUsers();
      switchPage('chats');
    }catch(err){alert("Ошибка: "+err.message);showLogin();}
    finally{const cur=document.getElementById("loginBtn");if(cur){cur.disabled=false;cur.textContent="Войти";}}
  };
}
async function loginWithPhone(phone,containerId){
  authState.captcha=new RecaptchaVerifier(auth,containerId,{size:'normal'});
  await authState.captcha.render();
  const confirmation=await signInWithPhoneNumber(auth,phone,authState.captcha);
  const code=prompt("Код из SMS:");
  if(!code) throw new Error("Код не введён");
  const result=await confirmation.confirm(code);
  authState.captcha.clear();
  return result.user;
}
async function ensureProfile(user,name,avatar){
  const ref=doc(db,"users",user.uid); const snap=await getDoc(ref);
  const data={phone:user.phoneNumber||"",username:name,avatar,updatedAt:serverTimestamp(),lastSeen:serverTimestamp()};
  if(!snap.exists()) await setDoc(ref,{...data,createdAt:serverTimestamp()});
  else await updateDoc(ref,data);
  const fresh=await getDoc(ref); const d=fresh.data();
  return {uid:user.uid,phoneNumber:user.phoneNumber,displayName:d.username,photoURL:d.avatar};
}

function boot(){
  loadTheme();
  onAuthStateChanged(auth,async user=>{
    if(!user){ showLogin(); return; }
    let p=await getUser(user.uid);
    if(!p) p=await ensureProfile(user,user.displayName||'Без имени',user.photoURL||'👤');
    authState.user={uid:user.uid,phoneNumber:user.phoneNumber||p.phoneNumber,displayName:p.displayName,photoURL:p.photoURL};
    authState.profile=p;
    await preloadUsers();
    switchPage('chats');
  });
}
boot();
</script>
