<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <title>NEON MESSENGER | PREMIUM</title>
  <style>
    /* === общие стили (без изменений) === */
    :root { --bg: #0a0f1f; --surface: rgba(15, 25, 45, 0.7); --surface-border: rgba(0, 255, 255, 0.35); --text-primary: #d8f8ff; --text-secondary: #9db7d3; --accent: #0ff; --accent-glow: rgba(0, 255, 255, 0.5); --danger: #ff5580; --premium: #f5c542; --safe-bottom: env(safe-area-inset-bottom, 20px); --radius-lg: 32px; --radius-md: 24px; --radius-sm: 18px; --font: 'Montserrat', system-ui, -apple-system, sans-serif; --transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); --glass-blur: 22px; --bg-image: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b); }
    body.theme-neon { --bg: #0a0f1f; --surface: rgba(15, 25, 45, 0.7); --surface-border: rgba(0, 255, 255, 0.35); --text-primary: #d8f8ff; --text-secondary: #9db7d3; --accent: #0ff; --accent-glow: rgba(0, 255, 255, 0.5); --danger: #ff5580; --bg-image: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b); }
    body.theme-minimal { --bg: #0a0a0a; --surface: rgba(18, 18, 18, 0.8); --surface-border: rgba(255, 255, 255, 0.06); --text-primary: #f0f0f0; --text-secondary: #a0a0a0; --accent: #c8a96e; --accent-glow: rgba(200, 169, 110, 0.3); --danger: #b05a5a; --bg-image: radial-gradient(ellipse at 50% 0%, #1a1a1a 0%, #0a0a0a 70%); }
    body.theme-glass { --bg: #15202b; --surface: rgba(30, 40, 50, 0.65); --surface-border: rgba(255, 255, 255, 0.08); --text-primary: #e7e9ec; --text-secondary: #8b98a5; --accent: #1da1f2; --accent-glow: rgba(29, 161, 242, 0.35); --danger: #e0245e; --glass-blur: 28px; --bg-image: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 70%); }
    * { margin:0; padding:0; box-sizing:border-box; font-family:var(--font); }
    body { min-height: 100vh; min-height: calc(var(--vh, 1vh) * 100); background: var(--bg); background-image: var(--bg-image); color: var(--text-primary); -webkit-tap-highlight-color: transparent; touch-action: manipulation; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
    .glass { background: var(--surface); backdrop-filter: blur(var(--glass-blur)) saturate(180%); -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%); border-radius: var(--radius-lg); border: 1px solid var(--surface-border); box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 12px var(--accent-glow); transition: var(--transition); }
    .glass:hover { border-color: var(--accent); box-shadow: 0 0 28px var(--accent-glow), 0 8px 32px rgba(0,0,0,0.6); }
    .neon-input { background: rgba(255,255,255,0.04); border: 1px solid var(--surface-border); border-radius: 60px; padding: 14px 20px; color: var(--text-primary); font-size: 16px; outline: none; width: 100%; transition: var(--transition); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); font-weight: 600; }
    .neon-input:focus { border-color: var(--accent); box-shadow: 0 0 18px var(--accent-glow); }
    textarea.neon-input { border-radius: 28px; resize: vertical; }
    .neon-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--surface-border); border-radius: 60px; padding: 12px 24px; font-weight: 700; color: var(--text-primary); cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: inline-flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; }
    .neon-btn::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, var(--accent-glow), transparent 70%); opacity: 0; transition: opacity 0.4s; }
    .neon-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); border-color: var(--accent); box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
    .neon-btn:active:not(:disabled) { transform: scale(0.97); }
    .neon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; display: flex; justify-content: center; gap: 0; padding: 10px 0 calc(10px + var(--safe-bottom)); background: var(--surface); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur)); border-radius: 34px 34px 0 0; border: 1px solid var(--surface-border); border-bottom: none; box-shadow: 0 -4px 20px rgba(0,0,0,0.5), 0 0 8px var(--accent-glow); z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); border: none; background: transparent; cursor: pointer; transition: 0.3s; position: relative; height: 64px; }
    .nav-item.active { color: var(--accent); text-shadow: 0 0 8px var(--accent-glow); }
    .nav-item.active::after { content: ''; position: absolute; bottom: 4px; width: 40px; height: 4px; background: var(--accent); border-radius: 4px; box-shadow: 0 0 12px var(--accent-glow); animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(10px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .nav-icon { font-size: 24px; transition: transform 0.3s; }
    .nav-item.active .nav-icon { transform: scale(1.15); }
    .nav-label { font-size: 10px; font-weight: 700; margin-top: 4px; letter-spacing: 0.5px; }

    .page { display: none; }
    .page.visible-page { display: block; animation: fadeSlide 0.3s ease; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .chat-item { display: flex; align-items: center; gap: 16px; padding: 14px 18px; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); background: transparent; margin-bottom: 6px; }
    .chat-item:active { background: rgba(255,255,255,0.03); transform: scale(0.98); }
    .avatar { position: relative; width: 52px; height: 52px; min-width: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), rgba(0,0,0,0.3)); background-size: 160% 160%; background-position: center; border: 1px solid var(--surface-border); display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); overflow: hidden; transition: var(--transition); }
    .online-dot { position: absolute; bottom: 4px; right: 4px; width: 13px; height: 13px; background: #4caf50; border-radius: 50%; border: 2px solid var(--bg); box-shadow: 0 0 8px rgba(76,175,80,0.6); animation: breathe 2s infinite; }
    @keyframes breathe { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.2); opacity:0.8; } }
    .premium-badge { position: absolute; top: -4px; right: -4px; font-size: 18px; filter: drop-shadow(0 0 6px var(--premium)); z-index: 2; }
    .wall-post { background:var(--surface); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-radius:var(--radius-md); padding:20px; margin-bottom:16px; border:1px solid var(--surface-border); transition:var(--transition); box-shadow:0 10px 30px rgba(0,0,0,0.5); }
    .comment-thread { margin-top:16px; padding-left:16px; border-left: 1px solid var(--surface-border); }
    .comment-item { background: rgba(255,255,255,0.02); border-radius: 18px; padding: 10px 14px; margin-top: 12px; border: 1px solid var(--surface-border); }
    .loading { text-align:center; color:var(--text-secondary); padding:28px; letter-spacing:1px; animation:pulseText 2.4s infinite; }
    @keyframes pulseText { 0%,100%{ opacity:0.4; } 50%{ opacity:0.8; } }
    #recaptcha-container { display:block!important; visibility:visible!important; min-height:78px; width:100%; margin:16px 0 0 0; }
    #search-modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    #search-modal-overlay.hidden { display: none; }
    #search-modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--surface-border); box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 20px var(--accent-glow); width: 100%; max-width: 420px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
    #search-modal .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--surface-border); display: flex; justify-content: space-between; align-items: center; color: var(--text-primary); font-weight: 700; }
    #search-modal .modal-body { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; }
    .search-user-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.2s; }
    .search-user-item:hover { background: rgba(255,255,255,0.04); }

    /* === ЧАТ UI === */
    .chat-container { height: 100vh; height: calc(var(--vh, 1vh) * 100); display: flex; flex-direction: column; background: var(--bg); }
    .chat-header { display: flex; align-items: center; padding: 10px 16px; background: var(--surface); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur)); border-bottom: 1px solid var(--surface-border); position: sticky; top: 0; z-index: 10; height: 64px; }
    .back-btn, .delete-btn { background: none; border: none; color: var(--text-primary); font-size: 24px; cursor: pointer; padding: 8px; line-height: 1; }
    .back-btn { margin-right: 8px; }
    .delete-btn { margin-left: auto; }
    .header-info { margin-left: 12px; flex: 1; min-width: 0; }
    .header-title { font-weight: 700; font-size: 16px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-status { font-size: 12px; color: var(--text-secondary); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg); -webkit-overflow-scrolling: touch; }

    .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; margin-bottom: 2px; word-break: break-word; position: relative; font-size: 15px; line-height: 1.4; animation: msgIn 0.25s ease-out; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.out { align-self: flex-end; background: rgba(29, 161, 242, 0.15); border: 1px solid rgba(29, 161, 242, 0.3); }
    .message.in { align-self: flex-start; background: rgba(255, 255, 255, 0.04); }
    .message.out + .message.out { border-top-right-radius: 6px; margin-top: -1px; }
    .message.in + .message.in { border-top-left-radius: 6px; margin-top: -1px; }
    .message .edit-btn { position: absolute; top: 4px; right: 8px; background: rgba(0,0,0,0.5); border: none; color: var(--accent); font-size: 13px; padding: 2px 6px; border-radius: 10px; opacity: 0; transition: opacity 0.2s; }
    .message:hover .edit-btn, .message:active .edit-btn { opacity: 1; }

    .chat-input-area { display: flex; align-items: center; margin: 10px 12px; margin-bottom: calc(10px + var(--safe-bottom)); border-radius: 28px; background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--surface-border); padding: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .chat-input-area .voice-btn { background: none; border: none; color: var(--text-secondary); font-size: 22px; padding: 6px; margin-right: 4px; }
    .chat-input-area .voice-btn.recording { color: var(--accent); }
    #messageInput { flex: 1; background: transparent; border: none; color: var(--text-primary); font-size: 15px; outline: none; padding: 6px 8px; }
    .send-btn { background: var(--accent); border: none; color: var(--bg); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-left: 4px; cursor: pointer; transition: transform 0.2s; flex-shrink: 0; }
    .send-btn:active { transform: scale(0.9); }
    .typing-indicator { padding: 2px 16px; font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; height: 20px; }
    .recording-indicator { text-align: center; color: var(--accent); font-size: 14px; padding: 4px; }
    @media (max-width:480px) { .message { max-width: 85%; } }
  </style>
</head>
<body class="theme-glass">
<div id="root"><div class="loading">✦ Загрузка...</div></div>

<div id="search-modal-overlay" class="hidden">
  <div id="search-modal">
    <div class="modal-header">
      <span>🔍 Новый чат</span>
      <button id="close-search-modal" style="background:none;border:none;color:var(--text-primary);font-size:24px;cursor:pointer;">✕</button>
    </div>
    <div style="padding:8px 16px;">
      <input type="text" id="user-search-input" class="neon-input" placeholder="Поиск по имени..." autocomplete="off" />
    </div>
    <div class="modal-body" id="search-results-container">
      <div class="loading">Загрузка...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { initializeFirestore, enableIndexedDbPersistence, collection, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, addDoc, query, where, orderBy, limit, startAfter, onSnapshot, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA9gA_Nvei89csa7_YrmbnbnxFngb0UKoM",
    authDomain: "neon-messenger-83ed4.firebaseapp.com",
    projectId: "neon-messenger-83ed4",
    storageBucket: "neon-messenger-83ed4.firebasestorage.app",
    messagingSenderId: "954172505610",
    appId: "1:954172505610:web:03f56a8a5b89f2d402a9f3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = initializeFirestore(app, { experimentalForceLongPolling: true, useFetchStreams: false }, 'neonmess');
  enableIndexedDbPersistence(db).catch(e => console.warn("Persistence:", e.code));
  const storage = getStorage(app);
  let messaging = null;
  try { messaging = getMessaging(app); } catch (e) { console.warn("Messaging not supported"); }
  auth.languageCode = "ru";

  const THEME_KEY = 'neon_theme';
  function applyTheme(theme) {
    document.body.className = '';
    if (theme === 'neon') document.body.classList.add('theme-neon');
    else if (theme === 'minimal') document.body.classList.add('theme-minimal');
    else document.body.classList.add('theme-glass');
    localStorage.setItem(THEME_KEY, theme);
  }
  const savedTheme = localStorage.getItem(THEME_KEY) || 'glass';
  applyTheme(savedTheme);

  const USER_CACHE_TTL = 60_000;
  const CHATS_PAGE_SIZE = 30;

  const state = {
    user: null, profile: null, page: "chats", chats: [], wallPosts: [],
    activeChat: null, chatUnsub: null, captcha: null, fcmToken: null,
    globalChatsUnsub: null, wallUnsub: null, pollingInterval: null, heartbeatInterval: null,
    isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent),
    isAndroid: /Android/.test(navigator.userAgent),
    mediaRecorder: null, audioChunks: [], recordingChatId: null,
    typingTimers: {}, typingUnsub: null, presenceUnsub: null,
    cachedUsers: { data: null, lastFetch: 0 },
    chatsCursor: null,
    loadingMoreChats: false,
    allChatsLoaded: false,
    renderedMessages: new Set()
  };

  const root = document.getElementById("root");
  const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
  const directChatId = (uid1, uid2) => [uid1, uid2].sort().join("__");

  function setViewportHeight() {
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
  }
  window.addEventListener('resize', setViewportHeight);
  window.addEventListener('orientationchange', setViewportHeight);
  setViewportHeight();

  function resetCaptcha() { try { if (state.captcha) state.captcha.clear(); } catch {} state.captcha = null; const c = document.getElementById("recaptcha-container"); if (c) c.innerHTML = ""; }
  async function createCaptcha(containerId) { resetCaptcha(); state.captcha = new RecaptchaVerifier(auth, containerId, { size: "normal", callback: () => console.log("reCAPTCHA solved"), "expired-callback": () => resetCaptcha() }); await state.captcha.render(); return state.captcha; }
  async function loginWithPhone(phone, containerId) { const verifier = await createCaptcha(containerId); const confirmation = await signInWithPhoneNumber(auth, phone, verifier); const code = prompt("Введите код из SMS:"); if (!code) throw new Error("Код не введён"); const result = await confirmation.confirm(code); resetCaptcha(); return result.user; }
  async function ensureProfile(user, username, avatar) { const ref = doc(db, "users", user.uid); const snap = await getDoc(ref); const baseData = { phone: user.phoneNumber || "", username: username || snap.data()?.username || "Без имени", avatar: avatar || snap.data()?.avatar || "👤", online: true, lastSeen: serverTimestamp(), updatedAt: serverTimestamp(), isPremium: snap.data()?.isPremium || false }; if (!snap.exists()) await setDoc(ref, { ...baseData, createdAt: serverTimestamp(), fcmTokens: [] }); else await updateDoc(ref, baseData); const fresh = await getDoc(ref); const d = fresh.data() || {}; return { uid: user.uid, phoneNumber: user.phoneNumber || d.phone || "", displayName: d.username || "Без имени", photoURL: d.avatar || "👤", isPremium: d.isPremium || false }; }
  async function loadProfile(uid) { const snap = await getDoc(doc(db, "users", uid)); if (!snap.exists()) return null; const d = snap.data(); return { uid, phoneNumber: d.phone || "", displayName: d.username || "Без имени", photoURL: d.avatar || "👤", online: d.online || false, lastSeen: d.lastSeen, isPremium: d.isPremium || false }; }

  function startHeartbeat() { if (state.heartbeatInterval) clearInterval(state.heartbeatInterval); if (!state.user) return; const updateOnline = () => updateDoc(doc(db, "users", state.user.uid), { online: true, lastSeen: serverTimestamp() }).catch(()=>{}); updateOnline(); state.heartbeatInterval = setInterval(updateOnline, 30000); }
  function stopHeartbeat() { if (state.heartbeatInterval) { clearInterval(state.heartbeatInterval); state.heartbeatInterval = null; } if (state.user) updateDoc(doc(db, "users", state.user.uid), { online: false, lastSeen: serverTimestamp() }).catch(()=>{}); }
  window.addEventListener('beforeunload', () => { if (state.user) updateDoc(doc(db, "users", state.user.uid), { online: false, lastSeen: serverTimestamp() }); });

  function showLogin() {
    stopHeartbeat();
    root.innerHTML = `
      <div class="glass" style="max-width:480px; margin:60px auto; padding:32px;">
        <h2 style="color:var(--text-primary); text-align:center; font-weight:800; letter-spacing:2px; text-shadow:0 0 12px var(--accent-glow);">NEON</h2>
        <input id="phone" class="neon-input" placeholder="+7 999 123-45-67" style="margin-top:20px;">
        <input id="name" class="neon-input" placeholder="Ваше имя" style="margin-top:12px;">
        <input id="avatar" class="neon-input" placeholder="Аватар-эмодзи (👾)" style="margin-top:12px;">
        <div id="recaptcha-container"></div>
        <button id="loginBtn" class="neon-btn" style="width:100%; margin-top:16px;">Войти</button>
        <div style="margin-top:16px; font-size:12px; color:var(--text-secondary); text-align:center;">Вход через SMS</div>
      </div>`;
    document.getElementById("loginBtn").onclick = async () => {
      const btn = document.getElementById("loginBtn"), phone = document.getElementById("phone").value.trim(), name = document.getElementById("name").value.trim(), avatar = document.getElementById("avatar").value.trim();
      if (!phone || !name) { alert("Введите номер и имя"); return; }
      btn.disabled = true; btn.textContent = "...";
      try {
        const user = await loginWithPhone(phone, "recaptcha-container");
        const profile = await ensureProfile(user, name, avatar || "👤");
        state.user = { uid: profile.uid, phoneNumber: profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL, isPremium: profile.isPremium };
        state.profile = profile;
        startHeartbeat();
        renderApp();
        if (!state.isIOS) { const token = await requestNotificationPermissionAndGetToken(); if (token) await saveFCMTokenToFirestore(state.user.uid, token); }
      } catch (err) { alert("Ошибка: " + (err?.message || "неизвестная")); showLogin(); }
      finally { const cur = document.getElementById("loginBtn"); if (cur) { cur.disabled = false; cur.textContent = "Войти"; } }
    };
  }

  // Кэш пользователей
  async function loadAllUsers() {
    const now = Date.now();
    if (state.cachedUsers.data && (now - state.cachedUsers.lastFetch) < USER_CACHE_TTL) return state.cachedUsers.data;
    const snap = await getDocs(collection(db, "users"));
    const users = [];
    snap.forEach(doc => {
      if (doc.id !== state.user?.uid) {
        const data = doc.data();
        users.push({ uid: doc.id, username: data.username || "Без имени", avatar: data.avatar || "👤", isPremium: data.isPremium || false });
      }
    });
    state.cachedUsers = { data: users, lastFetch: now };
    return users;
  }

  function invalidateUserCache() { state.cachedUsers = { data: null, lastFetch: 0 }; }

  async function loadMoreChats() {
    if (state.loadingMoreChats || state.allChatsLoaded) return;
    state.loadingMoreChats = true;
    try {
      let q = query(collection(db, "chats"), where("members", "array-contains", state.user.uid), orderBy("updatedAt", "desc"), limit(CHATS_PAGE_SIZE));
      if (state.chatsCursor) q = query(q, startAfter(state.chatsCursor));
      const snap = await getDocs(q);
      if (snap.docs.length < CHATS_PAGE_SIZE) state.allChatsLoaded = true;
      const newChats = await Promise.all(snap.docs.map(async d => {
        const data = d.data();
        if (data.type === "direct" || !data.type) {
          let title = data.title || "Чат", av = data.avatar || "👤", otherUid = null;
          const other = (data.members || []).find(m => m !== state.user.uid);
          if (other) {
            otherUid = other;
            if (!data.title || data.title === "Чат" || !data.avatar || data.avatar === "👤") {
              const cached = state.cachedUsers.data?.find(u => u.uid === otherUid);
              if (cached) { title = cached.username; av = cached.avatar; }
              else {
                const p = await loadProfile(otherUid);
                if (p) { title = p.displayName; av = p.photoURL; if (!state.cachedUsers.data) state.cachedUsers.data = []; state.cachedUsers.data.push({ uid: p.uid, username: p.displayName, avatar: p.photoURL, isPremium: p.isPremium }); }
              }
            }
          }
          return { id: d.id, ...data, title, avatar: av, otherUid };
        } else {
          return { id: d.id, ...data, title: data.title || "Чат", avatar: data.avatar || "👥" };
        }
      }));
      state.chats = [...state.chats, ...newChats];
      if (snap.docs.length) state.chatsCursor = snap.docs[snap.docs.length - 1];
    } catch(e) {}
    state.loadingMoreChats = false;
    renderChatsList();
  }

  async function refreshChatsFromScratch() {
    state.chats = [];
    state.chatsCursor = null;
    state.allChatsLoaded = false;
    await loadMoreChats();
  }

  async function loadWallPosts() {
    const snap = await getDocs(collection(db, "wall"));
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));
  }

  function setupWallListener() {
    if (!state.user || state.wallUnsub) return;
    const q = collection(db, "wall");
    state.wallUnsub = onSnapshot(q, snapshot => {
      state.wallPosts = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));
      if (state.page === 'wall') renderWall();
    }, err => { state.wallPosts = []; if (state.page === 'wall') renderWall(); });
  }

  async function loadComments(postId) {
    const q = query(collection(db, "wall_comments"), where("postId", "==", postId));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.createdAt?.toMillis()||0) - (b.createdAt?.toMillis()||0));
  }

  async function openChat(chat) {
    if (state.chatUnsub) { state.chatUnsub(); state.typingUnsub?.(); state.presenceUnsub?.(); }
    state.activeChat = chat;
    state.renderedMessages.clear();
    const title = chat.title || "Чат", av = chat.avatar || "👤";
    const pageChat = document.getElementById("page-chat");
    pageChat.innerHTML = `
      <div class="chat-container">
        <div class="chat-header">
          <button id="backToChatsBtn" class="back-btn">‹</button>
          <div class="avatar" style="width:40px;height:40px;font-size:20px;">${escapeHtml(av)}</div>
          <div class="header-info">
            <div class="header-title">${escapeHtml(title)}</div>
            <div id="userStatus" class="header-status"></div>
          </div>
          <button id="deleteChatBtn" class="delete-btn">🗑</button>
        </div>
        <div class="chat-messages" id="chatMessagesArea"></div>
        <div id="typingIndicator" class="typing-indicator" style="display:none;"><span>печатает</span><span class="typing-dots"><span></span><span></span><span></span></span></div>
        <div class="chat-input-area">
          <button id="voiceRecordBtn" class="voice-btn">🎤</button>
          <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off" />
          <button id="sendMsgBtn" class="send-btn">➤</button>
        </div>
        <div id="recordingIndicator" class="recording-indicator" style="display:none;">Запись...</div>
      </div>`;
    switchPage('chat');

    const messagesRef = collection(db, "chats", chat.id, "messages");
    const messagesQuery = query(messagesRef, orderBy("createdAt", "asc"));
    state.chatUnsub = onSnapshot(messagesQuery, snap => {
      const container = document.getElementById("chatMessagesArea");
      if (!container) return;
      const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 120;

      snap.docChanges().forEach(change => {
        if (change.type === 'added' && !state.renderedMessages.has(change.doc.id)) {
          state.renderedMessages.add(change.doc.id);
          const msg = change.doc.data(); const isOut = msg.userId === state.user.uid;
          const time = msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) : "";
          const div = document.createElement("div"); div.className = `message ${isOut ? "out" : "in"}`;
          div.setAttribute('data-id', change.doc.id);
          if (msg.type === 'audio') {
            div.innerHTML = `<div style="display:flex;align-items:center;gap:8px;"><audio controls src="${escapeHtml(msg.audioURL)}"></audio><span style="font-size:12px;">${msg.duration ? Math.round(msg.duration)+'с' : ''}</span></div><div style="font-size:10px;opacity:0.6;margin-top:2px;">${time} ${msg.edited?'(ред.)':''}</div>`;
          } else {
            div.innerHTML = `<div>${escapeHtml(msg.text||"")}</div><div style="font-size:10px;opacity:0.6;margin-top:2px;text-align:right;">${time} ${msg.edited?'(ред.)':''}</div>`;
            if (isOut) {
              const editBtn = document.createElement('button'); editBtn.className = 'edit-btn'; editBtn.innerHTML = '✎';
              editBtn.onclick = (e) => { e.stopPropagation(); editMessage(change.doc.id, msg.text || ''); };
              div.appendChild(editBtn);
            }
          }
          container.appendChild(div);
        }
        if (change.type === 'modified') {
          const existing = document.querySelector(`[data-id="${change.doc.id}"]`);
          if (existing) {
            const msg = change.doc.data(); const isOut = msg.userId === state.user.uid;
            const time = msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) : "";
            existing.className = `message ${isOut ? "out" : "in"}`;
            if (msg.type === 'audio') {
              existing.innerHTML = `<div style="display:flex;align-items:center;gap:8px;"><audio controls src="${escapeHtml(msg.audioURL)}"></audio><span style="font-size:12px;">${msg.duration ? Math.round(msg.duration)+'с' : ''}</span></div><div style="font-size:10px;opacity:0.6;margin-top:2px;">${time} ${msg.edited?'(ред.)':''}</div>`;
            } else {
              existing.innerHTML = `<div>${escapeHtml(msg.text||"")}</div><div style="font-size:10px;opacity:0.6;margin-top:2px;text-align:right;">${time} ${msg.edited?'(ред.)':''}</div>`;
              if (isOut) {
                const editBtn = document.createElement('button'); editBtn.className = 'edit-btn'; editBtn.innerHTML = '✎';
                editBtn.onclick = (e) => { e.stopPropagation(); editMessage(change.doc.id, msg.text || ''); };
                existing.appendChild(editBtn);
              }
            }
          }
        }
      });

      if (isNearBottom) {
        container.scrollTop = container.scrollHeight;
      }
    });

    document.getElementById("backToChatsBtn").onclick = () => {
      if (state.chatUnsub) state.chatUnsub();
      state.typingUnsub?.(); state.presenceUnsub?.();
      state.activeChat = null;
      switchPage('chats');
    };
    document.getElementById("deleteChatBtn").onclick = async () => {
      if (confirm('Удалить чат?')) {
        await deleteDoc(doc(db, "chats", chat.id));
        if (state.chatUnsub) state.chatUnsub();
        state.typingUnsub?.(); state.presenceUnsub?.();
        state.activeChat = null;
        state.chats = state.chats.filter(c => c.id !== chat.id);
        renderChatsList();
        switchPage('chats');
      }
    };

    const sendMsg = async () => {
      const input = document.getElementById("messageInput"); const text = input.value.trim(); if (!text) return;
      await addDoc(messagesRef, { text, userId: state.user.uid, createdAt: serverTimestamp() });
      await updateDoc(doc(db, "chats", chat.id), { lastMessage: text, lastMessageUserId: state.user.uid, updatedAt: serverTimestamp() });
      input.value = "";
    };
    document.getElementById("sendMsgBtn").onclick = sendMsg;
    document.getElementById("messageInput").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); sendMsg(); } });
    const typingRef = collection(db, "chats", chat.id, "typing");
    state.typingUnsub = onSnapshot(typingRef, (snap) => {
      const now = Date.now(); let someone = false;
      snap.forEach(d => { const data = d.data(); if (data.timestamp && now - data.timestamp.toMillis() < 5000 && d.id !== state.user.uid) someone = true; });
      document.getElementById("typingIndicator").style.display = someone ? 'flex' : 'none';
    });
    document.getElementById("messageInput").addEventListener('input', () => { clearTimeout(state.typingTimers[chat.id]); state.typingTimers[chat.id] = setTimeout(() => setDoc(doc(db, "chats", chat.id, "typing", state.user.uid), { timestamp: serverTimestamp() }), 300); });
    document.getElementById("voiceRecordBtn").onclick = () => toggleVoiceRecording(chat.id);

    if (chat.otherUid) {
      state.presenceUnsub = onSnapshot(doc(db, "users", chat.otherUid), (docSnap) => {
        const data = docSnap.data(); const statusDiv = document.getElementById("userStatus");
        if (data && statusDiv) {
          const online = data.online || false; const lastSeen = data.lastSeen?.toMillis();
          let text = ''; if (online && lastSeen && Date.now() - lastSeen < 60000) text = 'в сети'; else if (lastSeen) { const diff = Math.floor((Date.now() - lastSeen)/1000); text = diff < 60 ? 'был(а) только что' : diff < 3600 ? `был(а) ${Math.floor(diff/60)} мин назад` : `был(а) ${Math.floor(diff/3600)} ч назад`; }
          statusDiv.textContent = text;
        }
      });
    }
  }

    const container = document.getElementById("search-results-container");
    if (!users.length) { container.innerHTML = `<div style="color:var(--text-secondary); text-align:center; padding:20px;">Пользователи не найдены</div>`; return; }
    container.innerHTML = users.map(u => `<div class="search-user-item" data-uid="${u.uid}"><div class="avatar" style="width:40px;height:40px;font-size:22px;">${escapeHtml(u.avatar)}</div><div style="flex:1;font-weight:600;">${escapeHtml(u.username)}</div>${u.isPremium?'<span style="color:var(--premium);">💎</span>':''}</div>`).join("");
    container.querySelectorAll(".search-user-item").forEach(item => item.onclick = async () => {
      document.getElementById("search-modal-overlay").classList.add("hidden");
      await createDirectChat(item.dataset.uid);
    });
  }

  async function createDirectChat(otherUid) {
    const chatId = directChatId(state.user.uid, otherUid);
    const chatRef = doc(db, "chats", chatId);
    if (!(await getDoc(chatRef)).exists()) {
      let name = "Чат", av = "👤";
      const cached = state.cachedUsers.data?.find(u => u.uid === otherUid);
      if (cached) { name = cached.username; av = cached.avatar; }
      else { const p = await loadProfile(otherUid); if (p) { name = p.displayName; av = p.photoURL; } }
      await setDoc(chatRef, { type:"direct", members:[state.user.uid, otherUid], title: name, avatar: av, createdAt: serverTimestamp(), updatedAt: serverTimestamp(), lastMessage: "" });
    }
    await refreshChatsFromScratch();
    const chat = state.chats.find(c => c.id === chatId);
    if (chat) openChat(chat);
  }

  function boot() {
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        stopHeartbeat(); state.user = null; state.profile = null; state.chats = []; state.wallPosts = [];
        if (state.chatUnsub) state.chatUnsub(); if (state.wallUnsub) state.wallUnsub();
        showLogin(); return;
      }
      let profile = await loadProfile(user.uid);
      if (!profile) profile = await ensureProfile(user, user.displayName || "Без имени", user.photoURL || "👤");
      state.user = { uid: user.uid, phoneNumber: user.phoneNumber || profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL, isPremium: profile.isPremium };
      state.profile = profile;
      startHeartbeat();
      loadAllUsers().catch(() => {});
      initPages();
      switchPage('chats');
      if (!state.isIOS) { const token = await requestNotificationPermissionAndGetToken(); if (token) await saveFCMTokenToFirestore(state.user.uid, token); }
    });
  }

  function startPolling() {}
  function stopPolling() {}
  async function requestNotificationPermissionAndGetToken() {}
  async function saveFCMTokenToFirestore(uid, token) {}
  if (messaging) onMessage(messaging, payload => {});
  boot();
</script>
