<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0e1117" />
    <!-- favicon-заглушка, чтобы убрать ошибку 404 -->
    <link rel="icon" href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAA////AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" type="image/x-icon" />
    <title>NEON MESSENGER | чаты + стена</title>
    <style>
        /* ... ВСЕ CSS‑ТЕМЫ И СТИЛИ БЕЗ ИЗМЕНЕНИЙ ... */
        /* (приводить их здесь не буду, они точно из предыдущего ответа) */

        /* ОТЛАДОЧНАЯ ПЛАШКА */
        .debug-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
            background: #222; color: #0f0; font-family: monospace; padding: 4px 8px;
            text-align: center; font-size: 12px; opacity: 0.9;
        }
        .debug-bar.error { color: #f00; background: #400; }
    </style>
</head>
<body>
    <!-- ОТЛАДОЧНАЯ ПЛАШКА -->
    <div id="debugBar" class="debug-bar">Загрузка скрипта…</div>

    <div id="splash" class="splash-screen">
        <div class="neon-logo">NEON</div>
        <div class="subtitle">MESSENGER</div>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <div id="root"></div>

    <script type="module">
        // Глобальный перехватчик ошибок — покажет в плашке
        window.onerror = function(message, source, lineno, colno, error) {
            const bar = document.getElementById('debugBar');
            if (bar) {
                bar.className = 'debug-bar error';
                bar.textContent = 'ОШИБКА: ' + message + ' (строка ' + lineno + ')';
            }
        };

        const debug = (msg) => {
            console.log('[NEON DEBUG]', msg);
            const bar = document.getElementById('debugBar');
            if (bar) bar.textContent = msg;
        };

        debug('Начало загрузки модулей');

        try {
            // ========== ИМПОРТЫ ==========
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js");
            const { getAuth, onAuthStateChanged, signOut, RecaptchaVerifier, signInWithPhoneNumber } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js");
            const { initializeFirestore, enableIndexedDbPersistence, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, increment, arrayUnion, arrayRemove, writeBatch } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
            const { getMessaging, getToken, onMessage } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js");
            const { getStorage, ref, uploadBytesResumable, getDownloadURL } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js");

            debug('Модули загружены');

            // ========== KОНФИГУРАЦИЯ FIREBASE ==========
            const firebaseConfig = {
                apiKey: "AIzaSyA9gA_Nvei89csa7_YrmbnbnxFngb0UKoM",
                authDomain: "neon-messenger-83ed4.firebaseapp.com",
                projectId: "neon-messenger-83ed4",
                storageBucket: "neon-messenger-83ed4.firebasestorage.app",
                messagingSenderId: "954172505610",
                appId: "1:954172505610:web:03f56a8a5b89f2d402a9f3"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = initializeFirestore(app, {
                experimentalForceLongPolling: true,
                useFetchStreams: false
            }, 'neonmess');

            // Офлайн-кеш (подавляем ошибку, если IndexedDB недоступна)
            enableIndexedDbPersistence(db).catch(e => {
                console.warn("Persistence:", e.code);
                debug('Persistence: ' + e.code);
            });

            const storage = getStorage(app);
            let messaging = null;
            try {
                messaging = getMessaging(app);
            } catch (e) {
                console.warn("Messaging not supported");
                debug('Messaging не поддерживается');
            }
            auth.languageCode = "ru";

            debug('Firebase инициализирован');

            // ========== СОСТОЯНИЕ (ИЗНАЧАЛЬНО БЕЗ ИЗМЕНЕНИЙ) ==========
            // ... (здесь идёт весь блок const authState, chatState, voiceState, uiState, cacheState и т.д.)
            // ВСЕ ПЕРЕМЕННЫЕ И ФУНКЦИИ ДОЛЖНЫ БЫТЬ КАК В ПРЕДЫДУЩЕМ ПОЛНОМ КОДЕ

    const authState = {
        user: null,
        profile: null,
        fcmToken: null,
        captcha: null,
    };

    const chatState = {
        chats: [],
        activeChat: null,
        chatUnsub: null,
        globalChatsUnsub: null,
        wallPosts: [],
        wallUnsub: null,
    };

    const voiceState = {
        mediaRecorder: null,
        mediaStream: null,
        audioChunks: [],
        recordingChatId: null,
        cleanup() {
            if (this.mediaStream) {
                this.mediaStream.getTracks().forEach(t => t.stop());
                this.mediaStream = null;
            }
            if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                this.mediaRecorder.stop();
                this.mediaRecorder = null;
            }
            this.audioChunks = [];
            this.recordingChatId = null;
        }
    };

    const uiState = {
        page: "chats",
        currentTheme: 'neon-cyan',
        chatsAnimated: false,
        splashHidden: false,
        isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent),
        isAndroid: /Android/.test(navigator.userAgent),
    };

    const cacheState = {
        usersCache: new Map(),
        allUsers: null,
    };

    const likingPosts = new Set();
    let postingInProgress = false;

    const root = document.getElementById("root");
    const splash = document.getElementById("splash");

    const THEMES = ['neon-cyan','golden','emerald','purple','frost','inferno','dark','subtle-gold'];
    const THEME_LABELS = {
        'neon-cyan': '🔮 Неон', 'golden': '👑 Золото', 'emerald': '🍀 Изумруд',
        'purple': '🌆 Пурпур', 'frost': '❄️ Лёд', 'inferno': '🔥 Огонь',
        'dark': '🌑 Тёмная', 'subtle-gold': '🏅 Серая с золотом'
    };

    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
    const directChatId = (uid1, uid2) => [uid1, uid2].sort().join("__");

    function setViewportHeight() {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    window.addEventListener('resize', setViewportHeight);
    window.addEventListener('orientationchange', setViewportHeight);
    setViewportHeight();

    // ========== Темы ==========
    function loadTheme() {
        const saved = localStorage.getItem('neon-messenger-theme');
        if (saved && THEMES.includes(saved)) uiState.currentTheme = saved;
        else uiState.currentTheme = 'neon-cyan';
        applyTheme(uiState.currentTheme);
    }
    function applyTheme(themeName) {
        uiState.currentTheme = themeName;
        document.documentElement.setAttribute('data-theme', themeName);
        localStorage.setItem('neon-messenger-theme', themeName);
        const metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) {
            const themeColors = {
                'neon-cyan': '#0a0f1f','golden': '#1a1008','emerald': '#051510',
                'purple': '#120518','frost': '#0a1018','inferno': '#180a06',
                'dark': '#0a0a0c','subtle-gold': '#1c1c1e'
            };
            metaTheme.setAttribute('content', themeColors[themeName] || '#0a0f1f');
        }
        document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active-theme', d.dataset.theme === themeName));
    }
    function renderThemeSwitcher() {
        const current = uiState.currentTheme;
        return `<div style="margin-top:8px;">
          <p style="color:var(--text-secondary); font-size:13px; margin-bottom:10px;">🎨 Выберите тему:</p>
          <div class="theme-switcher">
            ${THEMES.map(t => `<div class="theme-dot ${t} ${t === current ? 'active-theme' : ''}" data-theme="${t}" title="${THEME_LABELS[t] || t}" style="cursor:pointer;"></div>`).join('')}
          </div>
          <p style="color:var(--text-secondary); font-size:11px; text-align:center; margin-top:6px;">${THEME_LABELS[current] || current}</p>
        </div>`;
    }
    function bindThemeSwitcherEvents() {
        document.querySelectorAll('.theme-dot').forEach(dot => {
            dot.onclick = () => {
                const theme = dot.dataset.theme;
                if (theme && THEMES.includes(theme)) {
                    applyTheme(theme);
                    if (uiState.page === 'profile') renderProfilePage();
                }
            };
        });
    }

    // ========== Кеш пользователей ==========
    async function getUserData(uid) {
        if (cacheState.usersCache.has(uid)) return cacheState.usersCache.get(uid);
        const snap = await getDoc(doc(db, "users", uid));
        if (!snap.exists()) return null;
        const d = snap.data();
        const user = {
            uid,
            username: d.username || "Без имени",
            avatar: d.avatar || "👤",
            phone: d.phone || ""
        };
        cacheState.usersCache.set(uid, user);
        return user;
    }

    async function preloadAllUsers() {
        const snap = await getDocs(collection(db, "users"));
        cacheState.allUsers = [];
        snap.forEach(docSnap => {
            const d = docSnap.data();
            const user = {
                uid: docSnap.id,
                username: d.username || "Пользователь",
                avatar: d.avatar || "👤",
                phone: d.phone || ""
            };
            cacheState.usersCache.set(user.uid, user);
            if (user.uid !== authState.user?.uid) cacheState.allUsers.push(user);
        });
    }

    // ========== Профиль ==========
    async function ensureProfile(user, username, avatar) {
        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);
        const baseData = {
            phone: user.phoneNumber || "",
            username: username || snap.data()?.username || "Без имени",
            avatar: avatar || snap.data()?.avatar || "👤",
            updatedAt: serverTimestamp()
        };
        if (!snap.exists()) await setDoc(ref, { ...baseData, createdAt: serverTimestamp(), fcmTokens: [] });
        else await updateDoc(ref, baseData);
        const fresh = await getDoc(ref);
        const d = fresh.data() || {};
        const profile = { uid: user.uid, phoneNumber: user.phoneNumber || d.phone || "", displayName: d.username || "Без имени", photoURL: d.avatar || "👤" };
        cacheState.usersCache.set(user.uid, {
            uid: user.uid,
            username: profile.displayName,
            avatar: profile.photoURL,
            phone: profile.phoneNumber
        });
        await updateProfileInChats(user.uid, profile.displayName, profile.photoURL);
        return profile;
    }

    async function updateProfileInChats(uid, username, avatar) {
        try {
            const chatsSnap = await getDocs(query(collection(db, "chats"), where("members", "array-contains", uid)));
            if (chatsSnap.empty) return;
            const docs = chatsSnap.docs;
            for (let i = 0; i < docs.length; i += 500) {
                const batch = writeBatch(db);
                docs.slice(i, i + 500).forEach(docSnap => {
                    batch.update(docSnap.ref, {
                        [`memberUsernames.${uid}`]: username,
                        [`memberAvatars.${uid}`]: avatar
                    });
                });
                await batch.commit();
            }
        } catch (e) {
            console.warn("updateProfileInChats error", e);
        }
    }

    // ========== Авторизация ==========
    function hideSplash() {
        if (!uiState.splashHidden && splash) {
            uiState.splashHidden = true;
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 500);
        }
    }

    function resetCaptcha() {
        try { if (authState.captcha) authState.captcha.clear(); } catch {}
        authState.captcha = null;
        const c = document.getElementById("recaptcha-container");
        if (c) c.innerHTML = "";
    }

    async function createCaptcha(containerId) {
        resetCaptcha();
        authState.captcha = new RecaptchaVerifier(auth, containerId, { size: "normal", callback: () => console.log("reCAPTCHA solved"), "expired-callback": () => resetCaptcha() });
        await authState.captcha.render();
        return authState.captcha;
    }

    async function loginWithPhone(phone, containerId) {
        const verifier = await createCaptcha(containerId);
        const confirmation = await signInWithPhoneNumber(auth, phone, verifier);
        const code = prompt("Введите код из SMS:");
        if (!code) throw new Error("Код не введён");
        const result = await confirmation.confirm(code);
        resetCaptcha();
        return result.user;
    }

    function showLogin(errorMessage = null) {
        hideSplash();
        root.innerHTML = `
        <div class="glass" style="max-width:520px; margin:56px auto; padding:30px;">
          <h2 style="color:var(--accent); text-align:center;">🔮 NEON LOGIN</h2>
          ${errorMessage ? `<div style="color:#ff6666; background:rgba(255,0,0,0.1); padding:8px; border-radius:12px; margin:10px 0;">${errorMessage}</div>` : ''}
          <input id="phone" class="neon-input" placeholder="Номер телефона (+79991234567)" style="margin-top:16px;">
          <input id="name" class="neon-input" placeholder="Ваше имя" style="margin-top:10px;">
          <input id="avatar" class="neon-input" placeholder="Аватар-эмодзи (например 👾)" style="margin-top:10px;">
          <div id="recaptcha-container"></div>
          <button id="loginBtn" class="neon-btn" style="width:100%; margin-top:10px;">Войти / Регистрация</button>
          <div style="margin-top:12px; font-size:12px; color:var(--text-secondary);">Для Phone Auth должен быть включён номерной вход.</div>
          ${renderThemeSwitcher()}
        </div>`;
        bindThemeSwitcherEvents();
        document.getElementById("loginBtn").onclick = async () => {
            const btn = document.getElementById("loginBtn");
            const phone = document.getElementById("phone").value.trim();
            const name = document.getElementById("name").value.trim();
            const avatar = document.getElementById("avatar").value.trim();
            if (!phone || !name) { showLogin("Введите номер и имя"); return; }
            btn.disabled = true; btn.textContent = "...";
            try {
                const user = await loginWithPhone(phone, "recaptcha-container");
                const profile = await ensureProfile(user, name, avatar || "👤");
                authState.user = { uid: profile.uid, phoneNumber: profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL };
                authState.profile = profile;
                switchToChatsPage(); // <-- исправлено: теперь есть функция
                if (!uiState.isIOS) {
                    const token = await requestNotificationPermissionAndGetToken();
                    if (token) await saveFCMTokenToFirestore(authState.user.uid, token);
                }
            } catch (err) {
                showLogin("Ошибка входа: " + (err?.message || "неизвестная ошибка"));
            } finally {
                const cur = document.getElementById("loginBtn");
                if (cur) { cur.disabled = false; cur.textContent = "Войти / Регистрация"; }
            }
        };
    }

    // ========== Поиск и создание чатов ==========
    let searchTimeout;
    function openUserSearch() {
        if (!cacheState.allUsers) {
            preloadAllUsers().then(renderSearchModal);
        } else {
            renderSearchModal();
        }
    }

    function renderSearchModal() {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.id = 'userSearchOverlay';
        overlay.innerHTML = `
          <div class="modal-content" style="max-width:420px; width:100%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
              <h3 style="color:var(--text-heading);">🔍 Поиск пользователя</h3>
              <button id="closeSearchBtn" style="background:none; border:none; font-size:24px; color:var(--accent); cursor:pointer;">✕</button>
            </div>
            <input id="searchInput" class="neon-input" placeholder="Имя или номер..." style="margin-bottom:16px;" autofocus>
            <div id="searchResults" style="max-height:50vh; overflow-y:auto;"></div>
          </div>
        `;
        document.body.appendChild(overlay);
        document.body.classList.add('no-scroll');

        const closeBtn = document.getElementById('closeSearchBtn');
        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('searchResults');

        const filterAndRender = () => {
            const q = searchInput.value.trim().toLowerCase();
            const filtered = cacheState.allUsers.filter(u =>
                u.username.toLowerCase().includes(q) || u.phone.includes(q)
            );
            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<div style="color:var(--text-secondary); text-align:center;">Никого не найдено</div>';
                return;
            }
            resultsDiv.innerHTML = filtered.map(u => `
              <div class="chat-item" data-uid="${u.uid}" style="display:flex; align-items:center; gap:12px; padding:12px; border-bottom:1px solid var(--chat-item-border); cursor:pointer;">
                <div class="avatar" style="width:44px; height:44px; font-size:24px;">${escapeHtml(u.avatar)}</div>
                <div style="flex:1; min-width:0;">
                  <div style="font-weight:700; color:var(--text-heading);">${escapeHtml(u.username)}</div>
                  <div style="font-size:13px; color:var(--text-secondary);">${escapeHtml(u.phone || '')}</div>
                </div>
                <button class="neon-btn" style="padding:8px 16px;">Написать</button>
              </div>
            `).join('');
            resultsDiv.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', async () => {
                    const uid = el.dataset.uid;
                    await startDirectChat(uid);
                    closeModal();
                });
            });
        };

        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterAndRender, 300);
        });
        filterAndRender();

        function closeModal() {
            document.body.removeChild(overlay);
            document.body.classList.remove('no-scroll');
        }
        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
    }

    async function startDirectChat(otherUid) {
        const chatId = directChatId(authState.user.uid, otherUid);
        const chatRef = doc(db, "chats", chatId);
        const chatSnap = await getDoc(chatRef);
        let chatData;
        if (!chatSnap.exists()) {
            const me = cacheState.usersCache.get(authState.user.uid) || {
                username: authState.profile?.displayName || "Без имени",
                avatar: authState.profile?.photoURL || "👤"
            };
            const other = cacheState.usersCache.get(otherUid) || await getUserData(otherUid);
            const newChat = {
                type: "direct",
                members: [authState.user.uid, otherUid],
                memberUsernames: {
                    [authState.user.uid]: me.username,
                    [otherUid]: other.username
                },
                memberAvatars: {
                    [authState.user.uid]: me.avatar,
                    [otherUid]: other.avatar
                },
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
                lastMessage: ""
            };
            await setDoc(chatRef, newChat);
            chatData = { id: chatId, ...newChat, title: other.username, avatar: other.avatar };
        } else {
            const data = chatSnap.data();
            const otherUidFromData = (data.members || []).find(m => m !== authState.user.uid);
            let title = data.title || "Чат";
            let avatar = "👤";
            if (data.type === "direct" && otherUidFromData) {
                if (data.memberUsernames && data.memberAvatars) {
                    title = data.memberUsernames[otherUidFromData] || "Пользователь";
                    avatar = data.memberAvatars[otherUidFromData] || "👤";
                } else {
                    const cachedUser = cacheState.usersCache.get(otherUidFromData);
                    if (cachedUser) {
                        title = cachedUser.username;
                        avatar = cachedUser.avatar;
                    }
                }
            }
            chatData = { id: chatId, ...data, title, avatar };
        }

        openChat(chatData);
        refreshChats();
    }

    // ========== Загрузка данных ==========
    async function loadChats() {
        if (!authState.user) return [];
        const q = query(collection(db, "chats"), where("members", "array-contains", authState.user.uid));
        const snap = await getDocs(q);
        const chats = [];
        snap.forEach(docSnap => {
            const data = docSnap.data();
            let title = data.title || "Чат";
            let avatar = "👤";
            if (data.type === "direct") {
                const otherUid = (data.members || []).find(m => m !== authState.user.uid);
                if (otherUid) {
                    if (data.memberUsernames && data.memberAvatars) {
                        title = data.memberUsernames[otherUid] || "Пользователь";
                        avatar = data.memberAvatars[otherUid] || "👤";
                    } else {
                        const cachedUser = cacheState.usersCache.get(otherUid);
                        if (cachedUser) {
                            title = cachedUser.username;
                            avatar = cachedUser.avatar;
                        }
                    }
                }
            }
            chats.push({ id: docSnap.id, ...data, title, avatar });
        });
        chats.sort((a, b) => (b.updatedAt?.toMillis() || 0) - (a.updatedAt?.toMillis() || 0));
        return chats;
    }

    async function refreshChats() {
        chatState.chats = await loadChats();
        renderChatsList(chatState.chats, !uiState.chatsAnimated);
        if (!uiState.chatsAnimated) uiState.chatsAnimated = true;
    }

    async function loadWallPosts() {
        const snap = await getDocs(query(collection(db, "wall"), orderBy("createdAt", "desc")));
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    function setupWallListener() {
        if (!authState.user) return;
        if (chatState.wallUnsub) {
            chatState.wallUnsub();
            chatState.wallUnsub = null;
        }
        const q = query(collection(db, "wall"), orderBy("createdAt", "desc"));
        chatState.wallUnsub = onSnapshot(q, snap => {
            chatState.wallPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (uiState.page === 'wall') renderWallPostsList(chatState.wallPosts);
        });
    }

    function setupGlobalMessageListener() {
        if (!authState.user) return;
        if (chatState.globalChatsUnsub) {
            chatState.globalChatsUnsub();
            chatState.globalChatsUnsub = null;
        }
        const q = query(collection(db, "chats"), where("members", "array-contains", authState.user.uid));
        chatState.globalChatsUnsub = onSnapshot(q, async snap => {
            snap.docChanges().forEach(async change => {
                if (change.type === "modified") {
                    const chat = change.doc.data();
                    const chatId = change.doc.id;
                    if (chat.lastMessageUserId && chat.lastMessageUserId !== authState.user.uid && chatState.activeChat?.id !== chatId) {
                        if (Notification.permission === 'granted') {
                            const sender = cacheState.usersCache.get(chat.lastMessageUserId) || await getUserData(chat.lastMessageUserId);
                            new Notification(`${sender?.username || 'NEON'} 💬`, { body: chat.lastMessage, icon: '/neon/icon-192x192.png', tag: chatId }).onclick = () => {
                                window.focus();
                                const c = chatState.chats.find(x => x.id === chatId);
                                if (c) openChat(c);
                            };
                        }

    function setupAudioPlayer(audioId) {
        const audio = document.getElementById(audioId);
        const playBtn = document.getElementById(audioId + '_play');
        const fill = document.getElementById(audioId + '_fill');
        const timeLabel = document.getElementById(audioId + '_time');
        if (!audio || !playBtn || !fill || !timeLabel) return;

        const formatTime = (s) => {
            const mins = Math.floor(s / 60);
            const secs = Math.floor(s % 60);
            return mins + ":" + (secs < 10 ? '0' : '') + secs;
        };

        audio.addEventListener('loadedmetadata', () => {
            timeLabel.textContent = formatTime(audio.duration || 0);
        });

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸';
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            fill.style.width = pct + '%';
            timeLabel.textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('ended', () => {
            playBtn.textContent = '▶';
            fill.style.width = '0%';
            timeLabel.textContent = formatTime(audio.duration);
        });

        const progress = document.getElementById(audioId + '_progress');
        progress.addEventListener('click', (e) => {
            const rect = progress.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });
    }

    function createMessageElement(msg, isOut) {
        const time = msg.createdAt?.toDate ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) : "";
        const div = document.createElement("div");
        div.className = `message ${isOut ? "out" : "in"}`;
        if (msg.type === 'audio') {
            const audioId = 'audio_' + Math.random().toString(36).substr(2, 9);
            div.innerHTML = `
              <div class="custom-audio">
                <button class="play-btn" id="${audioId}_play">▶</button>
                <div class="progress-container" id="${audioId}_progress">
                  <div class="progress-fill" id="${audioId}_fill"></div>
                </div>
                <span class="duration-label" id="${audioId}_time">0:00</span>
                <audio id="${audioId}" src="${escapeHtml(msg.audioURL)}" preload="metadata"></audio>
              </div>
              <div style="font-size:10px; opacity:0.7; margin-top:4px;">${time}</div>`;
            setTimeout(() => setupAudioPlayer(audioId), 0);
        } else {
            div.innerHTML = `<div>${escapeHtml(msg.text||"")}</div><div style="font-size:10px; opacity:0.7; margin-top:4px;">${time}</div>`;
        }
        return div;
    }

    async function openChat(chat) {
        if (chatState.chatUnsub) { chatState.chatUnsub(); chatState.chatUnsub = null; }
        chatState.activeChat = chat;
        const title = chat.title || "Чат";
        const av = chat.avatar || "👤";

        const existing = document.getElementById('chatFullscreen');
        if (existing) existing.remove();
        document.body.classList.add('no-scroll');

        const fullscreen = document.createElement('div');
        fullscreen.className = 'chat-fullscreen';
        fullscreen.id = 'chatFullscreen';
        fullscreen.innerHTML = `
          <div class="glass">
            <div class="chat-header">
              <button id="backToChatsBtn" style="background:none;font-size:28px;color:var(--accent);border:none;padding:8px;">←</button>
              <div class="header-user" id="chatHeaderUser">
                <div class="avatar" style="width:42px;height:42px;font-size:22px;">${escapeHtml(av)}</div>
                <div class="header-info">
                  <div class="header-name">${escapeHtml(title)}</div>
                  <div class="header-status" id="chatStatus">онлайн</div>
                </div>
              </div>
              <button class="menu-btn" id="chatMenuBtn">☰</button>
            </div>
            <div class="messages-area" id="chatMessagesArea"></div>
            <div class="input-container">
              <button id="voiceRecordBtn" class="voice-btn">🎤</button>
              <input type="text" id="messageInput" class="message-input" placeholder="Сообщение...">
              <button id="sendMsgBtn" class="send-btn">➤</button>
            </div>
            <div id="recordingIndicator" style="text-align:center;color:var(--voice-recording-bg);margin-top:4px;display:none;">🔴 Запись...</div>
          </div>`;
        document.body.appendChild(fullscreen);

        const otherUid = (chat.members || []).find(uid => uid !== authState.user.uid);
        if (otherUid) {
            getUserData(otherUid).then(user => {
                const statusEl = document.getElementById('chatStatus');
                if (statusEl) statusEl.textContent = 'онлайн';
            });
        }

        const messagesContainer = fullscreen.querySelector('#chatMessagesArea');
        const messageInput = fullscreen.querySelector('#messageInput');
        const sendBtn = fullscreen.querySelector('#sendMsgBtn');
        const voiceBtn = fullscreen.querySelector('#voiceRecordBtn');
        const recordingIndicator = fullscreen.querySelector('#recordingIndicator');
        const backBtn = fullscreen.querySelector('#backToChatsBtn');

        const messagesRef = collection(db, "chats", chat.id, "messages");
        const messagesQuery = query(messagesRef, orderBy("createdAt", "asc"));

        let renderedIds = [];
        const renderAllMessages = (docs) => {
            messagesContainer.innerHTML = "";
            const frag = document.createDocumentFragment();
            docs.forEach(doc => {
                const msg = doc.data();
                frag.appendChild(createMessageElement(msg, msg.userId === authState.user.uid));
            });
            messagesContainer.appendChild(frag);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };

        chatState.chatUnsub = onSnapshot(messagesQuery, snap => {
            const docs = snap.docs;
            if (docs.length === 0) { messagesContainer.innerHTML = ""; renderedIds = []; return; }
            const newIds = docs.map(d => d.id);
            if (renderedIds.length === 0 || docs.length < renderedIds.length) {
                renderAllMessages(docs);
                renderedIds = newIds;
                return;
            }
            let mismatch = false;
            for (let i = 0; i < renderedIds.length; i++) {
                if (i >= docs.length || docs[i].id !== renderedIds[i]) { mismatch = true; break; }
            }
            if (mismatch) { renderAllMessages(docs); renderedIds = newIds; return; }
            if (docs.length > renderedIds.length) {
                const frag = document.createDocumentFragment();
                for (let i = renderedIds.length; i < docs.length; i++) {
                    const msg = docs[i].data();
                    frag.appendChild(createMessageElement(msg, msg.userId === authState.user.uid));
                }
                messagesContainer.appendChild(frag);
                renderedIds = newIds;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        });

        backBtn.onclick = () => {
            if (chatState.chatUnsub) { chatState.chatUnsub(); chatState.chatUnsub = null; }
            chatState.activeChat = null;
            voiceState.cleanup();
            fullscreen.remove();
            document.body.classList.remove('no-scroll');
            uiState.page = "chats";
            switchToChatsPage(); // <-- исправлено
        };

        const sendMessage = async () => {
            const text = messageInput.value.trim();
            if (!text) return;
            await addDoc(messagesRef, { text, userId: authState.user.uid, createdAt: serverTimestamp() });
            await updateDoc(doc(db, "chats", chat.id), { lastMessage: text, lastMessageUserId: authState.user.uid, updatedAt: serverTimestamp() });
            messageInput.value = "";
        };

        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });

        voiceBtn.onclick = () => {
            if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === 'recording') {
                voiceState.mediaRecorder.stop();
                voiceBtn.classList.remove('recording');
                recordingIndicator.style.display = 'none';
            } else {
                startVoiceRecording(chat.id, voiceBtn, recordingIndicator);
            }
        };

        fullscreen.querySelector('#chatMenuBtn').onclick = () => openChatProfile(chat, otherUid);
        fullscreen.querySelector('#chatHeaderUser').onclick = () => openChatProfile(chat, otherUid);
    }

    // ========== Голосовые сообщения ==========
    async function startVoiceRecording(chatId, voiceBtn, indicator) {
        if (!navigator.mediaDevices?.getUserMedia) { alert("Микрофон не доступен"); return; }
        voiceState.cleanup();

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            voiceState.mediaStream = stream;
            voiceState.audioChunks = [];
            voiceState.recordingChatId = chatId;

            let mimeType = 'audio/webm;codecs=opus';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'audio/mp4';
                if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
            }
            const options = mimeType ? { mimeType } : {};
            const recorder = new MediaRecorder(stream, options);
            voiceState.mediaRecorder = recorder;

            recorder.ondataavailable = e => { if (e.data.size > 0) voiceState.audioChunks.push(e.data); };

            recorder.onstop = async () => {
                const chunks = [...voiceState.audioChunks];
                voiceState.cleanup();
                voiceBtn.classList.remove('recording');
                indicator.style.display = 'none';
                if (chunks.length === 0) return;
                const blob = new Blob(chunks, { type: mimeType || 'audio/webm' });
                try {
                    await uploadAudioAndSendMessage(chatId, blob);
                } catch (e) {
                    console.error("uploadAudio failed:", e);
                }
            };
            recorder.start();
            voiceBtn.classList.add('recording');
            indicator.style.display = 'block';
        } catch (err) {
            console.error("mic error", err);
            voiceState.cleanup();
            voiceBtn.classList.remove('recording');
            indicator.style.display = 'none';
            alert("Ошибка микрофона");
        }
    }

    window.addEventListener('pagehide', () => voiceState.cleanup());
    window.addEventListener('beforeunload', () => voiceState.cleanup());

    async function uploadAudioAndSendMessage(chatId, blob) {
        const sendBtn = document.querySelector('#chatFullscreen #sendMsgBtn');
        if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = "⏳"; }
        const messagesRef = collection(db, "chats", chatId, "messages");
        const newMsgRef = doc(messagesRef);
        const filePath = `chats/${chatId}/audio/${newMsgRef.id}.webm`;
        const storageRef = ref(storage, filePath);
        try {
            const uploadTask = uploadBytesResumable(storageRef, blob);
            await new Promise((resolve, reject) => { uploadTask.on('state_changed', null, reject, resolve); });
            const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
            const audioEl = document.createElement('audio'); audioEl.src = downloadURL;
            let duration = 0;
            await new Promise((resolve) => { audioEl.addEventListener('loadedmetadata', () => { duration = audioEl.duration; resolve(); }); audioEl.load(); });
            await setDoc(newMsgRef, { type: 'audio', audioURL: downloadURL, duration, userId: authState.user.uid, createdAt: serverTimestamp() });
            await updateDoc(doc(db, "chats", chatId), { lastMessage: "🎤 Голосовое сообщение", lastMessageUserId: authState.user.uid, updatedAt: serverTimestamp() });
        } catch (error) {
            console.error("audio upload error", error);
            alert("Не удалось отправить голосовое.");
        }
        finally { if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = "➤"; } }
    }

    // ========== Уведомления ==========
    async function requestNotificationPermissionAndGetToken() {
        if (!messaging) { alert("Браузер не поддерживает уведомления"); return null; }
        try {
            const swPath = '/neon/firebase-messaging-sw.js';
            const reg = await navigator.serviceWorker.register(swPath);
            await navigator.serviceWorker.ready;
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await getToken(messaging, { vapidKey: 'BDRTV4EZNNWVT9_dRipTDFG_JHwJa53Ne82UgG5g6XdgLWufZumogCNM8EQK_T-Qg9fZDeCEq7_R6DchHcfWXZQ', serviceWorkerRegistration: reg });
                if (token) { authState.fcmToken = token; return token; }
            }
        } catch (error) { console.error("Token error:", error); }
        return null;
    }

    async function saveFCMTokenToFirestore(uid, token) {
        if (!uid || !token) return;
        await updateDoc(doc(db, "users", uid), { fcmTokens: arrayUnion(token) }).catch(()=>{});
    }

    if (messaging) {
        onMessage(messaging, payload => {
            if (payload.notification) new Notification(payload.notification.title, { body: payload.notification.body, icon: '/neon/icon-192x192.png' });
        });
    }

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && authState.user) {
            if (uiState.page === 'chats') {
                if (!chatState.globalChatsUnsub) setupGlobalMessageListener();
                refreshChats();
            }
            if (uiState.page === 'wall') {
                if (!chatState.wallUnsub) setupWallListener();
            }
        }
    });

    // ========== Запуск ==========
    function boot() {
        loadTheme();
        onAuthStateChanged(auth, async (user) => {
            if (!uiState.splashHidden) {
                setTimeout(hideSplash, 1500);
            }
            if (!user) {
                if (chatState.chatUnsub) { chatState.chatUnsub(); chatState.chatUnsub = null; }
                if (chatState.globalChatsUnsub) { chatState.globalChatsUnsub(); chatState.globalChatsUnsub = null; }
                if (chatState.wallUnsub) { chatState.wallUnsub(); chatState.wallUnsub = null; }
                authState.user = null; authState.profile = null;
                chatState.chats = []; chatState.wallPosts = [];
                uiState.chatsAnimated = false;
                cacheState.usersCache.clear();
                cacheState.allUsers = null;
                showLogin();
                return;
            }
            let profile = await getUserData(user.uid);
            if (!profile) profile = await ensureProfile(user, user.displayName || "Без имени", user.photoURL || "👤");
            authState.user = { uid: user.uid, phoneNumber: user.phoneNumber || profile.phoneNumber, displayName: profile.displayName, photoURL: profile.photoURL };
            authState.profile = profile;
            await preloadAllUsers();
            if (uiState.page === 'profile') renderProfilePage();
            else switchToChatsPage(); // <-- исправлено
            if (!uiState.isIOS) {
                const token = await requestNotificationPermissionAndGetToken();
                if (token) await saveFCMTokenToFirestore(authState.user.uid, token);
            }
        });
    }
    boot();

            // КОПИРУЙТЕ ПОЛНОСТЬЮ ИЗ МОЕГО ПРЕДЫДУЩЕГО ОТВЕТА (ГДЕ БЫЛА ФУНКЦИЯ switchToChatsPage)

            // После копирования всех функций до boot() вставьте:

            debug('Состояние и функции определены');

                loadTheme();
                onAuthStateChanged(auth, async (user) => {

                    if (!uiState.splashHidden) {
                        setTimeout(hideSplash, 1500);
                    }
                    if (!user) {
                        // очистка и показ логина
                        // ... (весь код из оригинального boot)
                        debug('Показываем логин');

                    // ... (остальной код)
                    debug('Загружен профиль, рендерим ' + (uiState.page === 'profile' ? 'профиль' : 'чаты'));
                    if (uiState.page === 'profile') renderProfilePage();
                    else switchToChatsPage();
                    // уведомления и т.д.
                });

            boot();

        } catch (err) {
            console.error('КРИТИЧЕСКАЯ ОШИБКА:', err);
            const bar = document.getElementById('debugBar');
            if (bar) {
                bar.className = 'debug-bar error';
                bar.textContent = 'КРИТИЧЕСКАЯ ОШИБКА: ' + err.message;
            }
        }
