<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NEON Messenger | Стена, Чаты, Пользователи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
            min-height: 100vh;
            color: #d8f8ff;
        }

        .glass {
            background: rgba(15, 25, 45, 0.45);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 18px rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .glass:hover {
            border-color: #0ff;
            box-shadow: 0 0 28px rgba(0, 255, 255, 0.5);
        }

        .neon-input {
            background: rgba(10, 20, 40, 0.7);
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 14px 20px;
            color: #0ff;
            font-size: 16px;
            outline: none;
            width: 100%;
        }

        .neon-input:focus {
            box-shadow: 0 0 14px #0ff;
        }

        .neon-btn {
            background: linear-gradient(135deg, rgba(0,255,255,0.08), rgba(255,0,255,0.08));
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: bold;
            color: #0ff;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .neon-btn:hover {
            background: #0ff;
            color: black;
            box-shadow: 0 0 20px #0ff;
        }

        .loading {
            text-align: center;
            color: #0ff;
            padding: 20px;
        }

        .messages-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: calc(100vh - 150px);
            overflow-y: auto;
        }

        textarea {
            resize: none;
            border-radius: 10px;
            box-shadow: 0 0 6px rgba(0, 255, 255, 0.3);
        }

    </style>
</head>
<body>
<div id="root"><div class="loading">✨ Загрузка...</div></div>

<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
  }
}
</script>

<script type="module">
import { initializeApp } from 'firebase/app';
import { 
    getAuth, 
    signInWithPhoneNumber, 
    RecaptchaVerifier, 
    onAuthStateChanged, 
    signOut 
} from 'firebase/auth';
import { 
    getFirestore, 
    collection, 
    doc, 
    setDoc, 
    getDoc, 
    addDoc,
    updateDoc,
    getDocs,
    onSnapshot,
    serverTimestamp,
    query,
    orderBy,
    where
} from 'firebase/firestore';

// Firebase config
const firebaseConfig = {
    apiKey: "ВАШ_API_KEY",
    authDomain: "ВАШ_DOMAIN.firebaseapp.com",
    projectId: "ВАШ_PROJECT_ID",
    storageBucket: "project.appspot.com",
    messagingSenderId: "1234567890",
    appId: "APP_ID"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

auth.languageCode = 'ru'; // Установка локализации

// Переменная текущего пользователя
let currentUser = null;

// === Функция для отображения чатов ===
async function loadChats() {
    const chatsRef = collection(db, 'chats');
    const q = query(chatsRef, where('members', 'array-contains', currentUser.uid));
    const chatSnapshots = await getDocs(q);

    let chatsHTML = '';
    chatSnapshots.forEach(doc => {
        const chat = doc.data();
        chatsHTML += `
            <div>
                <strong>${chat?.name || 'Без имени'}</strong>
            </div>
        `;
    });
    return chatsHTML || '<p>У вас пока нет чатов.</p>';
}

// === Функция для загрузки стены ===
async function loadWallPosts() {
    const postsRef = collection(db, 'wall');
    const q = query(postsRef, orderBy('timestamp', 'desc'));
    const postSnapshots = await getDocs(q);

    let wallHTML = '';
    postSnapshots.forEach(doc => {
        const post = doc.data();
        wallHTML += `
            <div>
                <p>${post?.content}</p>
            </div>
        `;
    });

    return wallHTML || '<p>Пока ни одного поста.</p>';
}

// === Рендер главного приложения ===
async function renderMainApp() {
    document.getElementById('root').innerHTML = `
        <div class="glass" style="">
           <h2>🔥 NEON Стена</h2>
           <div>${await loadWallPosts()}</div>
        </div>
    `;
}

// === Аутентификация ==

onAuthStateChanged(auth, (user) => {
  if (user) renderMainApp();
  else alert("🔓 Пожалуйста, войдите");
})


</script>
</body>
</html>
